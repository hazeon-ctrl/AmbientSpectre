<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambient Spectre</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #06060f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
        }
        #gameContainer {
            text-align: center;
            position: relative;
        }
        #canvas {
            border: 2px solid #00ff88;
            background: #0d0d1f;
            display: block;
            margin: 0 auto;
            cursor: crosshair;
        }
        /* All HUD is now drawn on canvas. These are only fallback/hidden. */
        #info, #controls, #powerup { display: none; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="canvas" width="800" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Global error catcher — logs full stack so we can pinpoint any crash
    window.addEventListener('error', e => {
        console.error('GAME CRASH:', e.message, '\nFile:', e.filename, '\nLine:', e.lineno, '\nCol:', e.colno);
        if (e.error) console.error(e.error.stack);
    });
    window.addEventListener('unhandledrejection', e => {
        console.error('UNHANDLED PROMISE:', e.reason);
    });

    // ─── Audio Context ────────────────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.8;
    analyser.connect(audioCtx.destination);

    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    // ─── Chromatic frequency table (A4 = 440 Hz) ─────────────────────────────
    // All pitches in Hz by MIDI note number, then named for readability.
    // We derive modal scales from these so every sound function can retune.
    const NOTE_HZ = (() => {
        const out = {};
        const names = ['C','Cs','D','Ds','E','F','Fs','G','Gs','A','As','B'];
        for (let midi = 36; midi <= 96; midi++) {
            const oct = Math.floor(midi / 12) - 1;
            const name = names[midi % 12] + oct;
            out[name] = 440 * Math.pow(2, (midi - 69) / 12);
        }
        return out;
    })();

    // Convenience alias kept for any legacy references inside non-HD code paths
    const dorianScale = {
        D3: NOTE_HZ.D3, E3: NOTE_HZ.E3, F3: NOTE_HZ.F3, G3: NOTE_HZ.G3,
        A3: NOTE_HZ.A3, B3: NOTE_HZ.B3, C4: NOTE_HZ.C4,
        D4: NOTE_HZ.D4, E4: NOTE_HZ.E4, F4: NOTE_HZ.F4, G4: NOTE_HZ.G4,
        A4: NOTE_HZ.A4, B4: NOTE_HZ.B4, C5: NOTE_HZ.C5,
        D5: NOTE_HZ.D5, E5: NOTE_HZ.E5, F5: NOTE_HZ.F5, G5: NOTE_HZ.G5,
        A5: NOTE_HZ.A5, B5: NOTE_HZ.B5, C6: NOTE_HZ.C6
    };

    // ─── Harmonic Director ────────────────────────────────────────────────────
    // Single source of truth for the game's harmonic state.
    // All sound functions read from HD instead of hardcoded notes.
    const HD = (() => {
        // ── Modal scale definitions (intervals in semitones from root) ──
        // Root = D (MIDI 50 = D3 base)
        const MODAL_INTERVALS = {
            dorian:       [0, 2, 3, 5, 7, 9, 10],  // D E F G A B C
            dorian_tense: [0, 2, 3, 5, 7, 9, 10],  // same notes, tighter timing via HD
            phrygian:     [0, 1, 3, 5, 7, 8, 10],  // D Eb F G A Bb C  — dark, tense
            aeolian:      [0, 2, 3, 5, 7, 8, 10],  // D E F G A Bb C   — natural minor
            dm7:          [0, 2, 3, 5, 7, 9, 10],  // dorian but chord = D F A C
            g7:           [0, 2, 5, 7, 9, 11, 2],  // G mixolydian flavour (root shifts up to G)
            am7:          [0, 2, 3, 5, 7, 9, 10],  // A dorian relative (root up to A)
            gmaj:         [0, 2, 4, 5, 7, 9, 11],  // G major — bright resolution
        };

        // Root MIDI notes per mode (all in octave 3 as base)
        const MODE_ROOT_MIDI = {
            dorian: 50, dorian_tense: 50, phrygian: 50, aeolian: 50,
            dm7: 50, g7: 55, am7: 57, gmaj: 55
        };

        // Chord voicings per mode (scale degrees 1-based, across octaves)
        // Each entry: array of { degree, octaveOffset }
        const MODE_CHORDS = {
            dorian:       [{d:0,o:0},{d:2,o:0},{d:4,o:0},{d:6,o:0}],  // D F A C  (Dm7)
            dorian_tense: [{d:0,o:0},{d:2,o:0},{d:4,o:0},{d:6,o:0}],
            phrygian:     [{d:0,o:0},{d:2,o:0},{d:4,o:0},{d:5,o:0}],  // D F A Bb (Dm add b6)
            aeolian:      [{d:0,o:0},{d:2,o:0},{d:4,o:0},{d:5,o:0}],  // D F A Bb
            dm7:          [{d:0,o:0},{d:2,o:0},{d:4,o:0},{d:6,o:0}],  // D F A C
            g7:           [{d:0,o:0},{d:2,o:0},{d:4,o:0},{d:6,o:0}],  // G B D F
            am7:          [{d:0,o:0},{d:2,o:0},{d:4,o:0},{d:6,o:0}],  // A C E G
            gmaj:         [{d:0,o:0},{d:2,o:0},{d:4,o:0},{d:6,o:0}],  // G B D F#
        };

        // Spectrum bar hue ranges per mode [startHue, endHue]
        const MODE_HUE = {
            dorian:       [160, 220],   // cyan-blue: spacious
            dorian_tense: [120, 180],   // teal-cyan: tightening
            phrygian:     [270, 320],   // violet-crimson: dread
            aeolian:      [230, 280],   // indigo-purple: heavy
            dm7:          [170, 230],   // blue-violet: moody
            g7:           [30,  80],    // amber-gold: dominant tension
            am7:          [190, 250],   // blue-purple: suspended
            gmaj:         [60,  120],   // gold-green: bright resolve
        };

        // Drone chord frequencies per mode (voiced across 3-4 octaves for richness)
        // Returns array of { freq, gainMult } for the ambient drone voices
        const MODE_DRONE = {
            dorian:       [ // D3 + A3 + F4 + C5  — open Dm7 spread
                {f: NOTE_HZ.D3, g: 1.0}, {f: NOTE_HZ.A3, g: 0.7},
                {f: NOTE_HZ.F4, g: 0.4}, {f: NOTE_HZ.C5, g: 0.25}
            ],
            dorian_tense: [ // Same root but add E3 tritone pressure
                {f: NOTE_HZ.D3, g: 1.0}, {f: NOTE_HZ.A3, g: 0.7},
                {f: NOTE_HZ.E3, g: 0.35},{f: NOTE_HZ.C5, g: 0.3}
            ],
            phrygian: [    // D3 + Eb3 + F3 + A3 — half-step cluster, very dark
                {f: NOTE_HZ.D3,  g: 1.0}, {f: NOTE_HZ.Ds3, g: 0.8},
                {f: NOTE_HZ.F3,  g: 0.5}, {f: NOTE_HZ.A3,  g: 0.35}
            ],
            aeolian: [     // D3 + F3 + A3 + Bb3 — natural minor heaviness
                {f: NOTE_HZ.D3,  g: 1.0}, {f: NOTE_HZ.F3,  g: 0.75},
                {f: NOTE_HZ.A3,  g: 0.55},{f: NOTE_HZ.As3, g: 0.4}
            ],
            dm7: [         // D3 + F3 + A3 + C4 — lush Dm7
                {f: NOTE_HZ.D3, g: 1.0}, {f: NOTE_HZ.F3, g: 0.75},
                {f: NOTE_HZ.A3, g: 0.5}, {f: NOTE_HZ.C4, g: 0.4}
            ],
            g7: [          // G2 + B3 + D4 + F4 — dominant seventh tension
                {f: NOTE_HZ.G3 * 0.5, g: 1.0}, {f: NOTE_HZ.B3, g: 0.7},
                {f: NOTE_HZ.D4, g: 0.5},        {f: NOTE_HZ.F4, g: 0.4}
            ],
            am7: [         // A2 + C3 + E3 + G3 — suspended floating
                {f: NOTE_HZ.A3 * 0.5, g: 1.0}, {f: NOTE_HZ.C4 * 0.5, g: 0.7},
                {f: NOTE_HZ.E3, g: 0.55},       {f: NOTE_HZ.G3, g: 0.4}
            ],
            gmaj: [        // G3 + B3 + D4 + Fs4 — bright major resolution
                {f: NOTE_HZ.G3, g: 1.0}, {f: NOTE_HZ.B3, g: 0.75},
                {f: NOTE_HZ.D4, g: 0.55},{f: NOTE_HZ.Fs4, g: 0.35}
            ],
        };

        // Transition speeds (frames to crossfade) — slow for ambience, fast for danger
        const MODE_FADE_FRAMES = {
            dorian: 180, dorian_tense: 90, phrygian: 60, aeolian: 120,
            dm7: 90, g7: 80, am7: 80, gmaj: 100
        };

        // Internal state
        let _mode = 'dorian';
        let _prevMode = 'dorian';
        let _crossfade = 1.0; // 0=prev, 1=current (always ramps to 1)

        // Public state (read by game and sound functions)
        const pub = {
            mode:        'dorian',
            spectrumHue: [160, 220],
            rootMidi:    50,
            // Returns Hz for scale degree (0=root, 1=2nd, etc.) at octave offset
            getNote(degree, octaveOffset = 0) {
                const intervals = MODAL_INTERVALS[_mode];
                const rootMidi  = MODE_ROOT_MIDI[_mode];
                const semis = intervals[degree % intervals.length] + (Math.floor(degree / intervals.length) * 12);
                return 440 * Math.pow(2, (rootMidi + semis + octaveOffset * 12 - 69) / 12);
            },
            // Returns chord voicing as array of Hz values
            getChord(octaveOffset = 0) {
                return MODE_CHORDS[_mode].map(v =>
                    pub.getNote(v.d, v.o + octaveOffset)
                );
            },
            // Returns [hueStart, hueEnd] for current mode
            getHueRange() { return MODE_HUE[_mode]; },
            // Returns drone voices for current mode
            getDroneVoices() { return MODE_DRONE[_mode]; },
            // The current mode label for display
            modeLabel: 'D DORIAN',
            // Tense = fast enemy pressure
            isTense: false,
        };

        // Mode label map
        const MODE_LABELS = {
            dorian: 'D DORIAN', dorian_tense: 'D DORIAN ▲',
            phrygian: 'E PHRYGIAN', aeolian: 'D AEOLIAN',
            dm7: 'Dm⁷', g7: 'G⁷', am7: 'Am⁷', gmaj: 'G MAJ'
        };

        // ── Mode resolution — called every frame from update() ──
        pub.update = function(gameData) {
            const { health, aliveEnemies, comboLetters, enemiesKilled } = gameData;

            // Priority ladder: Phrygian (danger) > Aeolian (boss) > combo chain > tension > base
            let target = 'dorian';

            // Low health → Phrygian regardless of everything else
            if (health <= 30) {
                target = 'phrygian';
            }
            // Boss threshold: 6+ enemies on screen (requires ~10 kills to start spawning that many)
            else if (aliveEnemies >= 6) {
                target = 'aeolian';
            }
            // Combo chain steps — each pair of revealed letters advances the progression
            else if (comboLetters >= 6) {
                target = 'gmaj';
            } else if (comboLetters >= 4) {
                target = 'am7';
            } else if (comboLetters >= 2) {
                target = 'g7';
            } else if (comboLetters >= 1) {
                target = 'dm7';
            }
            // High enemy pressure (3-5 alive, not boss) → tense variant
            else if (aliveEnemies >= 3) {
                target = 'dorian_tense';
            }

            pub.isTense = (aliveEnemies >= 3 && health > 30);

            if (target !== _mode) {
                _prevMode = _mode;
                _mode = target;
                _crossfade = 0.0;
            }
            // Ramp crossfade
            const fadeRate = 1 / (MODE_FADE_FRAMES[_mode] || 120);
            _crossfade = Math.min(1, _crossfade + fadeRate);

            pub.mode      = _mode;
            pub.modeLabel = MODE_LABELS[_mode];
            pub.spectrumHue = MODE_HUE[_mode];
        };

        return pub;
    })();

    // ─── Constants ────────────────────────────────────────────────────────────
    const DANGER_ZONE_HEIGHT = 120;
    const PELLET_SPAWN_INTERVAL = 45; // frames between pellet spawns
    const MAX_PELLETS = 16;
    const POWERUP_TRIGGER_SCORE = 50; // every N score points = powerup

    // ─── Game State ───────────────────────────────────────────────────────────
    let gameState = 'start'; // 'start' | 'playing' | 'dead'
    let loopRunning = false;

    const player = {
        x: 100,
        y: canvas.height / 2,
        width: 30,
        height: 30,
        speed: 5,
        health: 100,
        color: '#00ff88',
        score: 0,
        lastPowerupScore: 0,
        powerups: [],
        crystalShieldReduction: 1.0,  // 0.95 after first crystal defeat — permanent 5% DR
    };

    let enemies = [];
    let maxEnemies = 1;
    let enemiesDestroyed = 0;
    let bullets = [];
    let pellets = [];
    let bombs = [];        // enemy bomb projectiles
    let explosions = [];   // active bomb blast effects
    let laserBeams = [];   // AMBIENT combo laser strikes
    let crystals = [];     // special crystal spike enemies
    let comets = [];       // crystal-fired homing comets
    const keys = {};
    let pelletSpawnTimer = 0;
    let dangerZoneDamageTimer = 0;
    let shootCooldown = 0;
    let scoreFlashTimer = 0;  // counts down frames after score increases

    // ─── Wave Controller ──────────────────────────────────────────────────────
    // Enemies now spawn in waves shaped like a triangle wave:
    // enemy cap rises to a peak then falls back, cycling at higher difficulty.
    const WC = (() => {
        // Triangle wave: maps wave index → peak enemy count for that wave
        // Cycle length = 6 waves. Peak at mid-cycle. Baseline rises each cycle.
        const CYCLE_LEN     = 6;   // waves per triangle cycle
        const PEAK_ENEMIES  = 5;   // max enemies at triangle peak
        const BASE_ENEMIES  = 1;   // min enemies at triangle trough
        const BETWEEN_FRAMES = 120; // pause between waves (~2s)
        const CRYSTAL_EVERY  = 3;  // spawn crystal after every Nth wave cleared

        const pub = {
            wave:         1,
            phase:        'spawning',  // 'spawning' | 'between'
            betweenTimer: 0,
            waveKillGoal: 0,    // kills needed to complete current wave
            waveKills:    0,    // kills so far this wave (enemies + crystals)
            announceFade: 0,    // frames left on wave announcement flash
            totalWaveClears: 0, // counts completed waves for crystal trigger
        };

        function _trianglePeak(waveNum) {
            // Position within current cycle (0-based)
            const pos = ((waveNum - 1) % CYCLE_LEN);
            const cycle = Math.floor((waveNum - 1) / CYCLE_LEN);
            const half = CYCLE_LEN / 2;
            // Triangle 0→1→0 across the cycle
            const t = pos < half ? pos / half : 1 - (pos - half) / half;
            const baseline = BASE_ENEMIES + cycle;  // baseline rises each cycle
            return Math.round(baseline + (PEAK_ENEMIES + cycle - baseline) * t);
        }

        pub.getCurrentPeak = () => _trianglePeak(pub.wave);

        pub.startWave = function(waveNum) {
            pub.wave       = waveNum;
            pub.phase      = 'spawning';
            pub.waveKills  = 0;
            // Kill goal = peak × 2 so the wave has substance at peaks
            pub.waveKillGoal = Math.max(2, _trianglePeak(waveNum) * 2);
            pub.announceFade = 160;
        };

        // Called from update each frame
        pub.tick = function(aliveEnemies, aliveCrystals) {
            if (pub.phase === 'between') {
                // Don't count down the between-wave pause while a crystal is alive —
                // the crystal encounter IS the wave event; next wave starts after it falls
                if (aliveCrystals === 0) pub.betweenTimer--;
                if (pub.betweenTimer <= 0) {
                    pub.startWave(pub.wave + 1);
                }
                return { shouldSpawnEnemy: false, shouldSpawnCrystal: false };
            }

            if (pub.announceFade > 0) pub.announceFade--;

            const peak = _trianglePeak(pub.wave);
            const spawnChance = aliveEnemies < peak ? 0.012 + (peak - aliveEnemies) * 0.004 : 0;

            // Suspend all normal enemy spawns while a crystal is present
            const crystalActive = aliveCrystals > 0;

            const shouldSpawnCrystal = !crystalActive &&
                pub.waveKills >= Math.floor(pub.waveKillGoal * 0.5) &&
                pub.totalWaveClears > 0 &&
                (pub.totalWaveClears % CRYSTAL_EVERY === 0) &&
                aliveEnemies === 0 &&
                pub._crystalSpawnedThisWave !== true;

            return {
                shouldSpawnEnemy: !crystalActive && aliveEnemies < peak && Math.random() < spawnChance,
                shouldSpawnCrystal
            };
        };

        pub.registerKill = function(isCrystal) {
            pub.waveKills++;
            if (isCrystal) pub.waveKills += 2; // crystal counts as 3 kills
            if (pub.waveKills >= pub.waveKillGoal) {
                pub.phase = 'between';
                pub.betweenTimer = BETWEEN_FRAMES;
                pub.totalWaveClears++;
                pub._crystalSpawnedThisWave = false;
                return true; // wave complete
            }
            return false;
        };

        pub.markCrystalSpawned = function() {
            pub._crystalSpawnedThisWave = true;
        };

        pub.startWave(1);
        return pub;
    })();

    // ─── Spectrum Immersion State ─────────────────────────────────────────────
    let spectrumImmersed = false;   // true when player is in heal zone with spectrum_heal
    let spectrumDashDir = 1;        // current horizontal dash direction: +1 or -1
    let spectrumDashSpeed = 7;      // px/frame dash speed
    let spectrumDashTimer = 0;      // counts frames since last direction flip
    const SPECTRUM_DASH_INTERVAL = 22; // frames between direction flips (~0.37s)

    // ─── AMBIENT Combo System ─────────────────────────────────────────────────
    const AMBIENT_WORD = 'AMBIENT';
    let ambientLettersRevealed = 0;  // 0–7; 7 = full word = triggers clear
    let ambientComboTimer = 0;       // counts down; resets combo if it hits 0
    const AMBIENT_COMBO_WINDOW = 180; // ~3 seconds at 60fps to chain kills
    let ambientClearFlash = 0;       // flash effect when word completes

    // ─── Ambience State ───────────────────────────────────────────────────────
    // Stars: spawned on each enemy kill, faintly glowing, permanent
    let ambienceStars = [];
    // Motes: horizontal scrolling dust particles, one cluster per combo
    let ambienceMotes = [];
    // Constellation flash state
    let constellationFlash = 0;      // countdown frames for the full AMBIENT reveal
    const CONSTELLATION_DURATION = 180; // ~3s at 60fps
    // Fixed constellation node positions (seeded set of star-like anchor points)
    const CONSTELLATION_NODES = [
        {x: 680, y: 80}, {x: 730, y: 140}, {x: 760, y: 60}, {x: 710, y: 200},
        {x: 640, y: 160}, {x: 780, y: 180}, {x: 650, y: 40}, {x: 700, y: 110},
        {x: 590, y: 90}, {x: 620, y: 200}, {x: 560, y: 150}, {x: 540, y: 60}
    ];
    // Constellation edges (pairs of node indices)
    const CONSTELLATION_EDGES = [
        [0,1],[1,2],[0,7],[7,8],[8,10],[10,9],[9,3],[3,4],[4,0],[4,6],
        [1,5],[5,3],[6,8],[7,11],[11,10]
    ];

    // ─── Audio Effects ────────────────────────────────────────────────────────
    let reverbNode = null;
    let delayNode = null;
    let delayGain = null;
    let delayFeedback = null;

    async function createReverb() {
        if (reverbNode) return;
        reverbNode = audioCtx.createConvolver();

        // Rich 3-second plate reverb impulse
        const length = audioCtx.sampleRate * 3;
        const impulse = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
        for (let ch = 0; ch < 2; ch++) {
            const d = impulse.getChannelData(ch);
            for (let i = 0; i < length; i++) {
                // Slightly different L/R for width
                const decay = Math.pow(1 - i / length, 2.5 + ch * 0.3);
                d[i] = (Math.random() * 2 - 1) * decay;
            }
        }
        reverbNode.buffer = impulse;

        delayNode    = audioCtx.createDelay(1.0);
        delayNode.delayTime.value = 0.28;
        delayGain    = audioCtx.createGain();
        delayGain.gain.value    = 0.28;
        delayFeedback = audioCtx.createGain();
        delayFeedback.gain.value = 0.38;

        delayNode.connect(delayFeedback);
        delayFeedback.connect(delayNode);
        delayNode.connect(delayGain);

        reverbNode.connect(analyser);
        delayGain.connect(analyser);
    }

    // ── HD Drone — 4-voice modal pad, retuned on mode change ─────────────────
    // Architecture: 4 oscillator pairs (osc + detuned sub-osc) each through their
    // own GainNode so we can crossfade voices individually. All feed into a shared
    // lowpass filter → reverb → analyser. Never stops; only retunes and fades.
    const DRONE_VOICE_COUNT = 4;
    let droneVoices  = [];   // [{osc, subOsc, gainNode, targetGain}]
    let droneFilter  = null;
    let droneMaster  = null;
    let droneRunning = false;
    let droneUpdateTimer = 0;
    const DRONE_UPDATE_INTERVAL = 8; // frames between drone retune checks

    function initDrone() {
        if (droneRunning) return;
        droneRunning = true;

        droneFilter = audioCtx.createBiquadFilter();
        droneFilter.type = 'lowpass';
        droneFilter.frequency.value = 900;
        droneFilter.Q.value = 0.8;

        droneMaster = audioCtx.createGain();
        droneMaster.gain.value = 0.055;

        droneFilter.connect(droneMaster);
        droneMaster.connect(reverbNode);
        droneMaster.connect(analyser);

        const initialVoices = HD.getDroneVoices();

        for (let i = 0; i < DRONE_VOICE_COUNT; i++) {
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0;
            gainNode.connect(droneFilter);

            const voiceDef = initialVoices[i] || { f: NOTE_HZ.D3, g: 0 };

            // Primary oscillator — sine for fundamental warmth
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = voiceDef.f;

            // Slightly detuned sub — triangle adds odd harmonics for body
            const subOsc = audioCtx.createOscillator();
            subOsc.type = 'triangle';
            subOsc.frequency.value = voiceDef.f * 0.998; // 3.5 cents detune

            // Soft overtone — sine at 2x for air
            const topOsc = audioCtx.createOscillator();
            topOsc.type = 'sine';
            topOsc.frequency.value = voiceDef.f * 2.001;
            const topGain = audioCtx.createGain();
            topGain.gain.value = 0.18;
            topOsc.connect(topGain);
            topGain.connect(gainNode);

            osc.connect(gainNode);
            subOsc.connect(gainNode);

            osc.start();
            subOsc.start();
            topOsc.start();

            droneVoices.push({
                osc, subOsc, topOsc, topGain,
                gainNode,
                targetGain: voiceDef.g,
                currentFreq: voiceDef.f
            });
        }

        // Ramp all voices to their initial gains
        _applyDroneVoices(HD.getDroneVoices(), 4.0);
    }

    function _applyDroneVoices(voiceDefs, rampTime) {
        const t = audioCtx.currentTime;
        voiceDefs.forEach((def, i) => {
            if (!droneVoices[i]) return;
            const v = droneVoices[i];

            // Smooth frequency glide
            v.osc.frequency.cancelScheduledValues(t);
            v.osc.frequency.setValueAtTime(v.currentFreq, t);
            v.osc.frequency.exponentialRampToValueAtTime(def.f, t + rampTime);

            v.subOsc.frequency.cancelScheduledValues(t);
            v.subOsc.frequency.setValueAtTime(v.currentFreq * 0.998, t);
            v.subOsc.frequency.exponentialRampToValueAtTime(def.f * 0.998, t + rampTime);

            v.topOsc.frequency.cancelScheduledValues(t);
            v.topOsc.frequency.exponentialRampToValueAtTime(def.f * 2.001, t + rampTime);

            // Crossfade gain
            const targetG = def.g * 0.85; // normalise slightly
            v.gainNode.gain.cancelScheduledValues(t);
            v.gainNode.gain.setValueAtTime(v.gainNode.gain.value, t);
            v.gainNode.gain.linearRampToValueAtTime(targetG, t + rampTime);

            v.currentFreq = def.f;
            v.targetGain  = targetG;
        });

        // Filter cutoff shifts with mode character
        const cutoff = HD.mode === 'phrygian'  ? 350 :
                       HD.mode === 'aeolian'   ? 500 :
                       HD.mode === 'gmaj'      ? 1400 :
                       HD.mode === 'g7'        ? 1100 :
                       HD.mode === 'dorian_tense' ? 700 : 900;
        droneFilter.frequency.cancelScheduledValues(t);
        droneFilter.frequency.setValueAtTime(droneFilter.frequency.value, t);
        droneFilter.frequency.linearRampToValueAtTime(cutoff, t + rampTime);
    }

    // Called each frame from update() when drone is running
    let _lastDroneMode = null;
    function tickDrone() {
        if (!droneRunning) return;
        droneUpdateTimer++;
        if (droneUpdateTimer < DRONE_UPDATE_INTERVAL) return;
        droneUpdateTimer = 0;

        if (HD.mode !== _lastDroneMode) {
            _lastDroneMode = HD.mode;
            const rampTime = HD.mode === 'phrygian' ? 1.8 :
                             HD.mode === 'gmaj'     ? 2.5 :
                             HD.mode === 'aeolian'  ? 3.0 : 2.2;
            _applyDroneVoices(HD.getDroneVoices(), rampTime);
        }
    }

    // ─── Sound Functions ──────────────────────────────────────────────────────
    function connectAndPlay(osc, gain, duration) {
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + duration);
        osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
    }

    // Helper — build a one-shot note with optional filter, connect to reverb+analyser
    function _oneShot({ freq, type = 'sine', gainPeak = 0.15, attack = 0.02,
                         decay = 0.15, filterFreq = null, filterQ = 1,
                         delayRoute = false, startOffset = 0, freqEnd = null }) {
        // Guard: audio nodes may not be ready yet
        if (!reverbNode || !delayNode) return null;
        if (!isFinite(freq) || freq <= 0) return null;
        const t = audioCtx.currentTime + startOffset;
        const osc  = audioCtx.createOscillator();
        const gn   = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t + decay);

        let chain = osc;
        if (filterFreq) {
            const filt = audioCtx.createBiquadFilter();
            filt.type = 'lowpass';
            filt.frequency.setValueAtTime(filterFreq, t);
            filt.Q.value = filterQ;
            osc.connect(filt); filt.connect(gn);
        } else {
            osc.connect(gn);
        }

        gn.gain.setValueAtTime(0, t);
        gn.gain.linearRampToValueAtTime(gainPeak, t + attack);
        gn.gain.exponentialRampToValueAtTime(0.001, t + decay);

        const dest = delayRoute ? delayNode : reverbNode;
        gn.connect(dest); gn.connect(analyser);

        osc.start(t); osc.stop(t + decay + 0.05);
        osc.onended = () => { try { osc.disconnect(); gn.disconnect(); } catch(e){} };
        return { osc, gn };
    }

    function createShootSound() {
        // Pitch from HD scale degree 4 (5th) — shifts with mode
        const note = HD.getNote(4, 1);  // scale degree 4, octave +1

        _oneShot({ freq: note, type: 'triangle', gainPeak: 0.14, attack: 0.008,
                   decay: 0.11, freqEnd: note * 0.58, filterFreq: note * 3.5, filterQ: 1.2 });
        // Harmonic — sine at 2x, short
        _oneShot({ freq: note * 2, type: 'sine', gainPeak: 0.045, attack: 0.005, decay: 0.07 });

        // In tense mode add a sharp metallic click for urgency
        if (HD.isTense) {
            _oneShot({ freq: note * 3.5, type: 'square', gainPeak: 0.025, attack: 0.003, decay: 0.04 });
        }
    }

    function createHitSound() {
        if (!delayNode || !analyser) return;
        const note = HD.getNote(6, 0);
        const t = audioCtx.currentTime;

        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gn   = audioCtx.createGain();
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'lowpass';
        filt.frequency.setValueAtTime(600, t);
        filt.frequency.exponentialRampToValueAtTime(90, t + 0.18);
        filt.Q.value = 2.2;

        osc1.type = 'sawtooth'; osc1.frequency.setValueAtTime(note * 1.5, t);
        osc1.frequency.exponentialRampToValueAtTime(note * 0.7, t + 0.18);
        osc2.type = 'sawtooth'; osc2.frequency.setValueAtTime(note * 1.51, t);
        osc2.frequency.exponentialRampToValueAtTime(note * 0.71, t + 0.18);

        osc1.connect(filt); osc2.connect(filt); filt.connect(gn);
        gn.gain.setValueAtTime(0.35, t);
        gn.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
        gn.connect(delayNode); gn.connect(analyser);

        osc1.start(t); osc1.stop(t + 0.2);
        osc2.start(t); osc2.stop(t + 0.2);
        osc1.onended = () => { try { osc1.disconnect(); osc2.disconnect(); gn.disconnect(); filt.disconnect(); } catch(e){} };

        if (!delayNode || !reverbNode) return;
        const t = audioCtx.currentTime;
        const bufSize = Math.floor(audioCtx.sampleRate * 0.55);
        const buf  = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = buf;
        const nFilt = audioCtx.createBiquadFilter();
        nFilt.type = 'lowpass';
        nFilt.frequency.setValueAtTime(2200, t);
        nFilt.frequency.exponentialRampToValueAtTime(60, t + 0.55);
        const nGain = audioCtx.createGain();
        nGain.gain.setValueAtTime(0.38, t);
        nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
        noise.connect(nFilt); nFilt.connect(nGain);
        nGain.connect(delayNode); nGain.connect(reverbNode); nGain.connect(analyser);
        noise.start(t); noise.stop(t + 0.55);

        // Pitched descent on mode's root-5th-7th for harmonic explosion colour
        [HD.getNote(0,0), HD.getNote(4,0), HD.getNote(6,0)].forEach(freq => {
            _oneShot({ freq, type: 'sawtooth', gainPeak: 0.13, attack: 0.005,

    function activatePowerup() {
        const newPowerup = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
        const existingIndex = player.powerups.findIndex(p => p.type === newPowerup);
        if (existingIndex !== -1) {
            player.powerups[existingIndex].timer = POWERUP_DURATION;
            player.powerups[existingIndex].level = Math.min(3, player.powerups[existingIndex].level + 1);
            createComboSound(player.powerups[existingIndex].level);
        } else {
            player.powerups.push({ type: newPowerup, timer: POWERUP_DURATION, level: 1 });
            createPowerupSound(newPowerup);
        }
    }

    function hasPowerup(type) { return player.powerups.some(p => p.type === type); }
    function getPowerupLevel(type) {
        const p = player.powerups.find(p => p.type === type);
        return p ? p.level : 0;
    }

    // ─── Shooting ─────────────────────────────────────────────────────────────
    function playerShoot() {
        const hasSpread = hasPowerup('spread_shot');
        const damageLevel = getPowerupLevel('damage_boost');

        if (hasSpread) {
            const spreadCount = 3 + getPowerupLevel('spread_shot');
            for (let i = 0; i < spreadCount; i++) {
                const angle = (i - Math.floor(spreadCount / 2)) * 15;
                bullets.push({
                    x: player.x + player.width,
                    y: player.y + player.height / 2,
                    width: 10, height: 4,
                    vx: 8, vy: Math.sin(angle * Math.PI / 180) * 3,
                    owner: 'player', color: player.color,
                    homing: true, homingStrength: 0.08,
                    damage: 10 + damageLevel * 5
                });
            }
            createShootSound();
        } else {
            bullets.push({
                x: player.x + player.width,
                y: player.y + player.height / 2,
                width: 10, height: 4,
                vx: 8, vy: 0,
                owner: 'player', color: player.color,
                homing: true, homingStrength: 0.08,
                damage: 10 + damageLevel * 5
            });
            createShootSound();
        }
    }

    function enemyShoot(enemy) {
        // Aim directly at the player's center using true dx/dy vector
        const px = player.x + player.width / 2;
        const py = player.y + player.height / 2;
        const ex = enemy.x + enemy.width / 2;
        const ey = enemy.y + enemy.height / 2;
        const dx = px - ex;
        const dy = py - ey;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const speed = enemy.bulletSpeed || 5;
        bullets.push({
            x: ex,
            y: ey,
            width: 10, height: 4,
            vx: (dx / dist) * speed,
            vy: (dy / dist) * speed,
            owner: 'enemy', color: enemy.color
        });
        createShootSoundEnemy();
    }
