    function spawnComet(crystal) {
        const px = player.x + player.width / 2;
        const py = player.y + player.height / 2;
        const dxP = px - crystal.x, dyP = py - crystal.y;
        const baseDist = Math.sqrt(dxP*dxP + dyP*dyP) || 1;
        const baseAngle = Math.atan2(dyP / baseDist, dxP / baseDist);
        // Scatter ±60° from player direction
        const scatter = (Math.random() - 0.5) * Math.PI * 0.67;
        const angle = baseAngle + scatter;
        const speed = 1.8 + Math.random() * 1.2;
        comets.push({
            x: crystal.x,
            y: crystal.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            homingStrength: 0.018,
            radius: Math.max(3, 7 + crystal.absorbedMass * 0.8),
            tail: [],   // [{x,y,alpha}] ring buffer
            maxTail: 8,
            hue: crystal.hue,
            damage: 18,
        });
    }
    function checkCollision(r1, r2) {
        return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x &&
               r1.y < r2.y + r2.height && r1.y + r1.height > r2.y;
    }
    function checkCircleCollision(circle, rect) {
        const cx = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
        const cy = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
        const dx = circle.x - cx, dy = circle.y - cy;
        return dx * dx + dy * dy < circle.radius * circle.radius;
    }

    // ─── Ambience Drawing ─────────────────────────────────────────────────────
    function drawAmbience() {
        const now = Date.now();

        // ── Stars (permanent, one per kill) ──────────────────────────────────
        ambienceStars.forEach(star => {
            // Each star has a slow twinkle
            const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(now / star.twinklePeriod + star.twinkleOffset));
            const flashBoost = constellationFlash > 0 ? (constellationFlash / CONSTELLATION_DURATION) * 0.9 : 0;
            const alpha = Math.min(1, (star.baseAlpha + flashBoost) * twinkle);
            const radius = star.r * (1 + flashBoost * 2.5);

            ctx.save();
            ctx.globalAlpha = alpha;
            // Outer glow
            const grad = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, Math.max(1, radius * 4));
            grad.addColorStop(0, star.color);
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(star.x, star.y, radius * 4, 0, Math.PI * 2);
            ctx.fill();
            // Core dot
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(star.x, star.y, radius * (1 + flashBoost), 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });

        // ── Sky reveal on constellation flash ────────────────────────────────
        if (constellationFlash > 0) {
            const pct = constellationFlash / CONSTELLATION_DURATION;
            // Sky builds up, peaks, then fades
            const skyAlpha = pct < 0.15
                ? (pct / 0.15) * 0.28          // fade in
                : pct > 0.75
                    ? ((pct - 0.75) / 0.25) * 0.28  // fade out
                    : 0.28;                           // plateau

            // Deep-space to light-blue gradient sky wash
            const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height - 120);
            skyGrad.addColorStop(0,   `rgba(10, 20, 60,  ${skyAlpha * 0.6})`);
            skyGrad.addColorStop(0.35,`rgba(20, 55, 120, ${skyAlpha})`);
            skyGrad.addColorStop(0.65,`rgba(80, 140, 200,${skyAlpha})`);
            skyGrad.addColorStop(1,   `rgba(140,200,240, ${skyAlpha * 0.7})`);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height - 120);

            // Nebula cloud wisps — soft overlapping ellipses
            const cloudSeeds = [
                {cx: 150, cy: 140, rx: 200, ry: 60, hue: 210},
                {cx: 500, cy: 90,  rx: 220, ry: 55, hue: 200},
                {cx: 350, cy: 200, rx: 180, ry: 50, hue: 220},
                {cx: 650, cy: 160, rx: 150, ry: 45, hue: 195},
                {cx: 80,  cy: 280, rx: 160, ry: 50, hue: 215},
                {cx: 700, cy: 280, rx: 170, ry: 55, hue: 205},
            ];
            cloudSeeds.forEach(c => {
                const cloudAlpha = skyAlpha * (0.5 + 0.2 * Math.sin(now / 4000 + c.cx));
                const cg = ctx.createRadialGradient(c.cx, c.cy, 0, c.cx, c.cy, c.rx);
                cg.addColorStop(0, `hsla(${c.hue}, 60%, 80%, ${cloudAlpha * 0.6})`);
                cg.addColorStop(0.5, `hsla(${c.hue}, 50%, 70%, ${cloudAlpha * 0.3})`);
                cg.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.save();
                ctx.scale(1, c.ry / c.rx);
                ctx.fillStyle = cg;
                ctx.beginPath();
                ctx.arc(c.cx, c.cy * (c.rx / c.ry), c.rx, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // ── Constellation lines connecting nearest stars ──────────────────
            const lineAlpha = skyAlpha * 1.8;
            ctx.save();
            ctx.globalAlpha = Math.min(1, lineAlpha);
            ctx.strokeStyle = `rgba(160, 210, 255, ${Math.min(1, lineAlpha)})`;
            ctx.lineWidth = 0.8;
            ctx.shadowColor = '#88ccff';
            ctx.shadowBlur = 8;

            // Connect the fixed constellation skeleton
            CONSTELLATION_EDGES.forEach(([a, b]) => {
                const na = CONSTELLATION_NODES[a];
                const nb = CONSTELLATION_NODES[b];
                ctx.beginPath();
                ctx.moveTo(na.x, na.y);
                ctx.lineTo(nb.x, nb.y);
                ctx.stroke();
            });

            // Also connect any accumulated stars to their nearest neighbor
            if (ambienceStars.length >= 2) {
                ctx.strokeStyle = `rgba(130, 200, 255, ${Math.min(1, lineAlpha * 0.6)})`;
                ctx.lineWidth = 0.5;
                ctx.shadowBlur = 4;
                // Connect each star to its nearest star (simple nearest-neighbor chains)
                ambienceStars.forEach((star, idx) => {
                    let nearest = null, nearestD = Infinity;
                    ambienceStars.forEach((other, jdx) => {
                        if (jdx === idx) return;
                        const d = Math.hypot(other.x - star.x, other.y - star.y);
                        if (d < nearestD && d < 200) { nearestD = d; nearest = other; }
                    });
                    if (nearest) {
                        ctx.beginPath();
                        ctx.moveTo(star.x, star.y);
                        ctx.lineTo(nearest.x, nearest.y);
                        ctx.stroke();
                    }
                });
            }
            ctx.restore();

            // Decrement
            constellationFlash--;
        }

        // ── Motes (horizontal scrolling space dust) ───────────────────────────
        for (let i = ambienceMotes.length - 1; i >= 0; i--) {
            const mote = ambienceMotes[i];
            mote.x -= mote.speed;
            mote.life--;

            if (mote.x < -10 || mote.life <= 0) {
                ambienceMotes.splice(i, 1);
                continue;
            }

            const agePct = mote.life / mote.maxLife;
            // Fade in quickly, then fade out
            const fadeAlpha = agePct < 0.1 ? agePct / 0.1 : agePct > 0.8 ? (agePct - 0.8) / 0.2 : 1;
            const alpha = mote.baseAlpha * fadeAlpha;

            ctx.save();
            ctx.globalAlpha = alpha;
            // Elongated streak — faster motes are more elongated
            const streakLen = mote.speed * 6;
            const motGrad = ctx.createLinearGradient(mote.x, mote.y, mote.x + streakLen, mote.y);
            motGrad.addColorStop(0, 'rgba(0,0,0,0)');
            motGrad.addColorStop(0.3, mote.color);
            motGrad.addColorStop(1, mote.color);
            ctx.fillStyle = motGrad;
            ctx.beginPath();
            ctx.ellipse(mote.x + streakLen / 2, mote.y, streakLen / 2, mote.r, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function spawnMoteCluster() {
        // Spawn a cluster of ~8–14 motes at the right edge, varying Y band
        const count = 8 + Math.floor(Math.random() * 7);
        const centerY = 60 + Math.random() * (canvas.height - 200);
        for (let i = 0; i < count; i++) {
            ambienceMotes.push({
                x: canvas.width + 10 + Math.random() * 80,
                y: centerY + (Math.random() - 0.5) * 80,
                speed: 0.6 + Math.random() * 1.4,
                r: 0.5 + Math.random() * 1.2,
                life: 260 + Math.floor(Math.random() * 120),
                maxLife: 380,
                baseAlpha: 0.15 + Math.random() * 0.35,
                color: `hsl(${180 + Math.random() * 60}, 60%, ${70 + Math.random() * 20}%)`
            });
        }
    }

    function spawnKillStar(enemy) {
        // Works for both enemy ships (have width/height) and crystals (have size)
        const halfW = (enemy.width  != null) ? enemy.width  / 2 : (enemy.size || 20);
        const halfH = (enemy.height != null) ? enemy.height / 2 : (enemy.size || 20);
        const sx = enemy.x + halfW + (Math.random() - 0.5) * 40;
        const sy = Math.max(55, Math.min(canvas.height - 140,
            enemy.y + halfH + (Math.random() - 0.5) * 40));
        const hue = 180 + Math.random() * 80; // cool blues/cyans/teals
        ambienceStars.push({
            x: sx,
            y: sy,
            r: 0.6 + Math.random() * 1.0,
            baseAlpha: 0.18 + Math.random() * 0.22,
            color: `hsl(${hue}, 80%, 75%)`,
            twinklePeriod: 1800 + Math.random() * 3000,
            twinkleOffset: Math.random() * Math.PI * 2
        });
    }

    // ─── Draw ─────────────────────────────────────────────────────────────────
    function drawSpectrum() {
        analyser.getByteFrequencyData(dataArray);
        const barWidth = (canvas.width / bufferLength) * 2.5;
        const isDangerMode = !hasPowerup('spectrum_heal');

        // HD-driven hue range — spectrum colour reflects harmonic mode
        const [hueA, hueB] = HD.getHueRange();
        // Low-health phrygian pulses the spectrum intensity
        const phrygianPulse = HD.mode === 'phrygian'
            ? 0.8 + 0.2 * Math.sin(Date.now() / 120) : 1.0;

        let x = 0;
        for (let i = 0; i < bufferLength; i++) {
            const barHeight = (dataArray[i] / 255) * DANGER_ZONE_HEIGHT * phrygianPulse;
            // Interpolate hue across the bar range
            const t = i / bufferLength;
            const hue = hueA + (hueB - hueA) * t;
            // Saturation and lightness vary with mode
            const sat = HD.mode === 'aeolian' ? 70 : HD.mode === 'gmaj' ? 90 : 100;
            const lit = HD.mode === 'phrygian' ? 45 : 50;
            ctx.fillStyle = `hsla(${hue}, ${sat}%, ${lit}%, 0.72)`;
            ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
            x += barWidth + 0.5;
        }

        // Zone boundary line — colour reflects HD mode
        const lineColor = isDangerMode
            ? (HD.mode === 'phrygian' ? '#cc44ff' :
               HD.mode === 'aeolian'  ? '#8844ff' : '#ff3333')
            : '#33ff88';
        ctx.strokeStyle = lineColor;
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - DANGER_ZONE_HEIGHT);
        ctx.lineTo(canvas.width, canvas.height - DANGER_ZONE_HEIGHT);
        ctx.stroke();
        ctx.setLineDash([]);

        // Zone label
        ctx.fillStyle = isDangerMode ? 'rgba(255,51,51,0.5)' : 'rgba(51,255,136,0.4)';
        ctx.font = '10px Courier New';
        ctx.textAlign = 'right';
        ctx.fillText(isDangerMode ? 'DANGER ZONE' : 'HEAL ZONE', canvas.width - 8, canvas.height - DANGER_ZONE_HEIGHT + 14);

        // ── Harmonic mode label — bottom-left of spectrum strip ──
        const modeColors = {
            dorian: 'rgba(100,210,255,0.7)',  dorian_tense: 'rgba(80,255,180,0.75)',
            phrygian: 'rgba(200,80,255,0.8)', aeolian: 'rgba(120,80,255,0.75)',
            dm7: 'rgba(100,170,255,0.7)',     g7: 'rgba(255,180,60,0.8)',
            am7: 'rgba(140,160,255,0.75)',    gmaj: 'rgba(180,255,100,0.8)'
        };
        ctx.save();
        ctx.font = 'bold 10px Courier New';
        ctx.textAlign = 'left';
        ctx.fillStyle = modeColors[HD.mode] || 'rgba(180,180,255,0.7)';
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = 6;
        ctx.fillText(`♩ ${HD.modeLabel}`, 8, canvas.height - DANGER_ZONE_HEIGHT + 14);
        ctx.shadowBlur = 0;
        ctx.restore();
    }

    // Player's movement boundary line (left half)
    function drawBoundaryLine() {
        ctx.strokeStyle = 'rgba(100, 150, 255, 0.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 8]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height - DANGER_ZONE_HEIGHT);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function drawPlayer() {
        const cx = player.x + player.width / 2;
        const cy = player.y + player.height / 2;
        const W = player.width;   // 30
        const H = player.height;  // 30

        ctx.save();

        // ── Glow ──
        const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 48);
        glow.addColorStop(0, 'rgba(0, 255, 136, 0.35)');
        glow.addColorStop(1, 'rgba(0, 255, 136, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(cx, cy, 48, 0, Math.PI * 2);
        ctx.fill();

        // ── Engine exhaust (drawn behind hull) ──
        // Two small thruster nozzles at rear, animated flicker
        const flicker = 0.6 + 0.4 * Math.sin(Date.now() / 60);
        // Upper thruster
        const exhaustGrad1 = ctx.createLinearGradient(player.x - 14, cy - 8, player.x, cy - 8);
        exhaustGrad1.addColorStop(0, `rgba(0,180,255,0)`);
        exhaustGrad1.addColorStop(1, `rgba(0,255,200,${0.9 * flicker})`);
        ctx.fillStyle = exhaustGrad1;
        ctx.beginPath();
        ctx.moveTo(player.x, cy - 6);
        ctx.lineTo(player.x - 12 * flicker, cy - 9);
        ctx.lineTo(player.x - 12 * flicker, cy - 5);
        ctx.closePath();
        ctx.fill();
        // Lower thruster
        const exhaustGrad2 = ctx.createLinearGradient(player.x - 14, cy + 8, player.x, cy + 8);
        exhaustGrad2.addColorStop(0, `rgba(0,180,255,0)`);
        exhaustGrad2.addColorStop(1, `rgba(0,255,200,${0.9 * flicker})`);
        ctx.fillStyle = exhaustGrad2;
        ctx.beginPath();
        ctx.moveTo(player.x, cy + 6);
        ctx.lineTo(player.x - 12 * flicker, cy + 9);
        ctx.lineTo(player.x - 12 * flicker, cy + 5);
        ctx.closePath();
        ctx.fill();

        // ── Main hull — forward-pointing fighter ──
        // Drawn facing right (→). Origin at (player.x, player.y), center at (cx, cy).
        ctx.beginPath();
        // Nose tip
        ctx.moveTo(player.x + W, cy);
        // Upper wing leading edge
        ctx.lineTo(player.x + W * 0.55, cy - H * 0.28);
        // Upper fuselage shoulder
        ctx.lineTo(player.x + W * 0.3, cy - H * 0.18);
        // Upper wing root / tail fin
        ctx.lineTo(player.x + W * 0.1, cy - H * 0.5);
        // Rear top
        ctx.lineTo(player.x, cy - H * 0.18);
        // Rear flat
        ctx.lineTo(player.x, cy + H * 0.18);
        // Lower wing root / tail fin
        ctx.lineTo(player.x + W * 0.1, cy + H * 0.5);
        // Lower fuselage shoulder
        ctx.lineTo(player.x + W * 0.3, cy + H * 0.18);
        // Lower wing leading edge
        ctx.lineTo(player.x + W * 0.55, cy + H * 0.28);
        ctx.closePath();

        // Hull fill — green-to-teal gradient nose-to-tail
        const hullGrad = ctx.createLinearGradient(player.x, cy, player.x + W, cy);
        hullGrad.addColorStop(0, '#007744');
        hullGrad.addColorStop(0.5, '#00cc66');
        hullGrad.addColorStop(1, '#00ffaa');
        ctx.fillStyle = hullGrad;
        ctx.fill();

        // Hull outline
        ctx.strokeStyle = '#88ffdd';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // ── Cockpit canopy ──
        ctx.beginPath();
        ctx.ellipse(player.x + W * 0.6, cy, W * 0.14, H * 0.12, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(150, 255, 220, 0.85)';
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.stroke();

        // ── Engine block (rear center) ──
        ctx.fillStyle = '#005533';
        ctx.beginPath();
        ctx.roundRect(player.x, cy - 5, W * 0.18, 10, 2);
        ctx.fill();

        // ── Shield indicator ──
        if (hasPowerup('shield')) {
            const shieldLevel = getPowerupLevel('shield');
            const alpha = 0.45 + shieldLevel * 0.15;
            ctx.strokeStyle = `rgba(0, 220, 255, ${alpha})`;
            ctx.lineWidth = 2 + shieldLevel;
            ctx.shadowColor = '#00ddff';
            ctx.shadowBlur = 8 + shieldLevel * 4;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
                const r = 26 + shieldLevel * 2;
                if (i === 0) ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
                else ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // ── Crystal DR ring — permanent after defeating the Crystal boss ──
        if (player.crystalShieldReduction < 1.0) {
            const drStacks = Math.round((1.0 - player.crystalShieldReduction) / 0.05 * 20) / 20;
            const ringAlpha = 0.25 + drStacks * 0.15;
            const ringR = 32;
            const now = Date.now();
            // Slow rotating dashed ring in crystal cyan
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(now / 4000);
            ctx.strokeStyle = `hsla(195, 90%, 72%, ${ringAlpha})`;
            ctx.lineWidth = 1.2;
            ctx.shadowColor = 'hsl(195, 100%, 80%)';
            ctx.shadowBlur = 5;
            ctx.setLineDash([4, 6]);
            ctx.beginPath();
            ctx.arc(0, 0, ringR, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        // ── Damage boost: glowing red wing tips ──
        if (hasPowerup('damage_boost')) {
            const lvl = getPowerupLevel('damage_boost');
            ctx.fillStyle = `rgba(255, 60, 60, ${0.6 + lvl * 0.13})`;
            ctx.shadowColor = '#ff3333';
            ctx.shadowBlur = 6 + lvl * 3;
            // Upper wingtip dot
            ctx.beginPath();
            ctx.arc(player.x + W * 0.1, cy - H * 0.5, 3, 0, Math.PI * 2);
            ctx.fill();
            // Lower wingtip dot
            ctx.beginPath();
            ctx.arc(player.x + W * 0.1, cy + H * 0.5, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // ── Spectrum Immersion aura ──
        if (spectrumImmersed) {
            const t = Date.now() / 400;
            const hue = (t * 60) % 360;
            // Outer rotating rainbow ring
            ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
            ctx.shadowBlur = 22;
            ctx.strokeStyle = `hsla(${hue}, 100%, 65%, 0.85)`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(cx, cy, 36, 0, Math.PI * 2);
            ctx.stroke();
            // Second ring offset
            ctx.strokeStyle = `hsla(${(hue + 120) % 360}, 100%, 65%, 0.5)`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(cx, cy, 42, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
            // "IMMERSED" label above ship
            ctx.font = 'bold 9px Courier New';
            ctx.textAlign = 'center';
            ctx.fillStyle = `hsla(${hue}, 100%, 75%, 0.9)`;
            ctx.fillText('✦ IMMERSED ✦', cx, player.y - 20);
        }

        // ── Homing aura (always-on core ability) — soft magenta ring ──
        ctx.strokeStyle = 'rgba(255, 0, 255, 0.3)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 5]);
        ctx.beginPath();
        ctx.arc(cx, cy, 34, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);

        // ── Health bar above ship ──
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(player.x - 2, player.y - 14, W + 4, 6);
        const hpColor = player.health > 50 ? '#00ff88' : player.health > 25 ? '#ffaa00' : '#ff3333';
        ctx.fillStyle = hpColor;
        ctx.fillRect(player.x - 2, player.y - 14, ((W + 4) * player.health / 100), 6);

        ctx.restore();
    }

    function drawEnemies() {
        enemies.forEach(enemy => {
            const cx = enemy.x + enemy.width / 2;
            const cy = enemy.y + enemy.height / 2;
            const W = enemy.width;   // 30
            const H = enemy.height;  // 30

            if (!enemy.isAlive) {
                // Animated expanding debris ring
                for (let i = 0; i < 10; i++) {
                    const angle = (i / 10) * Math.PI * 2;
                    const dist = 18 + Math.sin(Date.now() / 80 + i) * 4;
                    ctx.fillStyle = enemy.color;
                    ctx.globalAlpha = 0.7;
                    ctx.beginPath();
                    ctx.arc(
                        cx + Math.cos(angle) * dist,
                        cy + Math.sin(angle) * dist,
                        2.5, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
                // Inner ember
                ctx.fillStyle = '#ffaa00';
                ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 60);
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                return;
            }

            ctx.save();

            // ── Glow ──
            const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 44);
            glow.addColorStop(0, `hsla(${parseInt(enemy.color.match(/\d+/)[0])}, 100%, 50%, 0.3)`);
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(cx, cy, 44, 0, Math.PI * 2);
            ctx.fill();

            // ── Engine exhaust (on right side — enemy faces left) ──
            const flicker = 0.6 + 0.4 * Math.sin(Date.now() / 55 + cx);
            const exGrad = ctx.createLinearGradient(enemy.x + W, cy, enemy.x + W + 14, cy);
            exGrad.addColorStop(0, `rgba(255,120,0,${0.9 * flicker})`);
            exGrad.addColorStop(1, 'rgba(255,60,0,0)');
            ctx.fillStyle = exGrad;
            ctx.beginPath();
            ctx.moveTo(enemy.x + W, cy - 4);
            ctx.lineTo(enemy.x + W + 13 * flicker, cy - 2);
            ctx.lineTo(enemy.x + W + 13 * flicker, cy + 2);
            ctx.lineTo(enemy.x + W, cy + 4);
            ctx.closePath();
            ctx.fill();

            // ── Main hull — angular left-facing predator ──
            // Enemy faces LEFT (←). Nose tip at left side.
            ctx.beginPath();
            // Nose tip (left)
            ctx.moveTo(enemy.x, cy);
            // Upper jaw / forward edge
            ctx.lineTo(enemy.x + W * 0.32, cy - H * 0.22);
            // Upper fuselage
            ctx.lineTo(enemy.x + W * 0.52, cy - H * 0.16);
            // Upper wing spike (swept back)
            ctx.lineTo(enemy.x + W * 0.62, cy - H * 0.52);
            // Upper wing inner notch
            ctx.lineTo(enemy.x + W * 0.72, cy - H * 0.28);
            // Rear top
            ctx.lineTo(enemy.x + W, cy - H * 0.14);
            // Rear flat
            ctx.lineTo(enemy.x + W, cy + H * 0.14);
            // Lower wing inner notch
            ctx.lineTo(enemy.x + W * 0.72, cy + H * 0.28);
            // Lower wing spike
            ctx.lineTo(enemy.x + W * 0.62, cy + H * 0.52);
            // Lower fuselage
            ctx.lineTo(enemy.x + W * 0.52, cy + H * 0.16);
            // Lower jaw
            ctx.lineTo(enemy.x + W * 0.32, cy + H * 0.22);
            ctx.closePath();

            // Hull fill — hostile red-orange gradient
            const hullGrad = ctx.createLinearGradient(enemy.x + W, cy, enemy.x, cy);
            hullGrad.addColorStop(0, '#550000');
            hullGrad.addColorStop(0.45, enemy.color);
            hullGrad.addColorStop(1, '#ffcc44');
            ctx.fillStyle = hullGrad;
            ctx.fill();

            // Hull outline
            ctx.strokeStyle = '#ffddaa';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // ── Cockpit slit (narrow, menacing) ──
            ctx.beginPath();
            ctx.ellipse(enemy.x + W * 0.35, cy, W * 0.1, H * 0.07, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 40, 40, 0.9)';
            ctx.fill();
            // Glint
            ctx.fillStyle = 'rgba(255,180,180,0.7)';
            ctx.beginPath();
            ctx.ellipse(enemy.x + W * 0.33, cy - 1, W * 0.04, H * 0.025, 0, 0, Math.PI * 2);
            ctx.fill();

            // ── Wing accent lines ──
            ctx.strokeStyle = 'rgba(255,180,80,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(enemy.x + W * 0.62, cy - H * 0.52);
            ctx.lineTo(enemy.x + W * 0.52, cy - H * 0.16);
            ctx.moveTo(enemy.x + W * 0.62, cy + H * 0.52);
            ctx.lineTo(enemy.x + W * 0.52, cy + H * 0.16);
            ctx.stroke();

            // ── Health bar above ship ──
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillRect(enemy.x - 2, enemy.y - 14, W + 4, 6);
            const hpPct = enemy.health / enemy.maxHealth;
            const hpColor = hpPct > 0.5 ? enemy.color : hpPct > 0.25 ? '#ffaa00' : '#ff3333';
            ctx.fillStyle = hpColor;
            ctx.fillRect(enemy.x - 2, enemy.y - 14, (W + 4) * hpPct, 6);

            ctx.restore();
        });
    }

    function drawBullets() {
        bullets.forEach(bullet => {
            ctx.save();
            if (bullet.owner === 'player') {
                // Sleek elongated energy bolt — tapered with a glowing core
                const bx = bullet.x, by = bullet.y + bullet.height / 2;
                // Outer glow
                const bGlow = ctx.createLinearGradient(bx - 4, by, bx + bullet.width + 2, by);
                bGlow.addColorStop(0, 'rgba(0,255,136,0)');
                bGlow.addColorStop(0.3, 'rgba(0,255,136,0.4)');
                bGlow.addColorStop(1, 'rgba(180,255,220,0.7)');
                ctx.fillStyle = bGlow;
                ctx.beginPath();
                ctx.ellipse(bx + bullet.width / 2, by, bullet.width / 2 + 4, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                // Core bolt — pointed diamond shape
                ctx.fillStyle = '#ccffee';
                ctx.beginPath();
                ctx.moveTo(bx + bullet.width, by);           // nose
                ctx.lineTo(bx + bullet.width * 0.6, by - 2); // upper body
                ctx.lineTo(bx, by);                           // tail
                ctx.lineTo(bx + bullet.width * 0.6, by + 2); // lower body
                ctx.closePath();
                ctx.fill();
                // Hot tip
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(bx + bullet.width - 1, by, 1.5, 0, Math.PI * 2);
                ctx.fill();
                // Homing magenta trail
                if (bullet.homing) {
                    const trail = ctx.createLinearGradient(bx - 8, by, bx, by);
                    trail.addColorStop(0, 'rgba(255,0,255,0)');
                    trail.addColorStop(1, 'rgba(255,0,255,0.35)');
                    ctx.fillStyle = trail;
                    ctx.beginPath();
                    ctx.ellipse(bx - 4, by, 8, 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else {
                // Enemy projectile — angular red spike
                const bx = bullet.x + bullet.width, by = bullet.y + bullet.height / 2;
                // Glow
                const eGlow = ctx.createLinearGradient(bx, by, bx - bullet.width - 4, by);
                eGlow.addColorStop(0, 'rgba(255,80,0,0)');
                eGlow.addColorStop(0.4, 'rgba(255,60,0,0.45)');
                eGlow.addColorStop(1, 'rgba(255,200,0,0.6)');
                ctx.fillStyle = eGlow;
                ctx.beginPath();
                ctx.ellipse(bx - bullet.width / 2, by, bullet.width / 2 + 3, 3.5, 0, 0, Math.PI * 2);
                ctx.fill();
                // Spike shape — reversed for left-travel
                ctx.fillStyle = '#ffcc44';
                ctx.beginPath();
                ctx.moveTo(bx - bullet.width, by);           // nose (left)
                ctx.lineTo(bx - bullet.width * 0.45, by - 2);
                ctx.lineTo(bx, by);                           // tail
                ctx.lineTo(bx - bullet.width * 0.45, by + 2);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(bx - bullet.width + 1, by, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        });
    }

    function drawPellets() {
        const hasActiveCombo = player.powerups.length > 0;
        const pcx = player.x + player.width / 2;
        const pcy = player.y + player.height / 2;
        const ATTRACT_RADIUS = 190;

        pellets.forEach(pellet => {
            const pulseSize = Math.sin(pellet.pulse) * 3;

            // Tether line toward player when combo is active and in range
            if (hasActiveCombo) {
                const dx = pcx - pellet.x;
                const dy = pcy - pellet.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < ATTRACT_RADIUS) {
                    const alpha = (1 - dist / ATTRACT_RADIUS) * 0.45;
                    ctx.save();
                    ctx.strokeStyle = pellet.color.replace(')', `, ${alpha})`).replace('hsl', 'hsla');
                    ctx.lineWidth = 1;
                    ctx.setLineDash([4, 6]);
                    ctx.beginPath();
                    ctx.moveTo(pellet.x, pellet.y);
                    ctx.lineTo(pcx, pcy);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();
                }
            }

            ctx.fillStyle = pellet.color;
            ctx.beginPath();
            ctx.arc(pellet.x, pellet.y, pellet.radius + pulseSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = pellet.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(pellet.x, pellet.y, pellet.radius + pulseSize + 5, 0, Math.PI * 2);
            ctx.stroke();
        });
    }

    function drawBombs() {
        bombs.forEach(bomb => {
            if (bomb.phase === 'detonating') return; // handled by drawExplosions
            ctx.save();
            const t = Date.now() / 1000;
            bomb.pulseAngle = t * 4;

            if (bomb.phase === 'armed') {
                // Warning ring — pulsing red danger indicator
                const armPct = bomb.armTimer / bomb.armDuration;
                const ringAlpha = 0.15 + 0.35 * Math.abs(Math.sin(t * 12));
                ctx.strokeStyle = `rgba(255,40,0,${ringAlpha})`;
                ctx.lineWidth = 2;
                ctx.setLineDash([6, 4]);
                ctx.beginPath();
                ctx.arc(bomb.x, bomb.y, bomb.blastRadius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                // Countdown fill wedge
                ctx.fillStyle = `rgba(255,60,0,${0.06 + armPct * 0.1})`;
                ctx.beginPath();
                ctx.moveTo(bomb.x, bomb.y);
                ctx.arc(bomb.x, bomb.y, bomb.blastRadius, -Math.PI / 2, -Math.PI / 2 + armPct * Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            // Bomb body
            const fuseGlow = bomb.phase === 'armed' ? 1 : (bomb.fuseTimer / bomb.fuseDuration);
            const bodyGrad = ctx.createRadialGradient(bomb.x - 3, bomb.y - 3, 0, bomb.x, bomb.y, bomb.radius);
            bodyGrad.addColorStop(0, '#ffee88');
            bodyGrad.addColorStop(0.5, `hsl(${20 + fuseGlow * 10}, 100%, 45%)`);
            bodyGrad.addColorStop(1, '#330000');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.arc(bomb.x, bomb.y, bomb.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#ff8800';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Spinning danger spikes
            const spikeCount = 6;
            ctx.strokeStyle = `rgba(255,${Math.floor(100 + fuseGlow * 100)},0,0.7)`;
            ctx.lineWidth = 1;
            for (let s = 0; s < spikeCount; s++) {
                const a = bomb.pulseAngle + (s / spikeCount) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(bomb.x + Math.cos(a) * bomb.radius, bomb.y + Math.sin(a) * bomb.radius);
                ctx.lineTo(bomb.x + Math.cos(a) * (bomb.radius + 5), bomb.y + Math.sin(a) * (bomb.radius + 5));
                ctx.stroke();
            }

            // Fuse spark
            if (bomb.phase === 'flying') {
                ctx.fillStyle = `rgba(255,220,0,${0.5 + 0.5 * Math.sin(t * 20)})`;
                ctx.beginPath();
                ctx.arc(bomb.x + bomb.radius * 0.7, bomb.y - bomb.radius * 0.7, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        });
    }

    function drawExplosions() {
        for (let i = explosions.length - 1; i >= 0; i--) {
            const ex = explosions[i];
            ex.frame++;
            const pct = ex.frame / ex.duration;
            if (pct >= 1) { explosions.splice(i, 1); continue; }

            ctx.save();
            // Outer shockwave ring
            const ringR = ex.blastRadius * pct;
            const ringAlpha = (1 - pct) * 0.6;
            ctx.strokeStyle = `rgba(255,160,0,${ringAlpha})`;
            ctx.lineWidth = 4 * (1 - pct);
            ctx.beginPath();
            ctx.arc(ex.x, ex.y, ringR, 0, Math.PI * 2);
            ctx.stroke();

            // Inner fireball
            const fireR = Math.max(1, ex.blastRadius * 0.55 * (1 - pct * 0.7));
            const fireGrad = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, fireR);
            fireGrad.addColorStop(0, `rgba(255,255,200,${(1 - pct) * 0.9})`);
            fireGrad.addColorStop(0.4, `rgba(255,120,0,${(1 - pct) * 0.7})`);
            fireGrad.addColorStop(1, 'rgba(180,0,0,0)');
            ctx.fillStyle = fireGrad;
            ctx.beginPath();
            ctx.arc(ex.x, ex.y, fireR, 0, Math.PI * 2);
            ctx.fill();

            // Debris particles
            ex.particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.1; // gravity
                const pa = (1 - pct) * 0.8;
                ctx.fillStyle = `rgba(255,${Math.floor(80 + Math.random() * 120)},0,${pa})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * (1 - pct * 0.5), 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }
    }
    function drawLaserBeams() {
        for (let i = laserBeams.length - 1; i >= 0; i--) {
            const beam = laserBeams[i];
            beam.life--;
            if (beam.life <= 0) { laserBeams.splice(i, 1); continue; }

            const pct = beam.life / beam.maxLife;       // 1 → 0 as it fades
            const alpha = pct < 0.3 ? pct / 0.3 * 0.9 : 0.9;  // fade out tail

            // Hue shifts through the AMBIENT letters: blue → violet → cyan
            const hue = 190 + beam.letterIndex * 18;
            const coreHue = hue + 40;

            ctx.save();

            // Outer wide glow
            ctx.globalAlpha = alpha * 0.3;
            ctx.strokeStyle = `hsl(${hue}, 100%, 65%)`;
            ctx.lineWidth = 10 * pct + 3;
            ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
            ctx.shadowBlur = 18;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(beam.x1, beam.y1);
            ctx.lineTo(beam.x2, beam.y2);
            ctx.stroke();

            // Mid glow
            ctx.globalAlpha = alpha * 0.6;
            ctx.strokeStyle = `hsl(${hue}, 100%, 80%)`;
            ctx.lineWidth = 5 * pct + 1.5;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.moveTo(beam.x1, beam.y1);
            ctx.lineTo(beam.x2, beam.y2);
            ctx.stroke();

            // Core bright white line
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = `hsl(${coreHue}, 100%, 95%)`;
            ctx.lineWidth = 2 * pct + 0.5;
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.moveTo(beam.x1, beam.y1);
            ctx.lineTo(beam.x2, beam.y2);
            ctx.stroke();

            // Impact spark at enemy end (only while fresh)
            if (pct > 0.5) {
                const sparkAlpha = (pct - 0.5) / 0.5;
                ctx.globalAlpha = sparkAlpha;
                ctx.shadowColor = `hsl(${hue}, 100%, 80%)`;
                ctx.shadowBlur = 20;
                ctx.fillStyle = `hsl(${coreHue}, 100%, 90%)`;
                for (let s = 0; s < 6; s++) {
                    const a = (s / 6) * Math.PI * 2 + (1 - pct) * 8;
                    const r = (12 + s * 2) * (pct - 0.5) * 2;
                    ctx.beginPath();
                    ctx.moveTo(beam.x2, beam.y2);
                    ctx.lineTo(beam.x2 + Math.cos(a) * r, beam.y2 + Math.sin(a) * r);
                    ctx.lineWidth = 1.5;
                    ctx.strokeStyle = `hsl(${coreHue}, 100%, 90%)`;
                    ctx.stroke();
                }
                // Core flash dot
                ctx.beginPath();
                ctx.arc(beam.x2, beam.y2, 7 * (pct - 0.5) * 2 + 2, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.shadowBlur = 0;
            ctx.restore();
        }
    }

    // ─── Crystal Spike Drawing ────────────────────────────────────────────────
    function drawCrystals() {
        const now = Date.now();
        crystals.forEach(crystal => {
            if (!crystal.isAlive) return;

            // Clamp position to safe finite values
            const cx = isFinite(crystal.x) ? crystal.x : canvas.width * 0.7;
            const cy = isFinite(crystal.y) ? crystal.y : canvas.height * 0.4;

            // s = visual arm half-length, hard-capped
            const s       = Math.max(8, Math.min(60, crystal.size));
            const hue     = isFinite(crystal.hue) ? crystal.hue : 195;
            const hitPulse = (crystal.hitFlash > 0) ? Math.min(1, crystal.hitFlash / 12) : 0;
            const rot     = isFinite(crystal.rotation) ? crystal.rotation : 0;

            try {
                ctx.save();

                // Aura drawn in world space before translate, so gradient coords are simple screen coords
                const auraR  = 88;
                const auraIn = Math.min(s * 0.4, auraR * 0.78);
                const auraA  = 0.05 + 0.03 * Math.sin(now / 700);
                const ag = ctx.createRadialGradient(cx, cy, auraIn, cx, cy, auraR);
                ag.addColorStop(0,   `hsla(${hue},85%,72%,${+(auraA*2).toFixed(3)})`);
                ag.addColorStop(0.6, `hsla(${hue},75%,52%,${+auraA.toFixed(3)})`);
                ag.addColorStop(1,   `hsla(${hue},65%,38%,0)`);
                ctx.fillStyle = ag;
                ctx.beginPath();
                ctx.arc(cx, cy, auraR, 0, Math.PI * 2);
                ctx.fill();

                // Now translate for prism geometry
                ctx.translate(cx, cy);
                ctx.rotate(rot);

                const w = s * 0.30;
                const h = s;

                for (let arm = 0; arm < 2; arm++) {
                    ctx.save();
                    ctx.rotate(arm * Math.PI / 2);

                    ctx.shadowBlur = 0;
                    const pg = ctx.createLinearGradient(-w, 0, w, 0);
                    pg.addColorStop(0,    `hsla(${hue},60%,50%,0.80)`);
                    pg.addColorStop(0.35, `hsla(${hue},78%,76%,0.92)`);
                    pg.addColorStop(0.5,  `hsla(${hue+15},100%,96%,0.98)`);
                    pg.addColorStop(0.65, `hsla(${hue},78%,76%,0.92)`);
                    pg.addColorStop(1,    `hsla(${hue},60%,50%,0.80)`);
                    ctx.beginPath();
                    ctx.moveTo(0,-h); ctx.lineTo(w,0); ctx.lineTo(0,h); ctx.lineTo(-w,0);
                    ctx.closePath();
                    ctx.fillStyle = pg;
                    ctx.fill();

                    ctx.strokeStyle = `hsla(${hue},50%,42%,0.38)`;
                    ctx.lineWidth = 0.8;
                    ctx.beginPath();
                    ctx.moveTo(0,-h*0.5); ctx.lineTo(-w*0.88,0); ctx.lineTo(0,h*0.5);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0,-h*0.5); ctx.lineTo(w*0.88,0); ctx.lineTo(0,h*0.5);
                    ctx.stroke();

                    ctx.shadowColor = `hsl(${hue+20},100%,90%)`;
                    ctx.shadowBlur  = 5 + hitPulse * 8;
                    ctx.strokeStyle = `hsla(${hue+20},100%,96%,${+(0.72+hitPulse*0.28).toFixed(3)})`;
                    ctx.lineWidth   = 1.1 + hitPulse * 0.7;
                    ctx.beginPath();
                    ctx.moveTo(0,-h*0.82); ctx.lineTo(0,h*0.82);
                    ctx.stroke();

                    ctx.shadowBlur = 3;
                    ctx.fillStyle  = `hsla(${hue+10},100%,95%,${+(0.55+hitPulse*0.45).toFixed(3)})`;
                    ctx.beginPath(); ctx.arc(0,-h*0.93,1.6,0,Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(0, h*0.93,1.6,0,Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }

                const coreR = Math.max(2.5, s * 0.16 + hitPulse * s * 0.07);
                const pulse = 0.72 + 0.28 * Math.sin(now / 190);
                ctx.shadowColor = '#fff';
                ctx.shadowBlur  = 7 + hitPulse * 10;
                const cg2 = ctx.createRadialGradient(0, 0, 0, 0, 0, coreR);
                cg2.addColorStop(0,    `rgba(255,255,255,${+(0.95*pulse).toFixed(3)})`);
                cg2.addColorStop(0.45, `hsla(${hue},100%,82%,${+(0.78*pulse).toFixed(3)})`);
                cg2.addColorStop(1,    `hsla(${hue},78%,52%,0)`);
                ctx.fillStyle = cg2;
                ctx.beginPath(); ctx.arc(0,0,coreR,0,Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;

                // Health bar — segmented, shows health/maxHealth
                const barW  = Math.max(40, s * 2.2);
                const barH  = 5;
                const barX  = -barW / 2;
                const barY  = -(s + 16);
                const hpPct = Math.max(0, (crystal.health || 0) / (crystal.maxHealth || 1));

                // Track (background)
                ctx.fillStyle = 'rgba(30,30,50,0.70)';
                ctx.beginPath();
                ctx.roundRect(barX, barY, barW, barH, 2);
                ctx.fill();

                // Fill — colour shifts red as health drops
                const barHue = hpPct > 0.5 ? hue : hpPct > 0.25 ? 40 : 0;
                const barSat = hpPct > 0.5 ? 85 : 90;
                ctx.fillStyle = `hsla(${barHue},${barSat}%,65%,0.90)`;
                ctx.beginPath();
                ctx.roundRect(barX, barY, barW * hpPct, barH, 2);
                ctx.fill();

                // Border
                ctx.strokeStyle = `hsla(${hue},60%,60%,0.50)`;
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.roundRect(barX, barY, barW, barH, 2);
                ctx.stroke();

                ctx.restore();
            } catch(e) {
                console.warn('drawCrystals err:', e.message, {cx, cy, s, hue, rot});
                try { ctx.restore(); } catch(_) {}
            }

            crystal.rotation = (crystal.rotation + 0.003 + crystal.absorbedMass * 0.0005) % (Math.PI * 2);
            if (crystal.hitFlash > 0) crystal.hitFlash--;
        });
    }


    // ─── Comet Drawing ────────────────────────────────────────────────────────
    function drawComets() {
        comets.forEach(comet => {
            if (!isFinite(comet.x) || !isFinite(comet.y)) return;
            const safeR = Math.max(1, comet.radius);

            ctx.save();

            // Draw tail first (oldest → newest, back to front)
            comet.tail.forEach((pt, ti) => {
                if (!isFinite(pt.x) || !isFinite(pt.y)) return;
                const a = (ti / comet.tail.length) * 0.45;
                const r = Math.max(0.5, safeR * (ti / comet.tail.length) * 0.7);
                ctx.globalAlpha = a;
                ctx.fillStyle = `hsl(${comet.hue}, 80%, 70%)`;
                ctx.shadowColor = `hsl(${comet.hue}, 90%, 80%)`;
                ctx.shadowBlur = 4;
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
                ctx.fill();
            });

            // Comet head — glowing sphere with bright core
            ctx.globalAlpha = 1;
            const headGrad = ctx.createRadialGradient(comet.x, comet.y, 0, comet.x, comet.y, safeR * 1.6);
            headGrad.addColorStop(0,   'rgba(255,255,255,0.95)');
            headGrad.addColorStop(0.3, `hsla(${comet.hue}, 100%, 80%, 0.85)`);
            headGrad.addColorStop(0.7, `hsla(${comet.hue}, 80%, 55%, 0.5)`);
            headGrad.addColorStop(1,   `hsla(${comet.hue}, 70%, 40%, 0)`);
            ctx.fillStyle = headGrad;
            ctx.shadowColor = `hsl(${comet.hue}, 100%, 75%)`;
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(comet.x, comet.y, safeR * 1.4, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.restore();
        });
    }

    // ─── Wave Announcement Drawing ─────────────────────────────────────────────
    function drawWaveAnnouncement() {
        if (WC.announceFade <= 0) return;
        ctx.save();
        const pct  = WC.announceFade / 160;
        // Fade in on first 20%, hold, fade out on last 30%
        const alpha = pct < 0.2 ? pct / 0.2 : pct > 0.7 ? (pct - 0.7) / 0.3 * 0.0 + (1 - (pct - 0.7) / 0.3) : 1.0;

        // "BETWEEN" screen — wave cleared pause
        if (WC.phase === 'between') {
            ctx.globalAlpha = Math.min(1, alpha * 0.85);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(canvas.width / 2 - 150, canvas.height / 2 - 40, 300, 72);

            ctx.textAlign = 'center';
            ctx.shadowColor = '#88ccff';
            ctx.shadowBlur = 18;
            ctx.fillStyle = '#cceeff';
            ctx.font = 'bold 13px Courier New';
            ctx.fillText('WAVE CLEARED', canvas.width / 2, canvas.height / 2 - 10);
            ctx.font = 'bold 11px Courier New';
            ctx.fillStyle = 'rgba(180,210,255,0.75)';
            ctx.fillText(`NEXT: WAVE ${WC.wave + 1}  ·  TARGET ${WC.waveKillGoal} KILLS`, canvas.width / 2, canvas.height / 2 + 14);
        } else {
            // New wave incoming
            ctx.globalAlpha = Math.min(1, alpha);
            ctx.textAlign = 'center';
            ctx.shadowColor = '#00ffaa';
            ctx.shadowBlur = 22;
            ctx.fillStyle = '#88ffcc';
            ctx.font = `bold ${Math.round(22 + (1 - pct) * 8)}px Courier New`;
            ctx.fillText(`WAVE  ${WC.wave}`, canvas.width / 2, canvas.height / 2 - 10);
            const peak = WC.getCurrentPeak();
            ctx.font = 'bold 11px Courier New';
            ctx.fillStyle = 'rgba(140,255,200,0.7)';
            ctx.fillText(`MAX ENEMIES  ${peak}  ·  KILLS REQUIRED  ${WC.waveKillGoal}`, canvas.width / 2, canvas.height / 2 + 14);
        }
        ctx.shadowBlur = 0;
        ctx.restore();
    }

    function drawHUD() {
        ctx.save();
        ctx.font = 'bold 13px Courier New';
        ctx.textAlign = 'left';

        // Top bar background
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, canvas.width, 32);

        // Health
        ctx.fillStyle = '#00ff88';
        ctx.fillText('HP', 10, 20);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(34, 8, 100, 14);
        const hpColor = player.health > 50 ? '#00ff88' : player.health > 25 ? '#ffaa00' : '#ff3333';
        ctx.fillStyle = hpColor;
        ctx.fillRect(34, 8, player.health, 14);
        ctx.fillStyle = '#fff';
        ctx.font = '10px Courier New';
        ctx.fillText(player.health, 140, 20);

        // Score — top bar small display
        ctx.font = 'bold 13px Courier New';

        // ── Large flashing score (drawn separately, outside top-bar save/restore) ──

            scoreFlashTimer--;

            const alpha = 0.6 + flashPct * 0.4;

            ctx.globalAlpha = alpha;
            ctx.font = `bold ${Math.round(28 * scale)}px Courier New`;

            ctx.shadowColor = '#88ccff';
            ctx.shadowBlur = 12 + flashPct * 20;

            ctx.fillText(player.score, canvas.width / 2, 80);
            ctx.shadowBlur = 0;
            ctx.restore();
        } else {
            // Steady small score anchored center-top at all times
            ctx.save();
            ctx.globalAlpha = 0.55;
            ctx.font = 'bold 20px Courier New';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#88ccff';
            ctx.fillText(player.score, canvas.width / 2, 80);
            ctx.restore();
        }

        ctx.save(); // re-open save for the powerup bars below
        ctx.font = 'bold 13px Courier New';
        ctx.textAlign = 'left';

        // Wave + enemies display
        const alive = enemies.filter(e => e.isAlive).length + crystals.filter(c => c.isAlive).length;
        ctx.fillStyle = '#ff6666';
        ctx.fillText(`ENEMIES  ${alive}`, 380, 20);
        // Wave progress bar — thin line under enemies count
        ctx.fillStyle = 'rgba(100,200,255,0.25)';
        ctx.fillRect(380, 24, 120, 3);
        const wavePct = Math.min(1, WC.waveKills / WC.waveKillGoal);
        ctx.fillStyle = WC.phase === 'between' ? 'rgba(100,255,180,0.7)' : 'rgba(100,200,255,0.65)';
        ctx.fillRect(380, 24, 120 * wavePct, 3);
        // Wave number small label
        ctx.fillStyle = 'rgba(140,220,255,0.7)';
        ctx.font = '9px Courier New';
        ctx.textAlign = 'left';
        ctx.fillText(`W${WC.wave}`, 504, 22);

        // Pellets until powerup counter
        const pUntil = pelletsUntilNextPowerup();
        ctx.fillStyle = '#ffaa00';
        ctx.textAlign = 'right';
        ctx.fillText(`POWERUP IN  ${pUntil} pellet${pUntil !== 1 ? 's' : ''}`, canvas.width - 10, 20);

        // ── Powerup bars (bottom of HUD area, above game) ──
        if (player.powerups.length > 0 || player.crystalShieldReduction < 1.0) {
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillRect(0, 32, canvas.width, 22);

            let barX = 8;
            player.powerups.forEach(p => {
                const pct = p.timer / POWERUP_DURATION;
                const barW = 110;

                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(barX, 36, barW, 10);

                const barColor = pct > 0.5 ? '#00ff88' : pct > 0.25 ? '#ffaa00' : '#ff3333';
                ctx.fillStyle = barColor;
                ctx.fillRect(barX, 36, barW * pct, 10);

                ctx.fillStyle = '#fff';
                ctx.font = '9px Courier New';
                ctx.textAlign = 'left';
                const stars = '★'.repeat(p.level);
                ctx.fillText(`${POWERUP_NAMES[p.type]} ${stars}`, barX, 34);

                barX += barW + 12;
            });

            // Crystal DR badge — permanent, shown right of other powerups
            if (player.crystalShieldReduction < 1.0) {
                const pct = Math.round((1 - player.crystalShieldReduction) * 100);
                ctx.fillStyle = 'rgba(0,0,0,0)'; // transparent bg — badge only
                ctx.font = 'bold 9px Courier New';
                ctx.textAlign = 'left';
                ctx.shadowColor = 'hsl(195,100%,75%)';
                ctx.shadowBlur = 6;
                ctx.fillStyle = 'hsl(195,90%,72%)';
                ctx.fillText(`❋ CRYSTAL WARD  -${pct}% DMG`, barX, 34);
                ctx.shadowBlur = 0;
            }
        }

        ctx.restore();

    function drawAmbientLetters() {
        if (ambientLettersRevealed === 0 && ambientClearFlash === 0) return;

        ctx.save();

        const letters = AMBIENT_WORD.split('');
        const letterSpacing = 32;
        const startX = canvas.width - 20 - (letters.length - 1) * letterSpacing;
        const y = 70;

        // Full-word clear flash — brief white bloom across the letters
        if (ambientClearFlash > 0) {
            const flashAlpha = (ambientClearFlash / 40) * 0.35;
            ctx.fillStyle = `rgba(180, 230, 255, ${flashAlpha})`;
            ctx.fillRect(startX - 14, y - 22, letters.length * letterSpacing + 10, 30);
        }

        letters.forEach((letter, i) => {
            const revealed = i < ambientLettersRevealed;
            const x = startX + i * letterSpacing;

            if (revealed) {
                // Revealed: softly glowing, low-alpha so it doesn't distract
                const glowAlpha = ambientClearFlash > 0
                    ? 0.55 + (ambientClearFlash / 40) * 0.45
                    : 0.45;
                ctx.shadowColor = '#88ccff';
                ctx.shadowBlur = ambientClearFlash > 0 ? 18 : 6;
                ctx.fillStyle = `rgba(160, 210, 255, ${glowAlpha})`;
                ctx.font = 'bold 18px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(letter, x, y);
                ctx.shadowBlur = 0;
            } else {
                // Unrevealed: barely visible placeholder
                ctx.fillStyle = 'rgba(80, 100, 140, 0.18)';
                ctx.font = 'bold 18px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(letter, x, y);
            }
        });

        // Tiny combo-window progress bar beneath the letters when timer is active
        if (ambientComboTimer > 0 && ambientLettersRevealed > 0 && ambientLettersRevealed < 7) {
            const barW = (letters.length - 1) * letterSpacing + 14;
            const barX = startX - 7;
            const pct = ambientComboTimer / AMBIENT_COMBO_WINDOW;
            ctx.fillStyle = 'rgba(80,100,140,0.25)';
            ctx.fillRect(barX, y + 5, barW, 2);
            ctx.fillStyle = `rgba(120,180,255,${0.35 + pct * 0.25})`;
            ctx.fillRect(barX, y + 5, barW * pct, 2);
        }

        ctx.restore();
    }
