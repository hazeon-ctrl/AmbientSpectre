    // ─── AMBIENT Laser Strike ─────────────────────────────────────────────────
    function fireAmbientLaser(letterIndex) {
        // Find the nearest alive target — enemy or crystal
        const px = player.x + player.width / 2;
        const py = player.y + player.height / 2;
        let nearestEnemy = null;
        let nearestDist = Infinity;
        enemies.forEach(enemy => {
            if (!enemy.isAlive) return;
            const ex = enemy.x + enemy.width / 2;
            const ey = enemy.y + enemy.height / 2;
            const d = Math.sqrt((ex - px) * (ex - px) + (ey - py) * (ey - py));
            if (d < nearestDist) { nearestDist = d; nearestEnemy = { obj: enemy, x: ex, y: ey, isCrystal: false }; }
        });
        crystals.forEach(crys => {
            if (!crys.isAlive) return;
            const d = Math.sqrt((crys.x - px) ** 2 + (crys.y - py) ** 2);
            if (d < nearestDist) { nearestDist = d; nearestEnemy = { obj: crys, x: crys.x, y: crys.y, isCrystal: true }; }
        });
        if (!nearestEnemy) return;

        const { x: ex, y: ey, obj, isCrystal } = nearestEnemy;

        // Deal damage
        const damage = 25 + letterIndex * 8;
        if (isCrystal) {
            obj.health -= damage;
            obj.hitFlash = 12;
        } else {
            obj.health -= damage;
        }

        // Laser beam visual
        laserBeams.push({
            x1: px + player.width / 2,
            y1: py,
            x2: ex, y2: ey,
            life: 22, maxLife: 22,
            letterIndex,
            targetEnemy: obj
        });
        createAmbientLaserSound(letterIndex);

        // Kill handling
        const isDead = isCrystal ? obj.health <= 0 : obj.health <= 0;
        if (isDead) {
            if (isCrystal) {
                obj.isAlive = false;
                enemiesDestroyed++;
                player.score += 150;
                scoreFlashTimer = 50;
                player.crystalShieldReduction = Math.max(0.70, player.crystalShieldReduction * 0.95);
                createCrystalDeathSound();
                spawnKillStar(obj);
                WC.registerKill(true);
                explosions.push({ x: ex, y: ey, blastRadius: 70, frame: 0, duration: 50, particles: [] });
            } else {
                obj.isAlive = false;
                enemiesDestroyed++;
                player.score += 50;
                scoreFlashTimer = 40;
                createExplosionSound();
                spawnKillStar(obj);
                WC.registerKill(false);
                const particles = [];
                for (let p = 0; p < 12; p++) {
                    const a = Math.random() * Math.PI * 2, s = 1.5 + Math.random() * 3.5;
                    particles.push({ x: ex, y: ey, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 0.5, r: 2 + Math.random() * 3 });
                }
                explosions.push({ x: ex, y: ey, blastRadius: 55, frame: 0, duration: 40, particles });
                setTimeout(() => {
                    const idx = enemies.indexOf(obj);
                    if (idx > -1) enemies.splice(idx, 1);
                }, 500);
            }
        }
    }

    // ─── AMBIENT Clear ────────────────────────────────────────────────────────
    function triggerAmbientClear() {
        // Destroy all living enemies instantly
        enemies.forEach(enemy => {
            if (!enemy.isAlive) return;
            enemy.isAlive = false;
            enemiesDestroyed++;
            player.score += 50;
            scoreFlashTimer = 50;
            spawnKillStar(enemy);
            WC.registerKill(false);
            // Spawn explosion for each
            const cx = enemy.x + enemy.width / 2;
            const cy = enemy.y + enemy.height / 2;
            const particles = [];
            for (let p = 0; p < 14; p++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 4;
                particles.push({ x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1, r: 2 + Math.random() * 4 });
            }
            explosions.push({ x: cx, y: cy, blastRadius: 60, frame: 0, duration: 45, particles });
            setTimeout(() => {
                const idx = enemies.indexOf(enemy);
                if (idx > -1) enemies.splice(idx, 1);
            }, 500);
        });
        // Also destroy crystals in an ambient clear
        crystals.forEach(crys => {
            if (!crys.isAlive) return;
            crys.isAlive = false;
            player.score += 150;
            spawnKillStar(crys);
            WC.registerKill(true);
            explosions.push({ x: crys.x, y: crys.y, blastRadius: 70, frame: 0, duration: 50, particles: [] });
        });
        // Also clear all enemy bullets, bombs, comets
        bullets = bullets.filter(b => b.owner !== 'enemy');
        bombs.length = 0;
        comets.length = 0;

        createAmbientClearSound();
        ambientClearFlash = 40;
        ambientLettersRevealed = 0;
        ambientComboTimer = 0;
        // ── Ambience: stars flare, sky revealed, constellations drawn ──
        constellationFlash = CONSTELLATION_DURATION;
        // Spawn a dense mote storm for the clear
        for (let burst = 0; burst < 4; burst++) spawnMoteCluster();
    }

    // ─── Update ───────────────────────────────────────────────────────────────
    function update() {
        // ── Harmonic Director tick — must be first so all sound calls this frame use new mode
        HD.update({
            health:        player.health,
            aliveEnemies:  enemies.filter(e => e.isAlive).length,
            comboLetters:  ambientLettersRevealed,
            enemiesKilled: enemiesDestroyed
        });
        tickDrone();

        // ── AMBIENT combo timer tick ──────────────────────────────────────────
        if (ambientComboTimer > 0) {
            ambientComboTimer--;
            if (ambientComboTimer === 0 && ambientLettersRevealed > 0) {
                // Window expired — reset progress
                ambientLettersRevealed = 0;
            }
        }
        if (ambientClearFlash > 0) ambientClearFlash--;

        // Movement — player confined to left half (by design)
        if ((keys['w'] || keys['arrowup'])    && player.y > 0)                            player.y -= player.speed;
        if ((keys['s'] || keys['arrowdown'])  && player.y < canvas.height - player.height) player.y += player.speed;
        if ((keys['a'] || keys['arrowleft'])  && player.x > 0)                            player.x -= player.speed;
        if ((keys['d'] || keys['arrowright']) && player.x < canvas.width / 2 - player.width) player.x += player.speed;

        // Powerup timers
        for (let i = player.powerups.length - 1; i >= 0; i--) {
            player.powerups[i].timer--;
            if (player.powerups[i].timer <= 0) player.powerups.splice(i, 1);
        }

        // ── Wave Controller tick ──────────────────────────────────────────────
        const aliveEnemies  = enemies.filter(e => e.isAlive).length;
        const aliveCrystals = crystals.filter(c => c.isAlive).length;
        const wcResult = WC.tick(aliveEnemies, aliveCrystals);

        if (wcResult.shouldSpawnEnemy)   spawnEnemy();
        if (wcResult.shouldSpawnCrystal) spawnCrystal();

        // ── Crystal update — attraction field + comet firing ─────────────────
        const pcx = player.x + player.width / 2;
        const pcy = player.y + player.height / 2;

        for (let ci = crystals.length - 1; ci >= 0; ci--) {
            const crys = crystals[ci];
            if (!crys.isAlive) { crystals.splice(ci, 1); continue; }

            // ── Attraction: pull bullets, bombs, pellets toward crystal ──
            const cx = crys.x, cy = crys.y;

            // Pull player bullets (consumes them — feeds the crystal)
            for (let bi = bullets.length - 1; bi >= 0; bi--) {
                const b = bullets[bi];
                if (b.owner !== 'player') continue;
                const dx = cx - b.x, dy = cy - b.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                // Only attract if outside hit range — inside, let bullet collision handle it
                if (dist < CRYSTAL_ATTRACT_RADIUS && dist > crys.size * 0.85) {
                    const str = 0.9 * (1 - dist / CRYSTAL_ATTRACT_RADIUS);
                    b.vx += (dx / dist) * str;
                    b.vy += (dy / dist) * str;
                }
                // Absorb stray bullets that reach the very core (slipped past hit check)
                if (dist < crys.size * 0.35) {
                    bullets.splice(bi, 1);
                    crys.absorbedMass++;
                    crys.health = Math.min(crys.maxHealth, crys.health + 8);
                    crys.size = Math.min(72, 28 + crys.absorbedMass * 1.8);
                    crys.cometInterval = Math.max(75, 220 - crys.absorbedMass * 10);
                }
            }

            // Pull enemy bullets (deflect, not consume — just redirect)
            bullets.forEach(b => {
                if (b.owner !== 'enemy') return;
                const dx = cx - b.x, dy = cy - b.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < CRYSTAL_ATTRACT_RADIUS * 0.7 && dist > 1) {
                    const str = 0.5 * (1 - dist / (CRYSTAL_ATTRACT_RADIUS * 0.7));
                    b.vx += (dx / dist) * str;
                    b.vy += (dy / dist) * str;
                }
            });

            // Pull bombs
            bombs.forEach(bomb => {
                if (bomb.phase !== 'flying') return;
                const dx = cx - bomb.x, dy = cy - bomb.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < CRYSTAL_ATTRACT_RADIUS && dist > 1) {
                    const str = 0.6 * (1 - dist / CRYSTAL_ATTRACT_RADIUS);
                    bomb.vx += (dx / dist) * str;
                    bomb.vy += (dy / dist) * str;
                    // Absorbed bomb — big mass gain
                    if (dist < crys.size + 12) {
                        const idx = bombs.indexOf(bomb);
                        if (idx > -1) bombs.splice(idx, 1);
                        crys.absorbedMass += 3;
                        crys.health = Math.min(crys.maxHealth, crys.health + 30);
                        crys.size = Math.min(72, 28 + crys.absorbedMass * 1.8);
                        crys.cometInterval = Math.max(75, 220 - crys.absorbedMass * 10);
                    }
                }
            });

            // Pull pellets
            for (let pi = pellets.length - 1; pi >= 0; pi--) {
                const p = pellets[pi];
                const dx = cx - p.x, dy = cy - p.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < CRYSTAL_ATTRACT_RADIUS && dist > 1) {
                    const str = 1.2 * (1 - dist / CRYSTAL_ATTRACT_RADIUS);
                    p.x += (dx / dist) * str;
                    p.y += (dy / dist) * str;
                    if (dist < crys.size + 8) {
                        pellets.splice(pi, 1);
                        crys.absorbedMass++;
                        crys.health = Math.min(crys.maxHealth, crys.health + 12);
                        crys.size = Math.min(72, 28 + crys.absorbedMass * 1.8);
                        crys.cometInterval = Math.max(75, 220 - crys.absorbedMass * 10);
                    }
                }
            }

            // ── Comet firing ──
            crys.cometTimer++;
            if (crys.cometTimer >= crys.cometInterval) {
                spawnComet(crys);
                createCometLaunchSound();
                crys.cometTimer = 0;
            }
        }

        // ── Comet update — move, home, tail, collide with player ────────────
        for (let ci = comets.length - 1; ci >= 0; ci--) {
            const comet = comets[ci];

            // Push tail point
            comet.tail.push({ x: comet.x, y: comet.y });
            if (comet.tail.length > comet.maxTail) comet.tail.shift();

            // Homing toward player
            const dx = pcx - comet.x, dy = pcy - comet.y;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            comet.vx += (dx / dist) * comet.homingStrength;
            comet.vy += (dy / dist) * comet.homingStrength;
            // Cap speed
            const spd = Math.sqrt(comet.vx*comet.vx + comet.vy*comet.vy);
            if (spd > 4.5) { comet.vx = (comet.vx/spd)*4.5; comet.vy = (comet.vy/spd)*4.5; }

            comet.x += comet.vx;
            comet.y += comet.vy;

            // Out of bounds
            if (comet.x < -20 || comet.x > canvas.width + 20 ||
                comet.y < -20 || comet.y > canvas.height + 20) {
                comets.splice(ci, 1); continue;
            }

            // Hit player
            const dxP = comet.x - pcx, dyP = comet.y - pcy;
            if (Math.sqrt(dxP*dxP + dyP*dyP) < comet.radius + 14) {
                comets.splice(ci, 1);
                if (spectrumImmersed) continue;
                const dmg = hasPowerup('shield')
                    ? (Math.random() > 0.4 ? comet.damage : 0)
                    : comet.damage;
                if (dmg > 0) { player.health -= Math.round(dmg * player.crystalShieldReduction); createHitSound(); }
                continue;
            }
        }

        // Enemy AI
        enemies.forEach(enemy => {
            if (!enemy.isAlive) return;

            // Actively track the player's Y center, with occasional random drift for variety
            const playerCY = player.y + player.height / 2;
            const enemyCY  = enemy.y  + enemy.height  / 2;
            const trackBias = 0.7;
            if (Math.random() < 0.02) enemy.targetY = Math.random() * (canvas.height - enemy.height);
            const blendedTarget = playerCY * trackBias + (enemy.targetY ?? playerCY) * (1 - trackBias);
            const dyToTarget = blendedTarget - enemyCY;
            if (Math.abs(dyToTarget) > 1) {
                enemy.y += Math.sign(dyToTarget) * Math.min(enemy.speed, Math.abs(dyToTarget));
            }
            enemy.y = Math.max(0, Math.min(canvas.height - enemy.height - DANGER_ZONE_HEIGHT, enemy.y));

            // Regular shots
            enemy.shootTimer++;
            if (enemy.shootTimer >= enemy.shootInterval) {
                enemyShoot(enemy);
                enemy.shootTimer = 0;
            }

            // Bomb attack
            enemy.bombTimer++;
            if (enemy.bombTimer >= enemy.bombInterval) {
                enemyLaunchBomb(enemy);
                enemy.bombTimer = 0;
            }
        });

        // Pellet spawning — now uses the constants
        pelletSpawnTimer++;
        if (pelletSpawnTimer >= PELLET_SPAWN_INTERVAL && pellets.length < MAX_PELLETS) {
            spawnPellet();
            pelletSpawnTimer = 0;
        }
        // Pellet pulse + combo attraction (pcx/pcy defined above in crystal section)
        const hasActiveCombo = player.powerups.length > 0;
        const ATTRACT_RADIUS = 190;
        const ATTRACT_SPEED  = 2.8;
        pellets.forEach(p => {
            p.pulse += 0.1;
            if (hasActiveCombo) {
                const dx = pcx - p.x;
                const dy = pcy - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < ATTRACT_RADIUS && dist > 1) {
                    // Stronger pull the closer it gets
                    const strength = ATTRACT_SPEED * (1 - dist / ATTRACT_RADIUS) * 1.6;
                    p.x += (dx / dist) * strength;
                    p.y += (dy / dist) * strength;
                }
            }
        });

        // Pellet collection
        for (let i = pellets.length - 1; i >= 0; i--) {
            if (checkCircleCollision(pellets[i], player)) {
                player.score += 10;
                scoreFlashTimer = 30;
                createCollectSound();
                pellets.splice(i, 1);

                // Powerup every POWERUP_TRIGGER_SCORE points — score-threshold based
                const prevMilestone = Math.floor((player.score - 10) / POWERUP_TRIGGER_SCORE);
                const newMilestone  = Math.floor(player.score / POWERUP_TRIGGER_SCORE);
                if (newMilestone > prevMilestone) activatePowerup();
            }
        }

        // Danger zone / Spectrum Immersion
        const inDanger = player.y + player.height > canvas.height - DANGER_ZONE_HEIGHT;
        spectrumImmersed = inDanger && hasPowerup('spectrum_heal');

        if (inDanger) {
            if (hasPowerup('spectrum_heal')) {
                // Full instant heal every frame while immersed
                player.health = 100;

                // Erratic horizontal dash — override player X input
                spectrumDashTimer++;
                if (spectrumDashTimer >= SPECTRUM_DASH_INTERVAL) {
                    spectrumDashDir *= -1;
                    spectrumDashTimer = 0;
                }
                const newX = player.x + spectrumDashDir * spectrumDashSpeed;
                // Bounce within left half
                if (newX <= 0 || newX >= canvas.width / 2 - player.width) {
                    spectrumDashDir *= -1;
                    spectrumDashTimer = 0;
                }
                player.x = Math.max(0, Math.min(canvas.width / 2 - player.width, player.x + spectrumDashDir * spectrumDashSpeed));
            } else {
                dangerZoneDamageTimer++;
                if (dangerZoneDamageTimer >= 30) {
                    player.health = Math.max(0, player.health - 3);
                    createHitSound();
                    dangerZoneDamageTimer = 0;
                }
            }
        } else {
            dangerZoneDamageTimer = 0;
            spectrumDashTimer = 0;
        }

        // Enemies hurt in danger zone
        enemies.forEach(enemy => {
            if (!enemy.isAlive) return;
            if (enemy.y + enemy.height > canvas.height - DANGER_ZONE_HEIGHT && Math.random() < 0.02) {
                enemy.health = Math.max(0, enemy.health - 2);
            }
        });

        // ── Bomb update ──────────────────────────────────────────────────────
        for (let i = bombs.length - 1; i >= 0; i--) {
            const bomb = bombs[i];

            if (bomb.phase === 'flying') {
                bomb.x += bomb.vx;
                bomb.y += bomb.vy;
                bomb.fuseTimer++;
                // Out of bounds — remove
                if (bomb.x < 0 || bomb.x > canvas.width || bomb.y < 0 || bomb.y > canvas.height) {
                    bombs.splice(i, 1); continue;
                }
                // Fuse expires OR bomb reaches player proximity → arm it
                const toPx = bomb.x - (player.x + player.width / 2);
                const toPy = bomb.y - (player.y + player.height / 2);
                const toPlayer = Math.sqrt(toPx * toPx + toPy * toPy);
                if (bomb.fuseTimer >= bomb.fuseDuration || toPlayer < bomb.blastRadius * 0.6) {
                    bomb.phase = 'armed';
                    bomb.vx = 0; bomb.vy = 0;
                }
            } else if (bomb.phase === 'armed') {
                bomb.armTimer++;
                if (bomb.armTimer >= bomb.armDuration) {
                    // Detonate!
                    bomb.phase = 'detonating';
                    createBombDetonationSound();
                    // Check player in blast radius
                    const dx = player.x + player.width / 2 - bomb.x;
                    const dy = player.y + player.height / 2 - bomb.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < bomb.blastRadius) {
                        const falloff = 1 - dist / bomb.blastRadius;
                        let dmg = Math.round(bomb.damage * falloff * player.crystalShieldReduction);
                        if (spectrumImmersed) {
                            // Invincible — no damage
                        } else if (hasPowerup('shield')) {
                            const shieldLevel = getPowerupLevel('shield');
                            if (Math.random() > 0.3 * shieldLevel) { player.health -= dmg; createHitSound(); }
                        } else {
                            player.health -= dmg;
                            createHitSound();
                        }
                    }
                    // Spawn explosion effect
                    const particles = [];
                    for (let p = 0; p < 18; p++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = 1.5 + Math.random() * 4;
                        particles.push({ x: bomb.x, y: bomb.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1, r: 2 + Math.random() * 4 });
                    }
                    explosions.push({ x: bomb.x, y: bomb.y, blastRadius: bomb.blastRadius, frame: 0, duration: 45, particles });
                    bombs.splice(i, 1);
                }
            }
        }

        // Bullet movement & collision
        const bulletsToRemove = new Set();

        for (let i = 0; i < bullets.length; i++) {
            if (bulletsToRemove.has(i)) continue;
            const bullet = bullets[i];

            // Homing — diverts to intercept nearby enemy bullets/bombs, else targets nearest enemy
            if (bullet.homing && bullet.owner === 'player') {
                let homingTarget = null, homingDist = Infinity;

                // Nearby enemy bullets (within 180px)
                for (let j = 0; j < bullets.length; j++) {
                    if (bulletsToRemove.has(j)) continue;
                    const b = bullets[j];
                    if (b.owner !== 'enemy') continue;
                    const dx = b.x - bullet.x, dy = b.y - bullet.y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 180 && d < homingDist) { homingDist = d; homingTarget = { x: b.x, y: b.y }; }
                }

                // Nearby bombs (within 220px)
                for (let k = 0; k < bombs.length; k++) {
                    const bomb = bombs[k];
                    const dx = bomb.x - bullet.x, dy = bomb.y - bullet.y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 220 && d < homingDist) { homingDist = d; homingTarget = { x: bomb.x, y: bomb.y }; }
                }

                // Fallback: nearest enemy ship or crystal
                if (!homingTarget) {
                    enemies.forEach(enemy => {
                        if (!enemy.isAlive) return;
                        const dx = enemy.x + enemy.width / 2 - bullet.x, dy = enemy.y + enemy.height / 2 - bullet.y;
                        const d = Math.sqrt(dx * dx + dy * dy);
                        if (d < homingDist) { homingDist = d; homingTarget = { x: enemy.x + enemy.width / 2, y: enemy.y + enemy.height / 2 }; }
                    });
                    crystals.forEach(crys => {
                        if (!crys.isAlive) return;
                        const dx = crys.x - bullet.x, dy = crys.y - bullet.y;
                        const d = Math.sqrt(dx * dx + dy * dy);
                        if (d < homingDist) { homingDist = d; homingTarget = { x: crys.x, y: crys.y }; }
                    });
                }

                if (homingTarget) {
                    const dx = homingTarget.x - bullet.x, dy = homingTarget.y - bullet.y;
                    const angle = Math.atan2(dy, dx);
                    bullet.vx += Math.cos(angle) * bullet.homingStrength;
                    bullet.vy += Math.sin(angle) * bullet.homingStrength;
                    const speed = Math.sqrt(bullet.vx * bullet.vx + bullet.vy * bullet.vy);
                    if (speed > 8) { bullet.vx = (bullet.vx / speed) * 8; bullet.vy = (bullet.vy / speed) * 8; }
                }
            }

            bullet.x += bullet.vx;
            bullet.y += bullet.vy;

            if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                bulletsToRemove.add(i);
                continue;
            }

            if (bullet.owner === 'player') {
                let hit = false;

                // Intercept enemy bullets
                for (let j = 0; j < bullets.length; j++) {
                    if (j === i || bulletsToRemove.has(j)) continue;
                    const eb = bullets[j];
                    if (eb.owner !== 'enemy') continue;
                    const dx = eb.x - bullet.x, dy = eb.y - bullet.y;
                    if (Math.sqrt(dx * dx + dy * dy) < 12) {
                        bulletsToRemove.add(i);
                        bulletsToRemove.add(j);
                        createHitSound();
                        player.score += 5;
                        scoreFlashTimer = 18;
                        hit = true;
                        break;
                    }
                }
                if (hit) continue;

                // Intercept bombs
                for (let k = bombs.length - 1; k >= 0; k--) {
                    const bomb = bombs[k];
                    const dx = bomb.x - bullet.x, dy = bomb.y - bullet.y;
                    if (Math.sqrt(dx * dx + dy * dy) < bomb.radius + 8) {
                        const bx = bomb.x, by = bomb.y;
                        bombs.splice(k, 1);
                        bulletsToRemove.add(i);
                        createHitSound();
                        player.score += 15;
                        scoreFlashTimer = 25;
                        const particles = [];
                        for (let p = 0; p < 10; p++) {
                            const a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 3;
                            particles.push({ x: bx, y: by, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 0.5, r: 2 + Math.random() * 3 });
                        }
                        explosions.push({ x: bx, y: by, blastRadius: 40, frame: 0, duration: 28, particles });
                        hit = true;
                        break;
                    }
                }
                if (hit) continue;

                // Hit enemy ships
                for (let j = 0; j < enemies.length; j++) {
                    const enemy = enemies[j];
                    if (enemy.isAlive && checkCollision(bullet, enemy)) {
                        enemy.health -= bullet.damage || 10;
                        bulletsToRemove.add(i);
                        createHitSound();
                        if (enemy.health <= 0) {
                            enemy.isAlive = false;
                            enemiesDestroyed++;
                            player.score += 50;
                            scoreFlashTimer = 40;
                            createExplosionSound();
                            spawnKillStar(enemy);
                            WC.registerKill(false);

                            // ── AMBIENT combo ──────────────────────────────
                            ambientLettersRevealed++;
                            ambientComboTimer = AMBIENT_COMBO_WINDOW;
                            spawnMoteCluster();  // each combo letter = traveling motes
                            if (ambientLettersRevealed >= 7) {
                                triggerAmbientClear();
                            } else {
                                // Fire laser beam at nearest enemy for every new letter
                                fireAmbientLaser(ambientLettersRevealed - 1);
                            }

                            setTimeout(() => {
                                const idx = enemies.indexOf(enemy);
                                if (idx > -1) enemies.splice(idx, 1);
                            }, 500);
                        }
                        hit = true;
                        break;
                    }
                }
                if (hit) continue;

                // Hit crystal spikes — circle collision using true visual size
                for (let j = 0; j < crystals.length; j++) {
                    const crys = crystals[j];
                    if (!crys.isAlive) continue;
                    const bCx = bullet.x + (bullet.width  || 0) / 2;
                    const bCy = bullet.y + (bullet.height || 0) / 2;
                    const dx = crys.x - bCx;
                    const dy = crys.y - bCy;
                    // Hit radius = visual arm length (crystal.size), generous so it's hittable
                    if (Math.sqrt(dx*dx + dy*dy) < crys.size * 0.85) {
                        bulletsToRemove.add(i);
                        const dmg = bullet.damage || 10;
                        crys.health -= dmg;
                        crys.hitFlash = 14;
                        createCrystalHitSound();
                        if (crys.health <= 0) {
                            crys.isAlive = false;
                            enemiesDestroyed++;
                            player.score += 150;
                            scoreFlashTimer = 50;
                            // Permanent 5% DR — stacks multiplicatively on repeat kills
                            player.crystalShieldReduction = Math.max(0.70, player.crystalShieldReduction * 0.95);
                            createCrystalDeathSound();
                            spawnKillStar(crys);
                            WC.registerKill(true);
                            // Crystal death explosion
                            const particles = [];
                            for (let p = 0; p < 20; p++) {
                                const a = Math.random() * Math.PI * 2;
                                const s = 1.5 + Math.random() * 4;
                                particles.push({ x: crys.x, y: crys.y,
                                    vx: Math.cos(a)*s, vy: Math.sin(a)*s - 0.5,
                                    r: 2 + Math.random() * 4 });
                            }
                            explosions.push({ x: crys.x, y: crys.y, blastRadius: 70,
                                frame: 0, duration: 50, particles });
                            // Drop pellets
                            for (let p = 0; p < 3; p++) {
                                const ang = (p / 3) * Math.PI * 2;
                                pellets.push({
                                    x: crys.x + Math.cos(ang) * 30,
                                    y: crys.y + Math.sin(ang) * 30,
                                    radius: 8,
                                    color: `hsl(${crys.hue}, 90%, 65%)`,
                                    pulse: Math.random() * Math.PI * 2
                                });
                            }
                            // Ambience — crystal kill also advances combo
                            ambientLettersRevealed = Math.min(6, ambientLettersRevealed + 2);
                            ambientComboTimer = AMBIENT_COMBO_WINDOW;
                            spawnMoteCluster();
                            spawnMoteCluster();
                        }
                        hit = true;
                        break;
                    }
                }
                if (hit) continue;

            } else if (bullet.owner === 'enemy' && checkCollision(bullet, player)) {
                if (spectrumImmersed) {
                    bulletsToRemove.add(i);
                } else if (hasPowerup('shield')) {
                    const shieldLevel = getPowerupLevel('shield');
                    if (Math.random() > 0.3 * shieldLevel) {
                        player.health -= Math.round(10 * player.crystalShieldReduction);
                        createHitSound();
                    }
                } else {
                    player.health -= Math.round(10 * player.crystalShieldReduction);
                    createHitSound();
                }
                bulletsToRemove.add(i);
            }
        }

        // Apply all bullet removals in one reverse pass — safe, no index corruption
        const removeArr = [...bulletsToRemove].sort((a, b) => b - a);
        for (const idx of removeArr) bullets.splice(idx, 1);

        // Death check
        if (player.health <= 0) {
            player.health = 0;
            gameState = 'dead';
            createDeathSound();
        }
    }

    // ─── Game Loop ────────────────────────────────────────────────────────────
    function gameLoop() {
        if (gameState === 'start') {
            drawStartScreen();
            requestAnimationFrame(gameLoop);
            return;
        }

        if (gameState === 'dead') {
            // Draw final game state underneath, then overlay
            ctx.fillStyle = 'rgba(13, 13, 31, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawSpectrum();
            drawDeathScreen();
            requestAnimationFrame(gameLoop);
            return;
        }

        // Playing
        update();

        ctx.fillStyle = 'rgba(13, 13, 31, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawAmbience();
        drawSpectrum();
        drawBoundaryLine();
        drawPellets();
        drawPlayer();
        drawEnemies();
        drawCrystals();
        drawBullets();
        drawBombs();
        drawExplosions();
        drawLaserBeams();
        drawComets();
        drawHUD();
        drawAmbientLetters();
        drawWaveAnnouncement();
        drawControls();

        // Shooting
        const hasAnyPowerup = player.powerups.length > 0;
        const cooldownRate = hasAnyPowerup && hasPowerup('rapid_fire') ? 5 : 15;
        if (shootCooldown <= 0) {
            playerShoot();
            shootCooldown = cooldownRate;
        }
        if (shootCooldown > 0) shootCooldown--;

        requestAnimationFrame(gameLoop);
    }

    // ─── Reset ────────────────────────────────────────────────────────────────
    function resetGame() {
        player.x = 100; player.y = canvas.height / 2;
        player.health = 100; player.score = 0;
        player.powerups = []; player.lastPowerupScore = 0;
        player.crystalShieldReduction = 1.0;
        enemies.length = 0; bullets.length = 0; pellets.length = 0;
        bombs.length = 0; explosions.length = 0; laserBeams.length = 0;
        crystals.length = 0; comets.length = 0;
        enemiesDestroyed = 0; maxEnemies = 1;
        pelletSpawnTimer = 0; dangerZoneDamageTimer = 0; shootCooldown = 0; scoreFlashTimer = 0;
        ambientLettersRevealed = 0; ambientComboTimer = 0; ambientClearFlash = 0;
        spectrumImmersed = false; spectrumDashDir = 1; spectrumDashTimer = 0;
        ambienceStars.length = 0; ambienceMotes.length = 0; constellationFlash = 0;
        _lastDroneMode = null;
        WC.startWave(1);
        WC.totalWaveClears = 0;
        WC._crystalSpawnedThisWave = false;
        gameState = 'playing';
        spawnEnemy();
    }

    // ─── Input ────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
        if (e.key === ' ') e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    canvas.addEventListener('click', async () => {
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        if (gameState === 'start') {
            await createReverb();
            startAmbientSound();
            resetGame();
        } else if (gameState === 'dead') {
            resetGame();
        }
    });

    // ─── Boot ─────────────────────────────────────────────────────────────────
    gameState = 'start';
    gameLoop();
</script>
</body>
</html>
