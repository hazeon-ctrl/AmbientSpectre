<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Spectrum Shooter</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #06060f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
        }
        #gameContainer {
            text-align: center;
            position: relative;
        }
        #canvas {
            border: 2px solid #00ff88;
            background: #0d0d1f;
            display: block;
            margin: 0 auto;
            cursor: crosshair;
        }
        /* All HUD is now drawn on canvas. These are only fallback/hidden. */
        #info, #controls, #powerup { display: none; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="canvas" width="800" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // ─── Audio Context ────────────────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.8;
    analyser.connect(audioCtx.destination);

    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    // D Dorian Scale
    const dorianScale = {
        D3: 146.83, E3: 164.81, F3: 174.61, G3: 196.00, A3: 220.00, B3: 246.94, C4: 261.63,
        D4: 293.66, E4: 329.63, F4: 349.23, G4: 392.00, A4: 440.00, B4: 493.88, C5: 523.25,
        D5: 587.33, E5: 659.25, F5: 698.46, G5: 783.99, A5: 880.00, B5: 987.77, C6: 1046.50
    };

    // ─── Constants ────────────────────────────────────────────────────────────
    const DANGER_ZONE_HEIGHT = 120;
    const PELLET_SPAWN_INTERVAL = 45; // frames between pellet spawns
    const MAX_PELLETS = 16;
    const POWERUP_TRIGGER_SCORE = 50; // every N score points = powerup

    // ─── Game State ───────────────────────────────────────────────────────────
    let gameState = 'start'; // 'start' | 'playing' | 'dead'
    let loopRunning = false;

    const player = {
        x: 100,
        y: canvas.height / 2,
        width: 30,
        height: 30,
        speed: 5,
        health: 100,
        color: '#00ff88',
        score: 0,
        lastPowerupScore: 0, // track when next powerup fires
        powerups: []
    };

    let enemies = [];
    let maxEnemies = 1;
    let enemiesDestroyed = 0;
    let bullets = [];
    let pellets = [];
    let bombs = [];        // enemy bomb projectiles
    let explosions = [];   // active bomb blast effects
    let laserBeams = [];   // AMBIENT combo laser strikes
    const keys = {};
    let pelletSpawnTimer = 0;
    let dangerZoneDamageTimer = 0;
    let shootCooldown = 0;
    let scoreFlashTimer = 0;  // counts down frames after score increases

    // ─── Spectrum Immersion State ─────────────────────────────────────────────
    let spectrumImmersed = false;   // true when player is in heal zone with spectrum_heal
    let spectrumDashDir = 1;        // current horizontal dash direction: +1 or -1
    let spectrumDashSpeed = 7;      // px/frame dash speed
    let spectrumDashTimer = 0;      // counts frames since last direction flip
    const SPECTRUM_DASH_INTERVAL = 22; // frames between direction flips (~0.37s)

    // ─── AMBIENT Combo System ─────────────────────────────────────────────────
    const AMBIENT_WORD = 'AMBIENT';
    let ambientLettersRevealed = 0;  // 0–7; 7 = full word = triggers clear
    let ambientComboTimer = 0;       // counts down; resets combo if it hits 0
    const AMBIENT_COMBO_WINDOW = 180; // ~3 seconds at 60fps to chain kills
    let ambientClearFlash = 0;       // flash effect when word completes

    // ─── Audio Effects ────────────────────────────────────────────────────────
    let reverbNode = null;
    let delayNode = null;
    let delayGain = null;
    let delayFeedback = null;

    async function createReverb() {
        if (reverbNode) return; // guard: only build once
        reverbNode = audioCtx.createConvolver();

        const length = audioCtx.sampleRate * 2;
        const impulse = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
        const left = impulse.getChannelData(0);
        const right = impulse.getChannelData(1);
        for (let i = 0; i < length; i++) {
            const decay = Math.pow(1 - i / length, 3);
            left[i] = (Math.random() * 2 - 1) * decay;
            right[i] = (Math.random() * 2 - 1) * decay;
        }
        reverbNode.buffer = impulse;

        delayNode = audioCtx.createDelay(1.0);
        delayNode.delayTime.value = 0.3;
        delayGain = audioCtx.createGain();
        delayGain.gain.value = 0.3;
        delayFeedback = audioCtx.createGain();
        delayFeedback.gain.value = 0.4;

        delayNode.connect(delayFeedback);
        delayFeedback.connect(delayNode);
        delayNode.connect(delayGain);

        reverbNode.connect(analyser);
        delayGain.connect(analyser);
    }

    let ambientOsc1 = null, ambientOsc2 = null;

    function startAmbientSound() {
        if (ambientOsc1) return;
        ambientOsc1 = audioCtx.createOscillator();
        ambientOsc2 = audioCtx.createOscillator();
        const ambientGain = audioCtx.createGain();
        ambientOsc1.type = 'sine';
        ambientOsc2.type = 'sine';
        ambientOsc1.frequency.value = dorianScale.D3;
        ambientOsc2.frequency.value = dorianScale.A3;
        ambientGain.gain.value = 0.04;
        ambientOsc1.connect(ambientGain);
        ambientOsc2.connect(ambientGain);
        ambientGain.connect(reverbNode);
        ambientGain.connect(analyser);
        ambientOsc1.start();
        ambientOsc2.start();
    }

    // ─── Sound Functions ──────────────────────────────────────────────────────
    function connectAndPlay(osc, gain, duration) {
        // Helper: stops oscillator and disconnects nodes to prevent memory leak
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + duration);
        osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
    }

    function createShootSound(note) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(note * 3, audioCtx.currentTime);
        filter.Q.value = 1;
        osc.connect(filter); filter.connect(gain);
        gain.connect(reverbNode); gain.connect(analyser);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(note, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(note * 0.6, audioCtx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);

        const harmonic = audioCtx.createOscillator();
        const harmonicGain = audioCtx.createGain();
        harmonic.type = 'sine';
        harmonic.frequency.value = note * 2;
        harmonicGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        harmonicGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        harmonic.connect(harmonicGain);
        harmonicGain.connect(reverbNode); harmonicGain.connect(analyser);
        connectAndPlay(osc, gain, 0.12);
        connectAndPlay(harmonic, harmonicGain, 0.08);
    }

    function createHitSound() {
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(400, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
        filter.Q.value = 2;
        osc1.connect(filter); osc2.connect(filter); filter.connect(gain);
        gain.connect(delayNode); gain.connect(analyser);
        osc1.type = 'sawtooth'; osc2.type = 'sawtooth';
        osc1.frequency.setValueAtTime(dorianScale.C4, audioCtx.currentTime);
        osc1.frequency.exponentialRampToValueAtTime(dorianScale.F3, audioCtx.currentTime + 0.2);
        osc2.frequency.setValueAtTime(dorianScale.C4 * 1.01, audioCtx.currentTime);
        osc2.frequency.exponentialRampToValueAtTime(dorianScale.F3 * 1.01, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        connectAndPlay(osc1, gain, 0.2);
        connectAndPlay(osc2, gain, 0.2);
    }

    function createCollectSound() {
        const notes = [dorianScale.D5, dorianScale.E5, dorianScale.G5];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
            osc.type = 'sine';
            osc.frequency.value = freq;
            const startTime = audioCtx.currentTime + i * 0.04;
            gain.gain.setValueAtTime(0.2, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.15);
            osc.start(startTime); osc.stop(startTime + 0.15);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
        });
    }

    function createPowerupSound(type) {
        const chords = {
            'rapid_fire':    [dorianScale.D4, dorianScale.A4, dorianScale.D5],
            'spread_shot':   [dorianScale.E4, dorianScale.G4, dorianScale.B4],
            'shield':        [dorianScale.F4, dorianScale.A4, dorianScale.C5],
            'spectrum_heal': [dorianScale.G4, dorianScale.B4, dorianScale.D5],
            'damage_boost':  [dorianScale.A4, dorianScale.C5, dorianScale.E5]
        };
        const chord = chords[type] || chords['rapid_fire'];
        chord.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
            osc.type = 'triangle';
            osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.04;
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
        });
    }

    function createComboSound(comboLevel) {
        const note = dorianScale.D5 * Math.pow(2, comboLevel * 0.25);
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.value = note;
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
        connectAndPlay(osc, gain, 0.2);
    }

    function createExplosionSound() {
        const bufferSize = audioCtx.sampleRate * 0.5;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        noise.connect(filter); filter.connect(gain);
        gain.connect(delayNode); gain.connect(reverbNode); gain.connect(analyser);
        noise.start(audioCtx.currentTime); noise.stop(audioCtx.currentTime + 0.5);

        [dorianScale.B3, dorianScale.C4, dorianScale.D4].forEach(freq => {
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.3, audioCtx.currentTime + 0.3);
            oscGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(oscGain); oscGain.connect(reverbNode); oscGain.connect(analyser);
            connectAndPlay(osc, oscGain, 0.3);
        });
    }

    function createBombLaunchSound() {
        // Low thud + rising whine
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(dorianScale.D3, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(dorianScale.B3, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
        connectAndPlay(osc, gain, 0.4);
    }

    function createBombDetonationSound() {
        // Deep boom + high shriek
        const bufferSize = audioCtx.sampleRate * 0.8;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(3000, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.8);
        filter.Q.value = 3;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.7, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
        noise.connect(filter); filter.connect(gain);
        gain.connect(delayNode); gain.connect(reverbNode); gain.connect(analyser);
        noise.start(audioCtx.currentTime); noise.stop(audioCtx.currentTime + 0.8);
        // Pitched shriek overlay
        [dorianScale.D3 * 0.5, dorianScale.A3].forEach(freq => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(freq * 4, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + 0.6);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            o.connect(g); g.connect(reverbNode); g.connect(analyser);
            connectAndPlay(o, g, 0.6);
        });
    }

    function createSpawnSound() {
        const notes = [dorianScale.D4, dorianScale.F4, dorianScale.A4, dorianScale.B4];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.06;
            gain.gain.setValueAtTime(0.15, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
            osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
            osc.start(t); osc.stop(t + 0.2);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
        });
    }

    function createDeathSound() {
        [dorianScale.D4, dorianScale.C4, dorianScale.B3, dorianScale.A3].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.15;
            gain.gain.setValueAtTime(0.3, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
            osc.start(t); osc.stop(t + 0.4);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
        });
    }

    function createAmbientLaserSound(letterIndex) {
        // Crisp rising zap — pitch scales with combo progress
        const baseNote = dorianScale.D5 * Math.pow(2, letterIndex * 0.14);
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(baseNote * 0.7, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(baseNote * 1.8, audioCtx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.18);
        osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
        connectAndPlay(osc, gain, 0.18);
        // Harmonic shimmer
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(baseNote * 1.5, audioCtx.currentTime);
        osc2.frequency.exponentialRampToValueAtTime(baseNote * 2.2, audioCtx.currentTime + 0.1);
        gain2.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc2.connect(gain2); gain2.connect(reverbNode); gain2.connect(analyser);
        connectAndPlay(osc2, gain2, 0.1);
    }

    function createAmbientClearSound() {
        // Sweeping D Dorian chord bloom — bright, triumphant, not harsh
        const chord = [dorianScale.D4, dorianScale.F4, dorianScale.A4, dorianScale.D5, dorianScale.A5];
        chord.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.07;
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.22, t + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 1.2);
            osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
            osc.start(t); osc.stop(t + 1.2);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
        });
    }

    // ─── Pellets ──────────────────────────────────────────────────────────────
    // Powerup types — damage_boost is now in the pool
    const POWERUP_TYPES = ['rapid_fire', 'spread_shot', 'shield', 'spectrum_heal', 'damage_boost'];
    const POWERUP_NAMES = {
        'rapid_fire':    '⚡ RAPID FIRE',
        'spread_shot':   '✦ SPREAD SHOT',
        'shield':        '◈ SHIELD',
        'spectrum_heal': '♥ SPECTRUM HEAL',
        'damage_boost':  '▲ DAMAGE BOOST'
    };

    // How many pellets until next powerup
    function pelletsUntilNextPowerup() {
        const needed = POWERUP_TRIGGER_SCORE; // score per powerup
        const remainder = player.score % needed;
        // each pellet = 10 pts
        return Math.ceil((needed - remainder) / 10);
    }

    function spawnPellet() {
        pellets.push({
            x: Math.random() * (canvas.width / 2 - 100) + 50,
            y: Math.random() * (canvas.height - DANGER_ZONE_HEIGHT - 40) + 20,
            radius: 8,
            color: `hsl(${Math.random() * 360}, 100%, 60%)`,
            pulse: Math.random() * Math.PI * 2
        });
    }

    // ─── Powerups ─────────────────────────────────────────────────────────────
    const POWERUP_DURATION = 600; // 10s at 60fps — up from 300

    function activatePowerup() {
        const newPowerup = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
        const existingIndex = player.powerups.findIndex(p => p.type === newPowerup);
        if (existingIndex !== -1) {
            player.powerups[existingIndex].timer = POWERUP_DURATION;
            player.powerups[existingIndex].level = Math.min(3, player.powerups[existingIndex].level + 1);
            createComboSound(player.powerups[existingIndex].level);
        } else {
            player.powerups.push({ type: newPowerup, timer: POWERUP_DURATION, level: 1 });
            createPowerupSound(newPowerup);
        }
    }

    function hasPowerup(type) { return player.powerups.some(p => p.type === type); }
    function getPowerupLevel(type) {
        const p = player.powerups.find(p => p.type === type);
        return p ? p.level : 0;
    }

    // ─── Shooting ─────────────────────────────────────────────────────────────
    function playerShoot() {
        const hasSpread = hasPowerup('spread_shot');
        const damageLevel = getPowerupLevel('damage_boost');

        if (hasSpread) {
            const spreadCount = 3 + getPowerupLevel('spread_shot');
            for (let i = 0; i < spreadCount; i++) {
                const angle = (i - Math.floor(spreadCount / 2)) * 15;
                bullets.push({
                    x: player.x + player.width,
                    y: player.y + player.height / 2,
                    width: 10, height: 4,
                    vx: 8, vy: Math.sin(angle * Math.PI / 180) * 3,
                    owner: 'player', color: player.color,
                    homing: true, homingStrength: 0.08,
                    damage: 10 + damageLevel * 5
                });
            }
            createShootSound(dorianScale.G4);
        } else {
            bullets.push({
                x: player.x + player.width,
                y: player.y + player.height / 2,
                width: 10, height: 4,
                vx: 8, vy: 0,
                owner: 'player', color: player.color,
                homing: true, homingStrength: 0.08,
                damage: 10 + damageLevel * 5
            });
            createShootSound(dorianScale.A4);
        }
    }

    function enemyShoot(enemy) {
        // Aim directly at the player's center using true dx/dy vector
        const px = player.x + player.width / 2;
        const py = player.y + player.height / 2;
        const ex = enemy.x + enemy.width / 2;
        const ey = enemy.y + enemy.height / 2;
        const dx = px - ex;
        const dy = py - ey;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const speed = enemy.bulletSpeed || 5;
        bullets.push({
            x: ex,
            y: ey,
            width: 10, height: 4,
            vx: (dx / dist) * speed,
            vy: (dy / dist) * speed,
            owner: 'enemy', color: enemy.color
        });
        createShootSound(dorianScale.E3);
    }

    function enemyLaunchBomb(enemy) {
        // Lead the player slightly for a predictive lob
        const px = player.x + player.width / 2;
        const py = player.y + player.height / 2;
        const ex = enemy.x + enemy.width / 2;
        const ey = enemy.y + enemy.height / 2;
        const BOMB_SPEED = 2.5;
        const dx = px - ex, dy = py - ey;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        bombs.push({
            x: ex, y: ey,
            vx: (dx / dist) * BOMB_SPEED,
            vy: (dy / dist) * BOMB_SPEED,
            radius: 10,
            blastRadius: 90,
            fuseTimer: 0,
            fuseDuration: 180,   // 3s at 60fps before detonation
            damage: 35,
            phase: 'flying',     // 'flying' | 'armed' | 'detonating'
            armTimer: 0,
            armDuration: 60,     // 1s warning pulse before detonation when stopped
            pulseAngle: 0
        });
        createBombLaunchSound();
    }
    // ─── Enemy Spawning ───────────────────────────────────────────────────────
    function spawnEnemy() {
        const difficulty = Math.min(enemiesDestroyed / 10, 1);
        enemies.push({
            x: canvas.width - 150 - Math.random() * 100,
            y: Math.random() * (canvas.height - 150) + 50,
            width: 30, height: 30, speed: 2 + difficulty,
            health: 100, maxHealth: 100,
            color: `hsl(${Math.random() * 30}, 100%, 50%)`,
            shootTimer: Math.random() * 40,
            shootInterval: Math.max(35, 75 - Math.floor(enemiesDestroyed / 3) * 5),
            bulletSpeed: 4 + difficulty * 3,
            bombTimer: Math.floor(Math.random() * 300),
            bombInterval: Math.max(180, 420 - Math.floor(enemiesDestroyed / 2) * 20),
            isAlive: true
        });
        createSpawnSound();
    }

    // ─── Collision ────────────────────────────────────────────────────────────
    function checkCollision(r1, r2) {
        return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x &&
               r1.y < r2.y + r2.height && r1.y + r1.height > r2.y;
    }
    function checkCircleCollision(circle, rect) {
        const cx = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
        const cy = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
        const dx = circle.x - cx, dy = circle.y - cy;
        return dx * dx + dy * dy < circle.radius * circle.radius;
    }

    // ─── Draw ─────────────────────────────────────────────────────────────────
    function drawSpectrum() {
        analyser.getByteFrequencyData(dataArray);
        const barWidth = (canvas.width / bufferLength) * 2.5;
        const isDangerMode = !hasPowerup('spectrum_heal');
        let x = 0;
        for (let i = 0; i < bufferLength; i++) {
            const barHeight = (dataArray[i] / 255) * DANGER_ZONE_HEIGHT;
            const hue = isDangerMode ? 0 + (i / bufferLength) * 40 : 150 + (i / bufferLength) * 60;
            ctx.fillStyle = `hsla(${hue}, 100%, 50%, 0.7)`;
            ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
            x += barWidth + 0.5;
        }

        // Danger zone line
        ctx.strokeStyle = isDangerMode ? '#ff3333' : '#33ff88';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - DANGER_ZONE_HEIGHT);
        ctx.lineTo(canvas.width, canvas.height - DANGER_ZONE_HEIGHT);
        ctx.stroke();
        ctx.setLineDash([]);

        // Danger zone label
        ctx.fillStyle = isDangerMode ? 'rgba(255,51,51,0.5)' : 'rgba(51,255,136,0.4)';
        ctx.font = '10px Courier New';
        ctx.textAlign = 'right';
        ctx.fillText(isDangerMode ? 'DANGER ZONE' : 'HEAL ZONE', canvas.width - 8, canvas.height - DANGER_ZONE_HEIGHT + 14);
    }

    // Player's movement boundary line (left half)
    function drawBoundaryLine() {
        ctx.strokeStyle = 'rgba(100, 150, 255, 0.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 8]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height - DANGER_ZONE_HEIGHT);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function drawPlayer() {
        const cx = player.x + player.width / 2;
        const cy = player.y + player.height / 2;
        const W = player.width;   // 30
        const H = player.height;  // 30

        ctx.save();

        // ── Glow ──
        const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 48);
        glow.addColorStop(0, 'rgba(0, 255, 136, 0.35)');
        glow.addColorStop(1, 'rgba(0, 255, 136, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(cx, cy, 48, 0, Math.PI * 2);
        ctx.fill();

        // ── Engine exhaust (drawn behind hull) ──
        // Two small thruster nozzles at rear, animated flicker
        const flicker = 0.6 + 0.4 * Math.sin(Date.now() / 60);
        // Upper thruster
        const exhaustGrad1 = ctx.createLinearGradient(player.x - 14, cy - 8, player.x, cy - 8);
        exhaustGrad1.addColorStop(0, `rgba(0,180,255,0)`);
        exhaustGrad1.addColorStop(1, `rgba(0,255,200,${0.9 * flicker})`);
        ctx.fillStyle = exhaustGrad1;
        ctx.beginPath();
        ctx.moveTo(player.x, cy - 6);
        ctx.lineTo(player.x - 12 * flicker, cy - 9);
        ctx.lineTo(player.x - 12 * flicker, cy - 5);
        ctx.closePath();
        ctx.fill();
        // Lower thruster
        const exhaustGrad2 = ctx.createLinearGradient(player.x - 14, cy + 8, player.x, cy + 8);
        exhaustGrad2.addColorStop(0, `rgba(0,180,255,0)`);
        exhaustGrad2.addColorStop(1, `rgba(0,255,200,${0.9 * flicker})`);
        ctx.fillStyle = exhaustGrad2;
        ctx.beginPath();
        ctx.moveTo(player.x, cy + 6);
        ctx.lineTo(player.x - 12 * flicker, cy + 9);
        ctx.lineTo(player.x - 12 * flicker, cy + 5);
        ctx.closePath();
        ctx.fill();

        // ── Main hull — forward-pointing fighter ──
        // Drawn facing right (→). Origin at (player.x, player.y), center at (cx, cy).
        ctx.beginPath();
        // Nose tip
        ctx.moveTo(player.x + W, cy);
        // Upper wing leading edge
        ctx.lineTo(player.x + W * 0.55, cy - H * 0.28);
        // Upper fuselage shoulder
        ctx.lineTo(player.x + W * 0.3, cy - H * 0.18);
        // Upper wing root / tail fin
        ctx.lineTo(player.x + W * 0.1, cy - H * 0.5);
        // Rear top
        ctx.lineTo(player.x, cy - H * 0.18);
        // Rear flat
        ctx.lineTo(player.x, cy + H * 0.18);
        // Lower wing root / tail fin
        ctx.lineTo(player.x + W * 0.1, cy + H * 0.5);
        // Lower fuselage shoulder
        ctx.lineTo(player.x + W * 0.3, cy + H * 0.18);
        // Lower wing leading edge
        ctx.lineTo(player.x + W * 0.55, cy + H * 0.28);
        ctx.closePath();

        // Hull fill — green-to-teal gradient nose-to-tail
        const hullGrad = ctx.createLinearGradient(player.x, cy, player.x + W, cy);
        hullGrad.addColorStop(0, '#007744');
        hullGrad.addColorStop(0.5, '#00cc66');
        hullGrad.addColorStop(1, '#00ffaa');
        ctx.fillStyle = hullGrad;
        ctx.fill();

        // Hull outline
        ctx.strokeStyle = '#88ffdd';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // ── Cockpit canopy ──
        ctx.beginPath();
        ctx.ellipse(player.x + W * 0.6, cy, W * 0.14, H * 0.12, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(150, 255, 220, 0.85)';
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.stroke();

        // ── Engine block (rear center) ──
        ctx.fillStyle = '#005533';
        ctx.beginPath();
        ctx.roundRect(player.x, cy - 5, W * 0.18, 10, 2);
        ctx.fill();

        // ── Shield indicator ──
        if (hasPowerup('shield')) {
            const shieldLevel = getPowerupLevel('shield');
            const alpha = 0.45 + shieldLevel * 0.15;
            // Hexagonal shield outline for style
            ctx.strokeStyle = `rgba(0, 220, 255, ${alpha})`;
            ctx.lineWidth = 2 + shieldLevel;
            ctx.shadowColor = '#00ddff';
            ctx.shadowBlur = 8 + shieldLevel * 4;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
                const r = 26 + shieldLevel * 2;
                if (i === 0) ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
                else ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // ── Damage boost: glowing red wing tips ──
        if (hasPowerup('damage_boost')) {
            const lvl = getPowerupLevel('damage_boost');
            ctx.fillStyle = `rgba(255, 60, 60, ${0.6 + lvl * 0.13})`;
            ctx.shadowColor = '#ff3333';
            ctx.shadowBlur = 6 + lvl * 3;
            // Upper wingtip dot
            ctx.beginPath();
            ctx.arc(player.x + W * 0.1, cy - H * 0.5, 3, 0, Math.PI * 2);
            ctx.fill();
            // Lower wingtip dot
            ctx.beginPath();
            ctx.arc(player.x + W * 0.1, cy + H * 0.5, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // ── Spectrum Immersion aura ──
        if (spectrumImmersed) {
            const t = Date.now() / 400;
            const hue = (t * 60) % 360;
            // Outer rotating rainbow ring
            ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
            ctx.shadowBlur = 22;
            ctx.strokeStyle = `hsla(${hue}, 100%, 65%, 0.85)`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(cx, cy, 36, 0, Math.PI * 2);
            ctx.stroke();
            // Second ring offset
            ctx.strokeStyle = `hsla(${(hue + 120) % 360}, 100%, 65%, 0.5)`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(cx, cy, 42, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
            // "IMMERSED" label above ship
            ctx.font = 'bold 9px Courier New';
            ctx.textAlign = 'center';
            ctx.fillStyle = `hsla(${hue}, 100%, 75%, 0.9)`;
            ctx.fillText('✦ IMMERSED ✦', cx, player.y - 20);
        }

        // ── Homing aura (always-on core ability) — soft magenta ring ──
        ctx.strokeStyle = 'rgba(255, 0, 255, 0.3)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 5]);
        ctx.beginPath();
        ctx.arc(cx, cy, 34, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);

        // ── Health bar above ship ──
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(player.x - 2, player.y - 14, W + 4, 6);
        const hpColor = player.health > 50 ? '#00ff88' : player.health > 25 ? '#ffaa00' : '#ff3333';
        ctx.fillStyle = hpColor;
        ctx.fillRect(player.x - 2, player.y - 14, ((W + 4) * player.health / 100), 6);

        ctx.restore();
    }

    function drawEnemies() {
        enemies.forEach(enemy => {
            const cx = enemy.x + enemy.width / 2;
            const cy = enemy.y + enemy.height / 2;
            const W = enemy.width;   // 30
            const H = enemy.height;  // 30

            if (!enemy.isAlive) {
                // Animated expanding debris ring
                for (let i = 0; i < 10; i++) {
                    const angle = (i / 10) * Math.PI * 2;
                    const dist = 18 + Math.sin(Date.now() / 80 + i) * 4;
                    ctx.fillStyle = enemy.color;
                    ctx.globalAlpha = 0.7;
                    ctx.beginPath();
                    ctx.arc(
                        cx + Math.cos(angle) * dist,
                        cy + Math.sin(angle) * dist,
                        2.5, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
                // Inner ember
                ctx.fillStyle = '#ffaa00';
                ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 60);
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                return;
            }

            ctx.save();

            // ── Glow ──
            const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 44);
            glow.addColorStop(0, `hsla(${parseInt(enemy.color.match(/\d+/)[0])}, 100%, 50%, 0.3)`);
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(cx, cy, 44, 0, Math.PI * 2);
            ctx.fill();

            // ── Engine exhaust (on right side — enemy faces left) ──
            const flicker = 0.6 + 0.4 * Math.sin(Date.now() / 55 + cx);
            const exGrad = ctx.createLinearGradient(enemy.x + W, cy, enemy.x + W + 14, cy);
            exGrad.addColorStop(0, `rgba(255,120,0,${0.9 * flicker})`);
            exGrad.addColorStop(1, 'rgba(255,60,0,0)');
            ctx.fillStyle = exGrad;
            ctx.beginPath();
            ctx.moveTo(enemy.x + W, cy - 4);
            ctx.lineTo(enemy.x + W + 13 * flicker, cy - 2);
            ctx.lineTo(enemy.x + W + 13 * flicker, cy + 2);
            ctx.lineTo(enemy.x + W, cy + 4);
            ctx.closePath();
            ctx.fill();

            // ── Main hull — angular left-facing predator ──
            // Enemy faces LEFT (←). Nose tip at left side.
            ctx.beginPath();
            // Nose tip (left)
            ctx.moveTo(enemy.x, cy);
            // Upper jaw / forward edge
            ctx.lineTo(enemy.x + W * 0.32, cy - H * 0.22);
            // Upper fuselage
            ctx.lineTo(enemy.x + W * 0.52, cy - H * 0.16);
            // Upper wing spike (swept back)
            ctx.lineTo(enemy.x + W * 0.62, cy - H * 0.52);
            // Upper wing inner notch
            ctx.lineTo(enemy.x + W * 0.72, cy - H * 0.28);
            // Rear top
            ctx.lineTo(enemy.x + W, cy - H * 0.14);
            // Rear flat
            ctx.lineTo(enemy.x + W, cy + H * 0.14);
            // Lower wing inner notch
            ctx.lineTo(enemy.x + W * 0.72, cy + H * 0.28);
            // Lower wing spike
            ctx.lineTo(enemy.x + W * 0.62, cy + H * 0.52);
            // Lower fuselage
            ctx.lineTo(enemy.x + W * 0.52, cy + H * 0.16);
            // Lower jaw
            ctx.lineTo(enemy.x + W * 0.32, cy + H * 0.22);
            ctx.closePath();

            // Hull fill — hostile red-orange gradient
            const hullGrad = ctx.createLinearGradient(enemy.x + W, cy, enemy.x, cy);
            hullGrad.addColorStop(0, '#550000');
            hullGrad.addColorStop(0.45, enemy.color);
            hullGrad.addColorStop(1, '#ffcc44');
            ctx.fillStyle = hullGrad;
            ctx.fill();

            // Hull outline
            ctx.strokeStyle = '#ffddaa';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // ── Cockpit slit (narrow, menacing) ──
            ctx.beginPath();
            ctx.ellipse(enemy.x + W * 0.35, cy, W * 0.1, H * 0.07, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 40, 40, 0.9)';
            ctx.fill();
            // Glint
            ctx.fillStyle = 'rgba(255,180,180,0.7)';
            ctx.beginPath();
            ctx.ellipse(enemy.x + W * 0.33, cy - 1, W * 0.04, H * 0.025, 0, 0, Math.PI * 2);
            ctx.fill();

            // ── Wing accent lines ──
            ctx.strokeStyle = 'rgba(255,180,80,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(enemy.x + W * 0.62, cy - H * 0.52);
            ctx.lineTo(enemy.x + W * 0.52, cy - H * 0.16);
            ctx.moveTo(enemy.x + W * 0.62, cy + H * 0.52);
            ctx.lineTo(enemy.x + W * 0.52, cy + H * 0.16);
            ctx.stroke();

            // ── Health bar above ship ──
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillRect(enemy.x - 2, enemy.y - 14, W + 4, 6);
            const hpPct = enemy.health / enemy.maxHealth;
            const hpColor = hpPct > 0.5 ? enemy.color : hpPct > 0.25 ? '#ffaa00' : '#ff3333';
            ctx.fillStyle = hpColor;
            ctx.fillRect(enemy.x - 2, enemy.y - 14, (W + 4) * hpPct, 6);

            ctx.restore();
        });
    }

    function drawBullets() {
        bullets.forEach(bullet => {
            ctx.save();
            if (bullet.owner === 'player') {
                // Sleek elongated energy bolt — tapered with a glowing core
                const bx = bullet.x, by = bullet.y + bullet.height / 2;
                // Outer glow
                const bGlow = ctx.createLinearGradient(bx - 4, by, bx + bullet.width + 2, by);
                bGlow.addColorStop(0, 'rgba(0,255,136,0)');
                bGlow.addColorStop(0.3, 'rgba(0,255,136,0.4)');
                bGlow.addColorStop(1, 'rgba(180,255,220,0.7)');
                ctx.fillStyle = bGlow;
                ctx.beginPath();
                ctx.ellipse(bx + bullet.width / 2, by, bullet.width / 2 + 4, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                // Core bolt — pointed diamond shape
                ctx.fillStyle = '#ccffee';
                ctx.beginPath();
                ctx.moveTo(bx + bullet.width, by);           // nose
                ctx.lineTo(bx + bullet.width * 0.6, by - 2); // upper body
                ctx.lineTo(bx, by);                           // tail
                ctx.lineTo(bx + bullet.width * 0.6, by + 2); // lower body
                ctx.closePath();
                ctx.fill();
                // Hot tip
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(bx + bullet.width - 1, by, 1.5, 0, Math.PI * 2);
                ctx.fill();
                // Homing magenta trail
                if (bullet.homing) {
                    const trail = ctx.createLinearGradient(bx - 8, by, bx, by);
                    trail.addColorStop(0, 'rgba(255,0,255,0)');
                    trail.addColorStop(1, 'rgba(255,0,255,0.35)');
                    ctx.fillStyle = trail;
                    ctx.beginPath();
                    ctx.ellipse(bx - 4, by, 8, 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else {
                // Enemy projectile — angular red spike
                const bx = bullet.x + bullet.width, by = bullet.y + bullet.height / 2;
                // Glow
                const eGlow = ctx.createLinearGradient(bx, by, bx - bullet.width - 4, by);
                eGlow.addColorStop(0, 'rgba(255,80,0,0)');
                eGlow.addColorStop(0.4, 'rgba(255,60,0,0.45)');
                eGlow.addColorStop(1, 'rgba(255,200,0,0.6)');
                ctx.fillStyle = eGlow;
                ctx.beginPath();
                ctx.ellipse(bx - bullet.width / 2, by, bullet.width / 2 + 3, 3.5, 0, 0, Math.PI * 2);
                ctx.fill();
                // Spike shape — reversed for left-travel
                ctx.fillStyle = '#ffcc44';
                ctx.beginPath();
                ctx.moveTo(bx - bullet.width, by);           // nose (left)
                ctx.lineTo(bx - bullet.width * 0.45, by - 2);
                ctx.lineTo(bx, by);                           // tail
                ctx.lineTo(bx - bullet.width * 0.45, by + 2);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(bx - bullet.width + 1, by, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        });
    }

    function drawPellets() {
        const hasActiveCombo = player.powerups.length > 0;
        const pcx = player.x + player.width / 2;
        const pcy = player.y + player.height / 2;
        const ATTRACT_RADIUS = 190;

        pellets.forEach(pellet => {
            const pulseSize = Math.sin(pellet.pulse) * 3;

            // Tether line toward player when combo is active and in range
            if (hasActiveCombo) {
                const dx = pcx - pellet.x;
                const dy = pcy - pellet.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < ATTRACT_RADIUS) {
                    const alpha = (1 - dist / ATTRACT_RADIUS) * 0.45;
                    ctx.save();
                    ctx.strokeStyle = pellet.color.replace(')', `, ${alpha})`).replace('hsl', 'hsla');
                    ctx.lineWidth = 1;
                    ctx.setLineDash([4, 6]);
                    ctx.beginPath();
                    ctx.moveTo(pellet.x, pellet.y);
                    ctx.lineTo(pcx, pcy);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();
                }
            }

            ctx.fillStyle = pellet.color;
            ctx.beginPath();
            ctx.arc(pellet.x, pellet.y, pellet.radius + pulseSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = pellet.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(pellet.x, pellet.y, pellet.radius + pulseSize + 5, 0, Math.PI * 2);
            ctx.stroke();
        });
    }

    function drawBombs() {
        bombs.forEach(bomb => {
            if (bomb.phase === 'detonating') return; // handled by drawExplosions
            ctx.save();
            const t = Date.now() / 1000;
            bomb.pulseAngle = t * 4;

            if (bomb.phase === 'armed') {
                // Warning ring — pulsing red danger indicator
                const armPct = bomb.armTimer / bomb.armDuration;
                const ringAlpha = 0.15 + 0.35 * Math.abs(Math.sin(t * 12));
                ctx.strokeStyle = `rgba(255,40,0,${ringAlpha})`;
                ctx.lineWidth = 2;
                ctx.setLineDash([6, 4]);
                ctx.beginPath();
                ctx.arc(bomb.x, bomb.y, bomb.blastRadius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                // Countdown fill wedge
                ctx.fillStyle = `rgba(255,60,0,${0.06 + armPct * 0.1})`;
                ctx.beginPath();
                ctx.moveTo(bomb.x, bomb.y);
                ctx.arc(bomb.x, bomb.y, bomb.blastRadius, -Math.PI / 2, -Math.PI / 2 + armPct * Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            // Bomb body
            const fuseGlow = bomb.phase === 'armed' ? 1 : (bomb.fuseTimer / bomb.fuseDuration);
            const bodyGrad = ctx.createRadialGradient(bomb.x - 3, bomb.y - 3, 0, bomb.x, bomb.y, bomb.radius);
            bodyGrad.addColorStop(0, '#ffee88');
            bodyGrad.addColorStop(0.5, `hsl(${20 + fuseGlow * 10}, 100%, 45%)`);
            bodyGrad.addColorStop(1, '#330000');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.arc(bomb.x, bomb.y, bomb.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#ff8800';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Spinning danger spikes
            const spikeCount = 6;
            ctx.strokeStyle = `rgba(255,${Math.floor(100 + fuseGlow * 100)},0,0.7)`;
            ctx.lineWidth = 1;
            for (let s = 0; s < spikeCount; s++) {
                const a = bomb.pulseAngle + (s / spikeCount) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(bomb.x + Math.cos(a) * bomb.radius, bomb.y + Math.sin(a) * bomb.radius);
                ctx.lineTo(bomb.x + Math.cos(a) * (bomb.radius + 5), bomb.y + Math.sin(a) * (bomb.radius + 5));
                ctx.stroke();
            }

            // Fuse spark
            if (bomb.phase === 'flying') {
                ctx.fillStyle = `rgba(255,220,0,${0.5 + 0.5 * Math.sin(t * 20)})`;
                ctx.beginPath();
                ctx.arc(bomb.x + bomb.radius * 0.7, bomb.y - bomb.radius * 0.7, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        });
    }

    function drawExplosions() {
        for (let i = explosions.length - 1; i >= 0; i--) {
            const ex = explosions[i];
            ex.frame++;
            const pct = ex.frame / ex.duration;
            if (pct >= 1) { explosions.splice(i, 1); continue; }

            ctx.save();
            // Outer shockwave ring
            const ringR = ex.blastRadius * pct;
            const ringAlpha = (1 - pct) * 0.6;
            ctx.strokeStyle = `rgba(255,160,0,${ringAlpha})`;
            ctx.lineWidth = 4 * (1 - pct);
            ctx.beginPath();
            ctx.arc(ex.x, ex.y, ringR, 0, Math.PI * 2);
            ctx.stroke();

            // Inner fireball
            const fireR = ex.blastRadius * 0.55 * (1 - pct * 0.7);
            const fireGrad = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, fireR);
            fireGrad.addColorStop(0, `rgba(255,255,200,${(1 - pct) * 0.9})`);
            fireGrad.addColorStop(0.4, `rgba(255,120,0,${(1 - pct) * 0.7})`);
            fireGrad.addColorStop(1, 'rgba(180,0,0,0)');
            ctx.fillStyle = fireGrad;
            ctx.beginPath();
            ctx.arc(ex.x, ex.y, fireR, 0, Math.PI * 2);
            ctx.fill();

            // Debris particles
            ex.particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.1; // gravity
                const pa = (1 - pct) * 0.8;
                ctx.fillStyle = `rgba(255,${Math.floor(80 + Math.random() * 120)},0,${pa})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * (1 - pct * 0.5), 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }
    }
    function drawLaserBeams() {
        for (let i = laserBeams.length - 1; i >= 0; i--) {
            const beam = laserBeams[i];
            beam.life--;
            if (beam.life <= 0) { laserBeams.splice(i, 1); continue; }

            const pct = beam.life / beam.maxLife;       // 1 → 0 as it fades
            const alpha = pct < 0.3 ? pct / 0.3 * 0.9 : 0.9;  // fade out tail

            // Hue shifts through the AMBIENT letters: blue → violet → cyan
            const hue = 190 + beam.letterIndex * 18;
            const coreHue = hue + 40;

            ctx.save();

            // Outer wide glow
            ctx.globalAlpha = alpha * 0.3;
            ctx.strokeStyle = `hsl(${hue}, 100%, 65%)`;
            ctx.lineWidth = 10 * pct + 3;
            ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
            ctx.shadowBlur = 18;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(beam.x1, beam.y1);
            ctx.lineTo(beam.x2, beam.y2);
            ctx.stroke();

            // Mid glow
            ctx.globalAlpha = alpha * 0.6;
            ctx.strokeStyle = `hsl(${hue}, 100%, 80%)`;
            ctx.lineWidth = 5 * pct + 1.5;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.moveTo(beam.x1, beam.y1);
            ctx.lineTo(beam.x2, beam.y2);
            ctx.stroke();

            // Core bright white line
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = `hsl(${coreHue}, 100%, 95%)`;
            ctx.lineWidth = 2 * pct + 0.5;
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.moveTo(beam.x1, beam.y1);
            ctx.lineTo(beam.x2, beam.y2);
            ctx.stroke();

            // Impact spark at enemy end (only while fresh)
            if (pct > 0.5) {
                const sparkAlpha = (pct - 0.5) / 0.5;
                ctx.globalAlpha = sparkAlpha;
                ctx.shadowColor = `hsl(${hue}, 100%, 80%)`;
                ctx.shadowBlur = 20;
                ctx.fillStyle = `hsl(${coreHue}, 100%, 90%)`;
                for (let s = 0; s < 6; s++) {
                    const a = (s / 6) * Math.PI * 2 + (1 - pct) * 8;
                    const r = (12 + s * 2) * (pct - 0.5) * 2;
                    ctx.beginPath();
                    ctx.moveTo(beam.x2, beam.y2);
                    ctx.lineTo(beam.x2 + Math.cos(a) * r, beam.y2 + Math.sin(a) * r);
                    ctx.lineWidth = 1.5;
                    ctx.strokeStyle = `hsl(${coreHue}, 100%, 90%)`;
                    ctx.stroke();
                }
                // Core flash dot
                ctx.beginPath();
                ctx.arc(beam.x2, beam.y2, 7 * (pct - 0.5) * 2 + 2, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.shadowBlur = 0;
            ctx.restore();
        }
    }

    function drawAmbientLetters() {
        if (ambientLettersRevealed === 0 && ambientClearFlash === 0) return;

        ctx.save();

        const letters = AMBIENT_WORD.split('');
        const letterSpacing = 32;
        const startX = canvas.width - 20 - (letters.length - 1) * letterSpacing;
        const y = 70;

        // Full-word clear flash — brief white bloom across the letters
        if (ambientClearFlash > 0) {
            const flashAlpha = (ambientClearFlash / 40) * 0.35;
            ctx.fillStyle = `rgba(180, 230, 255, ${flashAlpha})`;
            ctx.fillRect(startX - 14, y - 22, letters.length * letterSpacing + 10, 30);
        }

        letters.forEach((letter, i) => {
            const revealed = i < ambientLettersRevealed;
            const x = startX + i * letterSpacing;

            if (revealed) {
                // Revealed: softly glowing, low-alpha so it doesn't distract
                const glowAlpha = ambientClearFlash > 0
                    ? 0.55 + (ambientClearFlash / 40) * 0.45
                    : 0.45;
                ctx.shadowColor = '#88ccff';
                ctx.shadowBlur = ambientClearFlash > 0 ? 18 : 6;
                ctx.fillStyle = `rgba(160, 210, 255, ${glowAlpha})`;
                ctx.font = 'bold 18px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(letter, x, y);
                ctx.shadowBlur = 0;
            } else {
                // Unrevealed: barely visible placeholder
                ctx.fillStyle = 'rgba(80, 100, 140, 0.18)';
                ctx.font = 'bold 18px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(letter, x, y);
            }
        });

        // Tiny combo-window progress bar beneath the letters when timer is active
        if (ambientComboTimer > 0 && ambientLettersRevealed > 0 && ambientLettersRevealed < 7) {
            const barW = (letters.length - 1) * letterSpacing + 14;
            const barX = startX - 7;
            const pct = ambientComboTimer / AMBIENT_COMBO_WINDOW;
            ctx.fillStyle = 'rgba(80,100,140,0.25)';
            ctx.fillRect(barX, y + 5, barW, 2);
            ctx.fillStyle = `rgba(120,180,255,${0.35 + pct * 0.25})`;
            ctx.fillRect(barX, y + 5, barW * pct, 2);
        }

        ctx.restore();
    }

    // ─── AMBIENT Laser Strike ─────────────────────────────────────────────────
    function fireAmbientLaser(letterIndex) {
        // Find the nearest alive enemy to the player
        const px = player.x + player.width / 2;
        const py = player.y + player.height / 2;
        let nearestEnemy = null;
        let nearestDist = Infinity;
        enemies.forEach(enemy => {
            if (!enemy.isAlive) return;
            const ex = enemy.x + enemy.width / 2;
            const ey = enemy.y + enemy.height / 2;
            const d = Math.sqrt((ex - px) * (ex - px) + (ey - py) * (ey - py));
            if (d < nearestDist) { nearestDist = d; nearestEnemy = enemy; }
        });
        if (!nearestEnemy) return;

        const ex = nearestEnemy.x + nearestEnemy.width / 2;
        const ey = nearestEnemy.y + nearestEnemy.height / 2;

        // Deal damage — scales with combo depth so later letters hit harder
        const damage = 25 + letterIndex * 8;
        nearestEnemy.health -= damage;

        // Laser beam visual: from player nose to enemy center
        laserBeams.push({
            x1: px + player.width / 2,  // player nose tip
            y1: py,
            x2: ex,
            y2: ey,
            life: 22,        // frames alive
            maxLife: 22,
            letterIndex,     // 0-6, affects color hue
            targetEnemy: nearestEnemy
        });

        createAmbientLaserSound(letterIndex);

        // If kill triggered a combo (health <= 0), handle it here so explosion fires
        if (nearestEnemy.health <= 0) {
            nearestEnemy.isAlive = false;
            enemiesDestroyed++;
            player.score += 50;
            scoreFlashTimer = 40;
            createExplosionSound();
            const cx = ex, cy = ey;
            const particles = [];
            for (let p = 0; p < 12; p++) {
                const a = Math.random() * Math.PI * 2, s = 1.5 + Math.random() * 3.5;
                particles.push({ x: cx, y: cy, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 0.5, r: 2 + Math.random() * 3 });
            }
            explosions.push({ x: cx, y: cy, blastRadius: 55, frame: 0, duration: 40, particles });
            setTimeout(() => {
                const idx = enemies.indexOf(nearestEnemy);
                if (idx > -1) enemies.splice(idx, 1);
            }, 500);
        }
    }

    // ─── AMBIENT Clear ────────────────────────────────────────────────────────
    function triggerAmbientClear() {
        // Destroy all living enemies instantly
        enemies.forEach(enemy => {
            if (!enemy.isAlive) return;
            enemy.isAlive = false;
            enemiesDestroyed++;
            player.score += 50;
            scoreFlashTimer = 50;
            // Spawn explosion for each
            const cx = enemy.x + enemy.width / 2;
            const cy = enemy.y + enemy.height / 2;
            const particles = [];
            for (let p = 0; p < 14; p++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 4;
                particles.push({ x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1, r: 2 + Math.random() * 4 });
            }
            explosions.push({ x: cx, y: cy, blastRadius: 60, frame: 0, duration: 45, particles });
            setTimeout(() => {
                const idx = enemies.indexOf(enemy);
                if (idx > -1) enemies.splice(idx, 1);
            }, 500);
        });
        // Also clear all enemy bullets and bombs
        bullets = bullets.filter(b => b.owner !== 'enemy');
        bombs.length = 0;

        createAmbientClearSound();
        ambientClearFlash = 40;
        ambientLettersRevealed = 0;
        ambientComboTimer = 0;
    }

    // ─── Update ───────────────────────────────────────────────────────────────
    function update() {
        // ── AMBIENT combo timer tick ──────────────────────────────────────────
        if (ambientComboTimer > 0) {
            ambientComboTimer--;
            if (ambientComboTimer === 0 && ambientLettersRevealed > 0) {
                // Window expired — reset progress
                ambientLettersRevealed = 0;
            }
        }
        if (ambientClearFlash > 0) ambientClearFlash--;

        // Movement — player confined to left half (by design)
        if ((keys['w'] || keys['arrowup'])    && player.y > 0)                            player.y -= player.speed;
        if ((keys['s'] || keys['arrowdown'])  && player.y < canvas.height - player.height) player.y += player.speed;
        if ((keys['a'] || keys['arrowleft'])  && player.x > 0)                            player.x -= player.speed;
        if ((keys['d'] || keys['arrowright']) && player.x < canvas.width / 2 - player.width) player.x += player.speed;

        // Powerup timers
        for (let i = player.powerups.length - 1; i >= 0; i--) {
            player.powerups[i].timer--;
            if (player.powerups[i].timer <= 0) player.powerups.splice(i, 1);
        }

        // Enemy scaling — higher cap, quicker ramp
        maxEnemies = Math.min(2 + Math.floor(enemiesDestroyed / 2), 8);
        const aliveEnemies = enemies.filter(e => e.isAlive).length;
        if (aliveEnemies < maxEnemies && Math.random() < 0.015) spawnEnemy();

        // Enemy AI
        enemies.forEach(enemy => {
            if (!enemy.isAlive) return;

            // Actively track the player's Y center, with occasional random drift for variety
            const playerCY = player.y + player.height / 2;
            const enemyCY  = enemy.y  + enemy.height  / 2;
            const trackBias = 0.7;
            if (Math.random() < 0.02) enemy.targetY = Math.random() * (canvas.height - enemy.height);
            const blendedTarget = playerCY * trackBias + (enemy.targetY ?? playerCY) * (1 - trackBias);
            const dyToTarget = blendedTarget - enemyCY;
            if (Math.abs(dyToTarget) > 1) {
                enemy.y += Math.sign(dyToTarget) * Math.min(enemy.speed, Math.abs(dyToTarget));
            }
            enemy.y = Math.max(0, Math.min(canvas.height - enemy.height - DANGER_ZONE_HEIGHT, enemy.y));

            // Regular shots
            enemy.shootTimer++;
            if (enemy.shootTimer >= enemy.shootInterval) {
                enemyShoot(enemy);
                enemy.shootTimer = 0;
            }

            // Bomb attack
            enemy.bombTimer++;
            if (enemy.bombTimer >= enemy.bombInterval) {
                enemyLaunchBomb(enemy);
                enemy.bombTimer = 0;
            }
        });

        // Pellet spawning — now uses the constants
        pelletSpawnTimer++;
        if (pelletSpawnTimer >= PELLET_SPAWN_INTERVAL && pellets.length < MAX_PELLETS) {
            spawnPellet();
            pelletSpawnTimer = 0;
        }
        // Pellet pulse + combo attraction
        const hasActiveCombo = player.powerups.length > 0;
        const pcx = player.x + player.width / 2;
        const pcy = player.y + player.height / 2;
        const ATTRACT_RADIUS = 190;
        const ATTRACT_SPEED  = 2.8;
        pellets.forEach(p => {
            p.pulse += 0.1;
            if (hasActiveCombo) {
                const dx = pcx - p.x;
                const dy = pcy - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < ATTRACT_RADIUS && dist > 1) {
                    // Stronger pull the closer it gets
                    const strength = ATTRACT_SPEED * (1 - dist / ATTRACT_RADIUS) * 1.6;
                    p.x += (dx / dist) * strength;
                    p.y += (dy / dist) * strength;
                }
            }
        });

        // Pellet collection
        for (let i = pellets.length - 1; i >= 0; i--) {
            if (checkCircleCollision(pellets[i], player)) {
                player.score += 10;
                scoreFlashTimer = 30;
                createCollectSound();
                pellets.splice(i, 1);

                // Powerup every POWERUP_TRIGGER_SCORE points — score-threshold based
                const prevMilestone = Math.floor((player.score - 10) / POWERUP_TRIGGER_SCORE);
                const newMilestone  = Math.floor(player.score / POWERUP_TRIGGER_SCORE);
                if (newMilestone > prevMilestone) activatePowerup();
            }
        }

        // Danger zone / Spectrum Immersion
        const inDanger = player.y + player.height > canvas.height - DANGER_ZONE_HEIGHT;
        spectrumImmersed = inDanger && hasPowerup('spectrum_heal');

        if (inDanger) {
            if (hasPowerup('spectrum_heal')) {
                // Full instant heal every frame while immersed
                player.health = 100;

                // Erratic horizontal dash — override player X input
                spectrumDashTimer++;
                if (spectrumDashTimer >= SPECTRUM_DASH_INTERVAL) {
                    spectrumDashDir *= -1;
                    spectrumDashTimer = 0;
                }
                const newX = player.x + spectrumDashDir * spectrumDashSpeed;
                // Bounce within left half
                if (newX <= 0 || newX >= canvas.width / 2 - player.width) {
                    spectrumDashDir *= -1;
                    spectrumDashTimer = 0;
                }
                player.x = Math.max(0, Math.min(canvas.width / 2 - player.width, player.x + spectrumDashDir * spectrumDashSpeed));
            } else {
                dangerZoneDamageTimer++;
                if (dangerZoneDamageTimer >= 30) {
                    player.health = Math.max(0, player.health - 3);
                    createHitSound();
                    dangerZoneDamageTimer = 0;
                }
            }
        } else {
            dangerZoneDamageTimer = 0;
            spectrumDashTimer = 0;
        }

        // Enemies hurt in danger zone
        enemies.forEach(enemy => {
            if (!enemy.isAlive) return;
            if (enemy.y + enemy.height > canvas.height - DANGER_ZONE_HEIGHT && Math.random() < 0.02) {
                enemy.health = Math.max(0, enemy.health - 2);
            }
        });

        // ── Bomb update ──────────────────────────────────────────────────────
        for (let i = bombs.length - 1; i >= 0; i--) {
            const bomb = bombs[i];

            if (bomb.phase === 'flying') {
                bomb.x += bomb.vx;
                bomb.y += bomb.vy;
                bomb.fuseTimer++;
                // Out of bounds — remove
                if (bomb.x < 0 || bomb.x > canvas.width || bomb.y < 0 || bomb.y > canvas.height) {
                    bombs.splice(i, 1); continue;
                }
                // Fuse expires OR bomb reaches player proximity → arm it
                const toPx = bomb.x - (player.x + player.width / 2);
                const toPy = bomb.y - (player.y + player.height / 2);
                const toPlayer = Math.sqrt(toPx * toPx + toPy * toPy);
                if (bomb.fuseTimer >= bomb.fuseDuration || toPlayer < bomb.blastRadius * 0.6) {
                    bomb.phase = 'armed';
                    bomb.vx = 0; bomb.vy = 0;
                }
            } else if (bomb.phase === 'armed') {
                bomb.armTimer++;
                if (bomb.armTimer >= bomb.armDuration) {
                    // Detonate!
                    bomb.phase = 'detonating';
                    createBombDetonationSound();
                    // Check player in blast radius
                    const dx = player.x + player.width / 2 - bomb.x;
                    const dy = player.y + player.height / 2 - bomb.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < bomb.blastRadius) {
                        const falloff = 1 - dist / bomb.blastRadius;
                        let dmg = Math.round(bomb.damage * falloff);
                        if (spectrumImmersed) {
                            // Invincible — no damage
                        } else if (hasPowerup('shield')) {
                            const shieldLevel = getPowerupLevel('shield');
                            if (Math.random() > 0.3 * shieldLevel) { player.health -= dmg; createHitSound(); }
                        } else {
                            player.health -= dmg;
                            createHitSound();
                        }
                    }
                    // Spawn explosion effect
                    const particles = [];
                    for (let p = 0; p < 18; p++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = 1.5 + Math.random() * 4;
                        particles.push({ x: bomb.x, y: bomb.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1, r: 2 + Math.random() * 4 });
                    }
                    explosions.push({ x: bomb.x, y: bomb.y, blastRadius: bomb.blastRadius, frame: 0, duration: 45, particles });
                    bombs.splice(i, 1);
                }
            }
        }

        // Bullet movement & collision
        const bulletsToRemove = new Set();

        for (let i = 0; i < bullets.length; i++) {
            if (bulletsToRemove.has(i)) continue;
            const bullet = bullets[i];

            // Homing — diverts to intercept nearby enemy bullets/bombs, else targets nearest enemy
            if (bullet.homing && bullet.owner === 'player') {
                let homingTarget = null, homingDist = Infinity;

                // Nearby enemy bullets (within 180px)
                for (let j = 0; j < bullets.length; j++) {
                    if (bulletsToRemove.has(j)) continue;
                    const b = bullets[j];
                    if (b.owner !== 'enemy') continue;
                    const dx = b.x - bullet.x, dy = b.y - bullet.y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 180 && d < homingDist) { homingDist = d; homingTarget = { x: b.x, y: b.y }; }
                }

                // Nearby bombs (within 220px)
                for (let k = 0; k < bombs.length; k++) {
                    const bomb = bombs[k];
                    const dx = bomb.x - bullet.x, dy = bomb.y - bullet.y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 220 && d < homingDist) { homingDist = d; homingTarget = { x: bomb.x, y: bomb.y }; }
                }

                // Fallback: nearest enemy ship
                if (!homingTarget) {
                    enemies.forEach(enemy => {
                        if (!enemy.isAlive) return;
                        const dx = enemy.x + enemy.width / 2 - bullet.x, dy = enemy.y + enemy.height / 2 - bullet.y;
                        const d = Math.sqrt(dx * dx + dy * dy);
                        if (d < homingDist) { homingDist = d; homingTarget = { x: enemy.x + enemy.width / 2, y: enemy.y + enemy.height / 2 }; }
                    });
                }

                if (homingTarget) {
                    const dx = homingTarget.x - bullet.x, dy = homingTarget.y - bullet.y;
                    const angle = Math.atan2(dy, dx);
                    bullet.vx += Math.cos(angle) * bullet.homingStrength;
                    bullet.vy += Math.sin(angle) * bullet.homingStrength;
                    const speed = Math.sqrt(bullet.vx * bullet.vx + bullet.vy * bullet.vy);
                    if (speed > 8) { bullet.vx = (bullet.vx / speed) * 8; bullet.vy = (bullet.vy / speed) * 8; }
                }
            }

            bullet.x += bullet.vx;
            bullet.y += bullet.vy;

            if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                bulletsToRemove.add(i);
                continue;
            }

            if (bullet.owner === 'player') {
                let hit = false;

                // Intercept enemy bullets
                for (let j = 0; j < bullets.length; j++) {
                    if (j === i || bulletsToRemove.has(j)) continue;
                    const eb = bullets[j];
                    if (eb.owner !== 'enemy') continue;
                    const dx = eb.x - bullet.x, dy = eb.y - bullet.y;
                    if (Math.sqrt(dx * dx + dy * dy) < 12) {
                        bulletsToRemove.add(i);
                        bulletsToRemove.add(j);
                        createHitSound();
                        player.score += 5;
                        scoreFlashTimer = 18;
                        hit = true;
                        break;
                    }
                }
                if (hit) continue;

                // Intercept bombs
                for (let k = bombs.length - 1; k >= 0; k--) {
                    const bomb = bombs[k];
                    const dx = bomb.x - bullet.x, dy = bomb.y - bullet.y;
                    if (Math.sqrt(dx * dx + dy * dy) < bomb.radius + 8) {
                        const bx = bomb.x, by = bomb.y;
                        bombs.splice(k, 1);
                        bulletsToRemove.add(i);
                        createHitSound();
                        player.score += 15;
                        scoreFlashTimer = 25;
                        const particles = [];
                        for (let p = 0; p < 10; p++) {
                            const a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 3;
                            particles.push({ x: bx, y: by, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 0.5, r: 2 + Math.random() * 3 });
                        }
                        explosions.push({ x: bx, y: by, blastRadius: 40, frame: 0, duration: 28, particles });
                        hit = true;
                        break;
                    }
                }
                if (hit) continue;

                // Hit enemy ships
                for (let j = 0; j < enemies.length; j++) {
                    const enemy = enemies[j];
                    if (enemy.isAlive && checkCollision(bullet, enemy)) {
                        enemy.health -= bullet.damage || 10;
                        bulletsToRemove.add(i);
                        createHitSound();
                        if (enemy.health <= 0) {
                            enemy.isAlive = false;
                            enemiesDestroyed++;
                            player.score += 50;
                            scoreFlashTimer = 40;
                            createExplosionSound();

                            // ── AMBIENT combo ──────────────────────────────
                            ambientLettersRevealed++;
                            ambientComboTimer = AMBIENT_COMBO_WINDOW;
                            if (ambientLettersRevealed >= 7) {
                                triggerAmbientClear();
                            } else {
                                // Fire laser beam at nearest enemy for every new letter
                                fireAmbientLaser(ambientLettersRevealed - 1);
                            }

                            setTimeout(() => {
                                const idx = enemies.indexOf(enemy);
                                if (idx > -1) enemies.splice(idx, 1);
                            }, 500);
                        }
                        hit = true;
                        break;
                    }
                }
                if (hit) continue;

            } else if (bullet.owner === 'enemy' && checkCollision(bullet, player)) {
                if (spectrumImmersed) {
                    // Deflect — bullet removed but no damage
                    bulletsToRemove.add(i);
                } else if (hasPowerup('shield')) {
                    const shieldLevel = getPowerupLevel('shield');
                    if (Math.random() > 0.3 * shieldLevel) {
                        player.health -= 10;
                        createHitSound();
                    }
                } else {
                    player.health -= 10;
                    createHitSound();
                }
                bulletsToRemove.add(i);
            }
        }

        // Apply all bullet removals in one reverse pass — safe, no index corruption
        const removeArr = [...bulletsToRemove].sort((a, b) => b - a);
        for (const idx of removeArr) bullets.splice(idx, 1);

        // Death check
        if (player.health <= 0) {
            player.health = 0;
            gameState = 'dead';
            createDeathSound();
        }
    }

    // ─── Game Loop ────────────────────────────────────────────────────────────
    function gameLoop() {
        if (gameState === 'start') {
            drawStartScreen();
            requestAnimationFrame(gameLoop);
            return;
        }

        if (gameState === 'dead') {
            // Draw final game state underneath, then overlay
            ctx.fillStyle = 'rgba(13, 13, 31, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawSpectrum();
            drawDeathScreen();
            requestAnimationFrame(gameLoop);
            return;
        }

        // Playing
        update();

        ctx.fillStyle = 'rgba(13, 13, 31, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawSpectrum();
        drawBoundaryLine();
        drawPellets();
        drawPlayer();
        drawEnemies();
        drawBullets();
        drawBombs();
        drawExplosions();
        drawLaserBeams();
        drawHUD();
        drawAmbientLetters();
        drawControls();

        // Shooting
        const hasAnyPowerup = player.powerups.length > 0;
        const cooldownRate = hasAnyPowerup && hasPowerup('rapid_fire') ? 5 : 15;
        if (shootCooldown <= 0) {
            playerShoot();
            shootCooldown = cooldownRate;
        }
        if (shootCooldown > 0) shootCooldown--;

        requestAnimationFrame(gameLoop);
    }

    // ─── Reset ────────────────────────────────────────────────────────────────
    function resetGame() {
        player.x = 100; player.y = canvas.height / 2;
        player.health = 100; player.score = 0;
        player.powerups = []; player.lastPowerupScore = 0;
        enemies.length = 0; bullets.length = 0; pellets.length = 0;
        bombs.length = 0; explosions.length = 0; laserBeams.length = 0;
        enemiesDestroyed = 0; maxEnemies = 1;
        pelletSpawnTimer = 0; dangerZoneDamageTimer = 0; shootCooldown = 0; scoreFlashTimer = 0;
        ambientLettersRevealed = 0; ambientComboTimer = 0; ambientClearFlash = 0;
        spectrumImmersed = false; spectrumDashDir = 1; spectrumDashTimer = 0;
        gameState = 'playing';
        spawnEnemy();
    }

    // ─── Input ────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
        if (e.key === ' ') e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    canvas.addEventListener('click', async () => {
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        if (gameState === 'start') {
            await createReverb();
            startAmbientSound();
            resetGame();
        } else if (gameState === 'dead') {
            resetGame();
        }
    });

    // ─── Boot ─────────────────────────────────────────────────────────────────
    gameState = 'start';
    gameLoop();
</script>
</body>
</html>
