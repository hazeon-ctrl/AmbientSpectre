<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Spectrum Shooter</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #06060f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
        }
        #gameContainer {
            text-align: center;
            position: relative;
        }
        #canvas {
            border: 2px solid #00ff88;
            background: #0d0d1f;
            display: block;
            margin: 0 auto;
            cursor: crosshair;
        }
        /* All HUD is now drawn on canvas. These are only fallback/hidden. */
        #info, #controls, #powerup { display: none; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="canvas" width="800" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // ─── Audio Context ────────────────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.8;
    analyser.connect(audioCtx.destination);

    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    // D Dorian Scale
    const dorianScale = {
        D3: 146.83, E3: 164.81, F3: 174.61, G3: 196.00, A3: 220.00, B3: 246.94, C4: 261.63,
        D4: 293.66, E4: 329.63, F4: 349.23, G4: 392.00, A4: 440.00, B4: 493.88, C5: 523.25,
        D5: 587.33, E5: 659.25, F5: 698.46, G5: 783.99, A5: 880.00, B5: 987.77, C6: 1046.50
    };

    // ─── Constants ────────────────────────────────────────────────────────────
    const DANGER_ZONE_HEIGHT = 120;
    const PELLET_SPAWN_INTERVAL = 45; // frames between pellet spawns
    const MAX_PELLETS = 16;
    const POWERUP_TRIGGER_SCORE = 50; // every N score points = powerup

    // ─── Game State ───────────────────────────────────────────────────────────
    let gameState = 'start'; // 'start' | 'playing' | 'dead'
    let loopRunning = false;

    const player = {
        x: 100,
        y: canvas.height / 2,
        width: 30,
        height: 30,
        speed: 5,
        health: 100,
        color: '#00ff88',
        score: 0,
        lastPowerupScore: 0, // track when next powerup fires
        powerups: []
    };

    let enemies = [];
    let maxEnemies = 1;
    let enemiesDestroyed = 0;
    let bullets = [];
    let pellets = [];
    const keys = {};
    let pelletSpawnTimer = 0;
    let dangerZoneDamageTimer = 0;
    let shootCooldown = 0;

    // ─── Audio Effects ────────────────────────────────────────────────────────
    let reverbNode = null;
    let delayNode = null;
    let delayGain = null;
    let delayFeedback = null;

    async function createReverb() {
        if (reverbNode) return; // guard: only build once
        reverbNode = audioCtx.createConvolver();

        const length = audioCtx.sampleRate * 2;
        const impulse = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
        const left = impulse.getChannelData(0);
        const right = impulse.getChannelData(1);
        for (let i = 0; i < length; i++) {
            const decay = Math.pow(1 - i / length, 3);
            left[i] = (Math.random() * 2 - 1) * decay;
            right[i] = (Math.random() * 2 - 1) * decay;
        }
        reverbNode.buffer = impulse;

        delayNode = audioCtx.createDelay(1.0);
        delayNode.delayTime.value = 0.3;
        delayGain = audioCtx.createGain();
        delayGain.gain.value = 0.3;
        delayFeedback = audioCtx.createGain();
        delayFeedback.gain.value = 0.4;

        delayNode.connect(delayFeedback);
        delayFeedback.connect(delayNode);
        delayNode.connect(delayGain);

        reverbNode.connect(analyser);
        delayGain.connect(analyser);
    }

    let ambientOsc1 = null, ambientOsc2 = null;

    function startAmbientSound() {
        if (ambientOsc1) return;
        ambientOsc1 = audioCtx.createOscillator();
        ambientOsc2 = audioCtx.createOscillator();
        const ambientGain = audioCtx.createGain();
        ambientOsc1.type = 'sine';
        ambientOsc2.type = 'sine';
        ambientOsc1.frequency.value = dorianScale.D3;
        ambientOsc2.frequency.value = dorianScale.A3;
        ambientGain.gain.value = 0.04;
        ambientOsc1.connect(ambientGain);
        ambientOsc2.connect(ambientGain);
        ambientGain.connect(reverbNode);
        ambientGain.connect(analyser);
        ambientOsc1.start();
        ambientOsc2.start();
    }

    // ─── Sound Functions ──────────────────────────────────────────────────────
    function connectAndPlay(osc, gain, duration) {
        // Helper: stops oscillator and disconnects nodes to prevent memory leak
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + duration);
        osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
    }

    function createShootSound(note) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(note * 3, audioCtx.currentTime);
        filter.Q.value = 1;
        osc.connect(filter); filter.connect(gain);
        gain.connect(reverbNode); gain.connect(analyser);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(note, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(note * 0.6, audioCtx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);

        const harmonic = audioCtx.createOscillator();
        const harmonicGain = audioCtx.createGain();
        harmonic.type = 'sine';
        harmonic.frequency.value = note * 2;
        harmonicGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        harmonicGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        harmonic.connect(harmonicGain);
        harmonicGain.connect(reverbNode); harmonicGain.connect(analyser);
        connectAndPlay(osc, gain, 0.12);
        connectAndPlay(harmonic, harmonicGain, 0.08);
    }

    function createHitSound() {
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(400, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
        filter.Q.value = 2;
        osc1.connect(filter); osc2.connect(filter); filter.connect(gain);
        gain.connect(delayNode); gain.connect(analyser);
        osc1.type = 'sawtooth'; osc2.type = 'sawtooth';
        osc1.frequency.setValueAtTime(dorianScale.C4, audioCtx.currentTime);
        osc1.frequency.exponentialRampToValueAtTime(dorianScale.F3, audioCtx.currentTime + 0.2);
        osc2.frequency.setValueAtTime(dorianScale.C4 * 1.01, audioCtx.currentTime);
        osc2.frequency.exponentialRampToValueAtTime(dorianScale.F3 * 1.01, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        connectAndPlay(osc1, gain, 0.2);
        connectAndPlay(osc2, gain, 0.2);
    }

    function createCollectSound() {
        const notes = [dorianScale.D5, dorianScale.E5, dorianScale.G5];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
            osc.type = 'sine';
            osc.frequency.value = freq;
            const startTime = audioCtx.currentTime + i * 0.04;
            gain.gain.setValueAtTime(0.2, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.15);
            osc.start(startTime); osc.stop(startTime + 0.15);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
        });
    }

    function createPowerupSound(type) {
        const chords = {
            'rapid_fire':    [dorianScale.D4, dorianScale.A4, dorianScale.D5],
            'spread_shot':   [dorianScale.E4, dorianScale.G4, dorianScale.B4],
            'shield':        [dorianScale.F4, dorianScale.A4, dorianScale.C5],
            'spectrum_heal': [dorianScale.G4, dorianScale.B4, dorianScale.D5],
            'damage_boost':  [dorianScale.A4, dorianScale.C5, dorianScale.E5]
        };
        const chord = chords[type] || chords['rapid_fire'];
        chord.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
            osc.type = 'triangle';
            osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.04;
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
        });
    }

    function createComboSound(comboLevel) {
        const note = dorianScale.D5 * Math.pow(2, comboLevel * 0.25);
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.value = note;
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
        connectAndPlay(osc, gain, 0.2);
    }

    function createExplosionSound() {
        const bufferSize = audioCtx.sampleRate * 0.5;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        noise.connect(filter); filter.connect(gain);
        gain.connect(delayNode); gain.connect(reverbNode); gain.connect(analyser);
        noise.start(audioCtx.currentTime); noise.stop(audioCtx.currentTime + 0.5);

        [dorianScale.B3, dorianScale.C4, dorianScale.D4].forEach(freq => {
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.3, audioCtx.currentTime + 0.3);
            oscGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(oscGain); oscGain.connect(reverbNode); oscGain.connect(analyser);
            connectAndPlay(osc, oscGain, 0.3);
        });
    }

    function createSpawnSound() {
        const notes = [dorianScale.D4, dorianScale.F4, dorianScale.A4, dorianScale.B4];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.06;
            gain.gain.setValueAtTime(0.15, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
            osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
            osc.start(t); osc.stop(t + 0.2);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
        });
    }

    function createDeathSound() {
        [dorianScale.D4, dorianScale.C4, dorianScale.B3, dorianScale.A3].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.15;
            gain.gain.setValueAtTime(0.3, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.connect(gain); gain.connect(reverbNode); gain.connect(analyser);
            osc.start(t); osc.stop(t + 0.4);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
        });
    }

    // ─── Pellets ──────────────────────────────────────────────────────────────
    // Powerup types — damage_boost is now in the pool
    const POWERUP_TYPES = ['rapid_fire', 'spread_shot', 'shield', 'spectrum_heal', 'damage_boost'];
    const POWERUP_NAMES = {
        'rapid_fire':    '⚡ RAPID FIRE',
        'spread_shot':   '✦ SPREAD SHOT',
        'shield':        '◈ SHIELD',
        'spectrum_heal': '♥ SPECTRUM HEAL',
        'damage_boost':  '▲ DAMAGE BOOST'
    };

    // How many pellets until next powerup
    function pelletsUntilNextPowerup() {
        const needed = POWERUP_TRIGGER_SCORE; // score per powerup
        const remainder = player.score % needed;
        // each pellet = 10 pts
        return Math.ceil((needed - remainder) / 10);
    }

    function spawnPellet() {
        pellets.push({
            x: Math.random() * (canvas.width / 2 - 100) + 50,
            y: Math.random() * (canvas.height - DANGER_ZONE_HEIGHT - 40) + 20,
            radius: 8,
            color: `hsl(${Math.random() * 360}, 100%, 60%)`,
            pulse: Math.random() * Math.PI * 2
        });
    }

    // ─── Powerups ─────────────────────────────────────────────────────────────
    const POWERUP_DURATION = 600; // 10s at 60fps — up from 300

    function activatePowerup() {
        const newPowerup = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
        const existingIndex = player.powerups.findIndex(p => p.type === newPowerup);
        if (existingIndex !== -1) {
            player.powerups[existingIndex].timer = POWERUP_DURATION;
            player.powerups[existingIndex].level = Math.min(3, player.powerups[existingIndex].level + 1);
            createComboSound(player.powerups[existingIndex].level);
        } else {
            player.powerups.push({ type: newPowerup, timer: POWERUP_DURATION, level: 1 });
            createPowerupSound(newPowerup);
        }
    }

    function hasPowerup(type) { return player.powerups.some(p => p.type === type); }
    function getPowerupLevel(type) {
        const p = player.powerups.find(p => p.type === type);
        return p ? p.level : 0;
    }

    // ─── Shooting ─────────────────────────────────────────────────────────────
    function playerShoot() {
        const hasSpread = hasPowerup('spread_shot');
        const damageLevel = getPowerupLevel('damage_boost');

        if (hasSpread) {
            const spreadCount = 3 + getPowerupLevel('spread_shot');
            for (let i = 0; i < spreadCount; i++) {
                const angle = (i - Math.floor(spreadCount / 2)) * 15;
                bullets.push({
                    x: player.x + player.width,
                    y: player.y + player.height / 2,
                    width: 10, height: 4,
                    vx: 8, vy: Math.sin(angle * Math.PI / 180) * 3,
                    owner: 'player', color: player.color,
                    homing: true, homingStrength: 0.08,
                    damage: 10 + damageLevel * 5
                });
            }
            createShootSound(dorianScale.G4);
        } else {
            bullets.push({
                x: player.x + player.width,
                y: player.y + player.height / 2,
                width: 10, height: 4,
                vx: 8, vy: 0,
                owner: 'player', color: player.color,
                homing: true, homingStrength: 0.08,
                damage: 10 + damageLevel * 5
            });
            createShootSound(dorianScale.A4);
        }
    }

    function enemyShoot(enemy) {
        // Aim at player's current Y — no more dumb straight shots
        const dy = (player.y + player.height / 2) - (enemy.y + enemy.height / 2);
        const dist = Math.sqrt(36 + dy * dy); // vx component = -6
        bullets.push({
            x: enemy.x,
            y: enemy.y + enemy.height / 2,
            width: 10, height: 4,
            vx: (-6 / dist) * 6,
            vy: (dy / dist) * 6,
            owner: 'enemy', color: enemy.color
        });
        createShootSound(dorianScale.E3);
    }

    // ─── Enemy Spawning ───────────────────────────────────────────────────────
    function spawnEnemy() {
        enemies.push({
            x: canvas.width - 150 - Math.random() * 100,
            y: Math.random() * (canvas.height - 150) + 50,
            width: 30, height: 30, speed: 3,
            health: 100, maxHealth: 100,
            color: `hsl(${Math.random() * 30}, 100%, 50%)`,
            shootTimer: Math.random() * 60,
            shootInterval: 120,
            isAlive: true
        });
        createSpawnSound();
    }

    // ─── Collision ────────────────────────────────────────────────────────────
    function checkCollision(r1, r2) {
        return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x &&
               r1.y < r2.y + r2.height && r1.y + r1.height > r2.y;
    }
    function checkCircleCollision(circle, rect) {
        const cx = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
        const cy = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
        const dx = circle.x - cx, dy = circle.y - cy;
        return dx * dx + dy * dy < circle.radius * circle.radius;
    }

    // ─── Draw ─────────────────────────────────────────────────────────────────
    function drawSpectrum() {
        analyser.getByteFrequencyData(dataArray);
        const barWidth = (canvas.width / bufferLength) * 2.5;
        const isDangerMode = !hasPowerup('spectrum_heal');
        let x = 0;
        for (let i = 0; i < bufferLength; i++) {
            const barHeight = (dataArray[i] / 255) * DANGER_ZONE_HEIGHT;
            const hue = isDangerMode ? 0 + (i / bufferLength) * 40 : 150 + (i / bufferLength) * 60;
            ctx.fillStyle = `hsla(${hue}, 100%, 50%, 0.7)`;
            ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
            x += barWidth + 0.5;
        }

        // Danger zone line
        ctx.strokeStyle = isDangerMode ? '#ff3333' : '#33ff88';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - DANGER_ZONE_HEIGHT);
        ctx.lineTo(canvas.width, canvas.height - DANGER_ZONE_HEIGHT);
        ctx.stroke();
        ctx.setLineDash([]);

        // Danger zone label
        ctx.fillStyle = isDangerMode ? 'rgba(255,51,51,0.5)' : 'rgba(51,255,136,0.4)';
        ctx.font = '10px Courier New';
        ctx.textAlign = 'right';
        ctx.fillText(isDangerMode ? 'DANGER ZONE' : 'HEAL ZONE', canvas.width - 8, canvas.height - DANGER_ZONE_HEIGHT + 14);
    }

    // Player's movement boundary line (left half)
    function drawBoundaryLine() {
        ctx.strokeStyle = 'rgba(100, 150, 255, 0.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 8]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height - DANGER_ZONE_HEIGHT);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function drawPlayer() {
        const cx = player.x + player.width / 2;
        const cy = player.y + player.height / 2;
        const W = player.width;   // 30
        const H = player.height;  // 30

        ctx.save();

        // ── Glow ──
        const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 48);
        glow.addColorStop(0, 'rgba(0, 255, 136, 0.35)');
        glow.addColorStop(1, 'rgba(0, 255, 136, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(cx, cy, 48, 0, Math.PI * 2);
        ctx.fill();

        // ── Engine exhaust (drawn behind hull) ──
        // Two small thruster nozzles at rear, animated flicker
        const flicker = 0.6 + 0.4 * Math.sin(Date.now() / 60);
        // Upper thruster
        const exhaustGrad1 = ctx.createLinearGradient(player.x - 14, cy - 8, player.x, cy - 8);
        exhaustGrad1.addColorStop(0, `rgba(0,180,255,0)`);
        exhaustGrad1.addColorStop(1, `rgba(0,255,200,${0.9 * flicker})`);
        ctx.fillStyle = exhaustGrad1;
        ctx.beginPath();
        ctx.moveTo(player.x, cy - 6);
        ctx.lineTo(player.x - 12 * flicker, cy - 9);
        ctx.lineTo(player.x - 12 * flicker, cy - 5);
        ctx.closePath();
        ctx.fill();
        // Lower thruster
        const exhaustGrad2 = ctx.createLinearGradient(player.x - 14, cy + 8, player.x, cy + 8);
        exhaustGrad2.addColorStop(0, `rgba(0,180,255,0)`);
        exhaustGrad2.addColorStop(1, `rgba(0,255,200,${0.9 * flicker})`);
        ctx.fillStyle = exhaustGrad2;
        ctx.beginPath();
        ctx.moveTo(player.x, cy + 6);
        ctx.lineTo(player.x - 12 * flicker, cy + 9);
        ctx.lineTo(player.x - 12 * flicker, cy + 5);
        ctx.closePath();
        ctx.fill();

        // ── Main hull — forward-pointing fighter ──
        // Drawn facing right (→). Origin at (player.x, player.y), center at (cx, cy).
        ctx.beginPath();
        // Nose tip
        ctx.moveTo(player.x + W, cy);
        // Upper wing leading edge
        ctx.lineTo(player.x + W * 0.55, cy - H * 0.28);
        // Upper fuselage shoulder
        ctx.lineTo(player.x + W * 0.3, cy - H * 0.18);
        // Upper wing root / tail fin
        ctx.lineTo(player.x + W * 0.1, cy - H * 0.5);
        // Rear top
        ctx.lineTo(player.x, cy - H * 0.18);
        // Rear flat
        ctx.lineTo(player.x, cy + H * 0.18);
        // Lower wing root / tail fin
        ctx.lineTo(player.x + W * 0.1, cy + H * 0.5);
        // Lower fuselage shoulder
        ctx.lineTo(player.x + W * 0.3, cy + H * 0.18);
        // Lower wing leading edge
        ctx.lineTo(player.x + W * 0.55, cy + H * 0.28);
        ctx.closePath();

        // Hull fill — green-to-teal gradient nose-to-tail
        const hullGrad = ctx.createLinearGradient(player.x, cy, player.x + W, cy);
        hullGrad.addColorStop(0, '#007744');
        hullGrad.addColorStop(0.5, '#00cc66');
        hullGrad.addColorStop(1, '#00ffaa');
        ctx.fillStyle = hullGrad;
        ctx.fill();

        // Hull outline
        ctx.strokeStyle = '#88ffdd';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // ── Cockpit canopy ──
        ctx.beginPath();
        ctx.ellipse(player.x + W * 0.6, cy, W * 0.14, H * 0.12, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(150, 255, 220, 0.85)';
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.stroke();

        // ── Engine block (rear center) ──
        ctx.fillStyle = '#005533';
        ctx.beginPath();
        ctx.roundRect(player.x, cy - 5, W * 0.18, 10, 2);
        ctx.fill();

        // ── Shield indicator ──
        if (hasPowerup('shield')) {
            const shieldLevel = getPowerupLevel('shield');
            const alpha = 0.45 + shieldLevel * 0.15;
            // Hexagonal shield outline for style
            ctx.strokeStyle = `rgba(0, 220, 255, ${alpha})`;
            ctx.lineWidth = 2 + shieldLevel;
            ctx.shadowColor = '#00ddff';
            ctx.shadowBlur = 8 + shieldLevel * 4;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
                const r = 26 + shieldLevel * 2;
                if (i === 0) ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
                else ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // ── Damage boost: glowing red wing tips ──
        if (hasPowerup('damage_boost')) {
            const lvl = getPowerupLevel('damage_boost');
            ctx.fillStyle = `rgba(255, 60, 60, ${0.6 + lvl * 0.13})`;
            ctx.shadowColor = '#ff3333';
            ctx.shadowBlur = 6 + lvl * 3;
            // Upper wingtip dot
            ctx.beginPath();
            ctx.arc(player.x + W * 0.1, cy - H * 0.5, 3, 0, Math.PI * 2);
            ctx.fill();
            // Lower wingtip dot
            ctx.beginPath();
            ctx.arc(player.x + W * 0.1, cy + H * 0.5, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // ── Homing aura (always-on core ability) — soft magenta ring ──
        ctx.strokeStyle = 'rgba(255, 0, 255, 0.3)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 5]);
        ctx.beginPath();
        ctx.arc(cx, cy, 34, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);

        // ── Health bar above ship ──
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(player.x - 2, player.y - 14, W + 4, 6);
        const hpColor = player.health > 50 ? '#00ff88' : player.health > 25 ? '#ffaa00' : '#ff3333';
        ctx.fillStyle = hpColor;
        ctx.fillRect(player.x - 2, player.y - 14, ((W + 4) * player.health / 100), 6);

        ctx.restore();
    }

    function drawEnemies() {
        enemies.forEach(enemy => {
            const cx = enemy.x + enemy.width / 2;
            const cy = enemy.y + enemy.height / 2;
            const W = enemy.width;   // 30
            const H = enemy.height;  // 30

            if (!enemy.isAlive) {
                // Animated expanding debris ring
                for (let i = 0; i < 10; i++) {
                    const angle = (i / 10) * Math.PI * 2;
                    const dist = 18 + Math.sin(Date.now() / 80 + i) * 4;
                    ctx.fillStyle = enemy.color;
                    ctx.globalAlpha = 0.7;
                    ctx.beginPath();
                    ctx.arc(
                        cx + Math.cos(angle) * dist,
                        cy + Math.sin(angle) * dist,
                        2.5, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
                // Inner ember
                ctx.fillStyle = '#ffaa00';
                ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 60);
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                return;
            }

            ctx.save();

            // ── Glow ──
            const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 44);
            glow.addColorStop(0, `hsla(${parseInt(enemy.color.match(/\d+/)[0])}, 100%, 50%, 0.3)`);
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(cx, cy, 44, 0, Math.PI * 2);
            ctx.fill();

            // ── Engine exhaust (on right side — enemy faces left) ──
            const flicker = 0.6 + 0.4 * Math.sin(Date.now() / 55 + cx);
            const exGrad = ctx.createLinearGradient(enemy.x + W, cy, enemy.x + W + 14, cy);
            exGrad.addColorStop(0, `rgba(255,120,0,${0.9 * flicker})`);
            exGrad.addColorStop(1, 'rgba(255,60,0,0)');
            ctx.fillStyle = exGrad;
            ctx.beginPath();
            ctx.moveTo(enemy.x + W, cy - 4);
            ctx.lineTo(enemy.x + W + 13 * flicker, cy - 2);
            ctx.lineTo(enemy.x + W + 13 * flicker, cy + 2);
            ctx.lineTo(enemy.x + W, cy + 4);
            ctx.closePath();
            ctx.fill();

            // ── Main hull — angular left-facing predator ──
            // Enemy faces LEFT (←). Nose tip at left side.
            ctx.beginPath();
            // Nose tip (left)
            ctx.moveTo(enemy.x, cy);
            // Upper jaw / forward edge
            ctx.lineTo(enemy.x + W * 0.32, cy - H * 0.22);
            // Upper fuselage
            ctx.lineTo(enemy.x + W * 0.52, cy - H * 0.16);
            // Upper wing spike (swept back)
            ctx.lineTo(enemy.x + W * 0.62, cy - H * 0.52);
            // Upper wing inner notch
            ctx.lineTo(enemy.x + W * 0.72, cy - H * 0.28);
            // Rear top
            ctx.lineTo(enemy.x + W, cy - H * 0.14);
            // Rear flat
            ctx.lineTo(enemy.x + W, cy + H * 0.14);
            // Lower wing inner notch
            ctx.lineTo(enemy.x + W * 0.72, cy + H * 0.28);
            // Lower wing spike
            ctx.lineTo(enemy.x + W * 0.62, cy + H * 0.52);
            // Lower fuselage
            ctx.lineTo(enemy.x + W * 0.52, cy + H * 0.16);
            // Lower jaw
            ctx.lineTo(enemy.x + W * 0.32, cy + H * 0.22);
            ctx.closePath();

            // Hull fill — hostile red-orange gradient
            const hullGrad = ctx.createLinearGradient(enemy.x + W, cy, enemy.x, cy);
            hullGrad.addColorStop(0, '#550000');
            hullGrad.addColorStop(0.45, enemy.color);
            hullGrad.addColorStop(1, '#ffcc44');
            ctx.fillStyle = hullGrad;
            ctx.fill();

            // Hull outline
            ctx.strokeStyle = '#ffddaa';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // ── Cockpit slit (narrow, menacing) ──
            ctx.beginPath();
            ctx.ellipse(enemy.x + W * 0.35, cy, W * 0.1, H * 0.07, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 40, 40, 0.9)';
            ctx.fill();
            // Glint
            ctx.fillStyle = 'rgba(255,180,180,0.7)';
            ctx.beginPath();
            ctx.ellipse(enemy.x + W * 0.33, cy - 1, W * 0.04, H * 0.025, 0, 0, Math.PI * 2);
            ctx.fill();

            // ── Wing accent lines ──
            ctx.strokeStyle = 'rgba(255,180,80,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(enemy.x + W * 0.62, cy - H * 0.52);
            ctx.lineTo(enemy.x + W * 0.52, cy - H * 0.16);
            ctx.moveTo(enemy.x + W * 0.62, cy + H * 0.52);
            ctx.lineTo(enemy.x + W * 0.52, cy + H * 0.16);
            ctx.stroke();

            // ── Health bar above ship ──
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillRect(enemy.x - 2, enemy.y - 14, W + 4, 6);
            const hpPct = enemy.health / enemy.maxHealth;
            const hpColor = hpPct > 0.5 ? enemy.color : hpPct > 0.25 ? '#ffaa00' : '#ff3333';
            ctx.fillStyle = hpColor;
            ctx.fillRect(enemy.x - 2, enemy.y - 14, (W + 4) * hpPct, 6);

            ctx.restore();
        });
    }

    function drawBullets() {
        bullets.forEach(bullet => {
            ctx.save();
            if (bullet.owner === 'player') {
                // Sleek elongated energy bolt — tapered with a glowing core
                const bx = bullet.x, by = bullet.y + bullet.height / 2;
                // Outer glow
                const bGlow = ctx.createLinearGradient(bx - 4, by, bx + bullet.width + 2, by);
                bGlow.addColorStop(0, 'rgba(0,255,136,0)');
                bGlow.addColorStop(0.3, 'rgba(0,255,136,0.4)');
                bGlow.addColorStop(1, 'rgba(180,255,220,0.7)');
                ctx.fillStyle = bGlow;
                ctx.beginPath();
                ctx.ellipse(bx + bullet.width / 2, by, bullet.width / 2 + 4, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                // Core bolt — pointed diamond shape
                ctx.fillStyle = '#ccffee';
                ctx.beginPath();
                ctx.moveTo(bx + bullet.width, by);           // nose
                ctx.lineTo(bx + bullet.width * 0.6, by - 2); // upper body
                ctx.lineTo(bx, by);                           // tail
                ctx.lineTo(bx + bullet.width * 0.6, by + 2); // lower body
                ctx.closePath();
                ctx.fill();
                // Hot tip
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(bx + bullet.width - 1, by, 1.5, 0, Math.PI * 2);
                ctx.fill();
                // Homing magenta trail
                if (bullet.homing) {
                    const trail = ctx.createLinearGradient(bx - 8, by, bx, by);
                    trail.addColorStop(0, 'rgba(255,0,255,0)');
                    trail.addColorStop(1, 'rgba(255,0,255,0.35)');
                    ctx.fillStyle = trail;
                    ctx.beginPath();
                    ctx.ellipse(bx - 4, by, 8, 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else {
                // Enemy projectile — angular red spike
                const bx = bullet.x + bullet.width, by = bullet.y + bullet.height / 2;
                // Glow
                const eGlow = ctx.createLinearGradient(bx, by, bx - bullet.width - 4, by);
                eGlow.addColorStop(0, 'rgba(255,80,0,0)');
                eGlow.addColorStop(0.4, 'rgba(255,60,0,0.45)');
                eGlow.addColorStop(1, 'rgba(255,200,0,0.6)');
                ctx.fillStyle = eGlow;
                ctx.beginPath();
                ctx.ellipse(bx - bullet.width / 2, by, bullet.width / 2 + 3, 3.5, 0, 0, Math.PI * 2);
                ctx.fill();
                // Spike shape — reversed for left-travel
                ctx.fillStyle = '#ffcc44';
                ctx.beginPath();
                ctx.moveTo(bx - bullet.width, by);           // nose (left)
                ctx.lineTo(bx - bullet.width * 0.45, by - 2);
                ctx.lineTo(bx, by);                           // tail
                ctx.lineTo(bx - bullet.width * 0.45, by + 2);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(bx - bullet.width + 1, by, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        });
    }

    function drawPellets() {
        pellets.forEach(pellet => {
            const pulseSize = Math.sin(pellet.pulse) * 3;
            ctx.fillStyle = pellet.color;
            ctx.beginPath();
            ctx.arc(pellet.x, pellet.y, pellet.radius + pulseSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = pellet.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(pellet.x, pellet.y, pellet.radius + pulseSize + 5, 0, Math.PI * 2);
            ctx.stroke();
        });
    }

        ctx.fillRect(34, 8, player.health, 14);
        ctx.fillStyle = '#fff';

        ctx.fillText(player.health, 140, 20);

        // Enemies alive
        const alive = enemies.filter(e => e.isAlive).length;
        ctx.fillStyle = '#ff6666';

        const pUntil = pelletsUntilNextPowerup();
        ctx.fillStyle = '#ffaa00';

            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillRect(0, 32, canvas.width, 22);

            let barX = 8;
            player.powerups.forEach(p => {
                const pct = p.timer / POWERUP_DURATION;
                const barW = 110;

                // Bar background
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(barX, 36, barW, 10);

                // Bar fill — color by urgency
                const barColor = pct > 0.5 ? '#00ff88' : pct > 0.25 ? '#ffaa00' : '#ff3333';

    // ─── Update ───────────────────────────────────────────────────────────────
    function update() {
        // Movement — player confined to left half (by design)
        if ((keys['w'] || keys['arrowup'])    && player.y > 0)                            player.y -= player.speed;
        if ((keys['s'] || keys['arrowdown'])  && player.y < canvas.height - player.height) player.y += player.speed;
        if ((keys['a'] || keys['arrowleft'])  && player.x > 0)                            player.x -= player.speed;
        if ((keys['d'] || keys['arrowright']) && player.x < canvas.width / 2 - player.width) player.x += player.speed;

        // Powerup timers
        for (let i = player.powerups.length - 1; i >= 0; i--) {
            player.powerups[i].timer--;
            if (player.powerups[i].timer <= 0) player.powerups.splice(i, 1);
        }

        // Enemy scaling
        maxEnemies = Math.min(1 + Math.floor(enemiesDestroyed / 3), 5);
        const aliveEnemies = enemies.filter(e => e.isAlive).length;
        if (aliveEnemies < maxEnemies && Math.random() < 0.01) spawnEnemy();

        // Enemy AI
        enemies.forEach(enemy => {
            if (!enemy.isAlive) return;
            if (Math.random() < 0.02) enemy.targetY = Math.random() * (canvas.height - enemy.height);
            if (enemy.targetY !== undefined) {
                if (enemy.y < enemy.targetY) enemy.y += enemy.speed;
                if (enemy.y > enemy.targetY) enemy.y -= enemy.speed;
            }
            enemy.shootTimer++;
            if (enemy.shootTimer >= enemy.shootInterval) {
                enemyShoot(enemy);
                enemy.shootTimer = 0;
            }
        });

        // Pellet spawning — now uses the constants
        pelletSpawnTimer++;
        if (pelletSpawnTimer >= PELLET_SPAWN_INTERVAL && pellets.length < MAX_PELLETS) {
            spawnPellet();
            pelletSpawnTimer = 0;
        }
        pellets.forEach(p => p.pulse += 0.1);

        // Pellet collection
        for (let i = pellets.length - 1; i >= 0; i--) {
            if (checkCircleCollision(pellets[i], player)) {
                player.score += 10;
                createCollectSound();
                pellets.splice(i, 1);

                // Powerup every POWERUP_TRIGGER_SCORE points — score-threshold based
                const prevMilestone = Math.floor((player.score - 10) / POWERUP_TRIGGER_SCORE);
                const newMilestone  = Math.floor(player.score / POWERUP_TRIGGER_SCORE);
                if (newMilestone > prevMilestone) activatePowerup();
            }
        }

        // Danger zone
        const inDanger = player.y + player.height > canvas.height - DANGER_ZONE_HEIGHT;
        if (inDanger) {
            dangerZoneDamageTimer++;
            if (dangerZoneDamageTimer >= 30) {
                if (hasPowerup('spectrum_heal')) {
                    const level = getPowerupLevel('spectrum_heal');
                    if (player.health < 100) {
                        player.health = Math.min(100, player.health + (1 + level));
                    }
                } else {
                    player.health = Math.max(0, player.health - 3);
                    createHitSound();
                }
                dangerZoneDamageTimer = 0;
            }
        } else {
            dangerZoneDamageTimer = 0;
        }

        // Enemies hurt in danger zone
        enemies.forEach(enemy => {
            if (!enemy.isAlive) return;
            if (enemy.y + enemy.height > canvas.height - DANGER_ZONE_HEIGHT && Math.random() < 0.02) {
                enemy.health = Math.max(0, enemy.health - 2);
            }
        });

        // Bullet movement & collision
        for (let i = bullets.length - 1; i >= 0; i--) {
            const bullet = bullets[i];

            // Homing (always on for player — core ability)
            if (bullet.homing && bullet.owner === 'player') {
                let nearestEnemy = null, nearestDist = Infinity;
                enemies.forEach(enemy => {
                    if (!enemy.isAlive) return;
                    const dx = enemy.x - bullet.x, dy = enemy.y - bullet.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < nearestDist) { nearestDist = dist; nearestEnemy = enemy; }
                });
                if (nearestEnemy) {
                    const dx = nearestEnemy.x - bullet.x, dy = nearestEnemy.y - bullet.y;
                    const angle = Math.atan2(dy, dx);
                    bullet.vx += Math.cos(angle) * bullet.homingStrength;
                    bullet.vy += Math.sin(angle) * bullet.homingStrength;
                    const speed = Math.sqrt(bullet.vx * bullet.vx + bullet.vy * bullet.vy);
                    if (speed > 8) { bullet.vx = (bullet.vx / speed) * 8; bullet.vy = (bullet.vy / speed) * 8; }
                }
            }

            bullet.x += bullet.vx;
            bullet.y += bullet.vy;

            if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                bullets.splice(i, 1);
                continue;
            }

            if (bullet.owner === 'player') {
                let hit = false;
                for (let j = 0; j < enemies.length; j++) {
                    const enemy = enemies[j];
                    if (enemy.isAlive && checkCollision(bullet, enemy)) {
                        enemy.health -= bullet.damage || 10;
                        bullets.splice(i, 1);
                        createHitSound();
                        if (enemy.health <= 0) {
                            enemy.isAlive = false;
                            enemiesDestroyed++;
                            player.score += 50;
                            createExplosionSound();
                            setTimeout(() => {
                                const idx = enemies.indexOf(enemy);
                                if (idx > -1) enemies.splice(idx, 1);
                            }, 500);
                        }
                        hit = true;
                        break;
                    }
                }
                if (hit) continue;
            } else if (bullet.owner === 'enemy' && checkCollision(bullet, player)) {
                if (hasPowerup('shield')) {
                    const shieldLevel = getPowerupLevel('shield');
                    if (Math.random() > 0.3 * shieldLevel) {
                        player.health -= 10;
                        createHitSound();
                    }
                } else {
                    player.health -= 10;
                    createHitSound();
                }
                bullets.splice(i, 1);
            }
        }

        // Death check
        if (player.health <= 0) {
            player.health = 0;
            gameState = 'dead';
            createDeathSound();
        }
    }

    // ─── Game Loop ────────────────────────────────────────────────────────────
    function gameLoop() {
        if (gameState === 'start') {
            drawStartScreen();
            requestAnimationFrame(gameLoop);
            return;
        }

        if (gameState === 'dead') {
            // Draw final game state underneath, then overlay
            ctx.fillStyle = 'rgba(13, 13, 31, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawSpectrum();
            drawDeathScreen();
            requestAnimationFrame(gameLoop);
            return;
        }

        // Playing
        update();

        ctx.fillStyle = 'rgba(13, 13, 31, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawSpectrum();
        drawBoundaryLine();
        drawPellets();
        drawPlayer();
        drawEnemies();
        drawBullets();
        drawHUD();
        drawControls();

        // Shooting
        const hasAnyPowerup = player.powerups.length > 0;
        const cooldownRate = hasAnyPowerup && hasPowerup('rapid_fire') ? 5 : 15;
        if (keys[' '] && shootCooldown <= 0) {
            playerShoot();
            shootCooldown = cooldownRate;
        }
        if (shootCooldown > 0) shootCooldown--;

        requestAnimationFrame(gameLoop);
    }

    // ─── Reset ────────────────────────────────────────────────────────────────
    function resetGame() {
        player.x = 100; player.y = canvas.height / 2;
        player.health = 100; player.score = 0;
        player.powerups = []; player.lastPowerupScore = 0;
        enemies.length = 0; bullets.length = 0; pellets.length = 0;
        enemiesDestroyed = 0; maxEnemies = 1;
        pelletSpawnTimer = 0; dangerZoneDamageTimer = 0; shootCooldown = 0;
        gameState = 'playing';
        spawnEnemy();
    }

    // ─── Input ────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
        if (e.key === ' ') e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    canvas.addEventListener('click', async () => {
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        if (gameState === 'start') {
            await createReverb();
            startAmbientSound();
            resetGame();
        } else if (gameState === 'dead') {
            resetGame();
        }
    });

    // ─── Boot ─────────────────────────────────────────────────────────────────
    gameState = 'start';
    gameLoop();
</script>
</body>
</html>
